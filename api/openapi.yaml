  /mail/users/{id}/cc:
    $ref: './modules/mail/user-cc.yaml#/~1mail~1users~1{id}~1cc'
  /mail/users/{id}/password:
    $ref: './modules/mail/user-password.yaml#/~1mail~1users~1{id}~1password'
  /mail/users/{id}/spamfilter:
