  /dns/templates/{id}:
    $ref: './modules/dns/template.yaml#/~1dns~1templates~1{id}'
  
  # Mail module paths
  /mail/domains:
    $ref: './modules/mail/domains.yaml#/~1mail~1domains'
  /mail/domains/{id}:
