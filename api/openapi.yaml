openapi: 3.0.0
info:
  title: ISPConfig REST API
  description: |
    A modern, industry-standard REST API for ISPConfig 3.2+, exposing its entities
    (clients, DNS, mail, sites, servers, monitoring, system config) over versioned
    HTTP endpoints.

    ## Conventions

    - **Authentication**: `X-API-Key` header (`apiKeyAuth` security scheme) on every request.
    - **List responses**: `{ "data": [...], "meta": { "total", "limit", "offset" } }`
      with `limit` / `offset` / `sort` / `order` query parameters.
    - **Errors**: RFC 9457 `application/problem+json` (`type`, `title`, `status`, `detail`,
      plus an `errors` map on 422 validation failures).
    - **Status codes**: 200 read/update, 201 create, 204 delete.
  version: 1.0.0

servers:
  # Relative to wherever the docs are served. When the spec is fetched through
  # the app (GET /api/spec) this is rewritten to the absolute request origin so
  # "Try it out" targets the correct host/scheme/port automatically.
  - url: /api/v1
    description: This ISPConfig REST API server

# Default security applied to every operation (API key in X-API-Key header)
security:
  - apiKeyAuth: []

