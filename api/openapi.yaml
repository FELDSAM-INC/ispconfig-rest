  /servers/{id}/ip-mappings/{mapping_id}:
    $ref: './modules/server/ip-mappings.yaml#/~1servers~1{id}~1ip-mappings~1{mapping_id}'
  /servers/{id}/php-versions:
    $ref: './modules/server/php-versions.yaml#/~1servers~1{id}~1php-versions'
  /servers/{id}/php-versions/{php_version_id}:
    $ref: './modules/server/php-versions.yaml#/~1servers~1{id}~1php-versions~1{php_version_id}'
    
  # System module paths
  /system/config:
    $ref: './modules/system/system-config.yaml#/~1system~1config'
  /system/config/dns:
    $ref: './modules/system/dns-config.yaml#/~1system~1config~1dns'
  /system/config/dns-cas:
    $ref: './modules/system/dns-cas-config.yaml#/~1system~1config~1dns-cas'
