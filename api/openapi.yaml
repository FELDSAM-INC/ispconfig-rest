openapi: 3.0.0
info:
  title: ISPConfig REST API
  description: |
    REST API for ISPConfig 3.2+
    
    This API provides programmatic access to ISPConfig functionality.
  version: 1.0.0
  contact:
    name: ISPConfig API Support
    url: https://www.ispconfig.org/
    email: support@ispconfig.org

servers:
  - url: http://{hostname}:8000/api/v1
    description: ISPConfig API server
    variables:
      hostname:
        default: localhost
        description: Hostname or IP address of the ISPConfig server

# Security scheme (API Key)
security:
  - apiKeyAuth: []

# Include all components and paths
components:
  # Security schemes
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
  
  # Reusable schemas (data models)
  schemas:
    Client:
      $ref: './components/schemas/Client.yaml'
    ClientTemplate:
      $ref: './components/schemas/ClientTemplate.yaml'
    ClientTemplateAssigned:
      $ref: './components/schemas/ClientTemplateAssigned.yaml'
    ClientCircle:
      $ref: './components/schemas/ClientCircle.yaml'
    CronJob:
      $ref: './components/schemas/CronJob.yaml'
    Database:
      $ref: './components/schemas/Database.yaml'
    DatabaseUser:
      $ref: './components/schemas/DatabaseUser.yaml'
    DirectiveSnippet:
      $ref: './components/schemas/DirectiveSnippet.yaml'
    DnsRecord:
      $ref: './components/schemas/DnsRecord.yaml'
    DnsSoa:
      $ref: './components/schemas/DnsSoa.yaml'
    DnsSlave:
      $ref: './components/schemas/DnsSlave.yaml'
    DnsTemplate:
      $ref: './components/schemas/DnsTemplate.yaml'
    Error:
      $ref: './components/schemas/Error.yaml'
    FtpUser:
      $ref: './components/schemas/FtpUser.yaml'
    MailAccess:
      $ref: './components/schemas/MailAccess.yaml'
    MailAliasDomain:
      $ref: './components/schemas/MailAliasDomain.yaml'
    MailDomain:
      $ref: './components/schemas/MailDomain.yaml'
    MailForwarding:
      $ref: './components/schemas/MailForwarding.yaml'
    MailRelayDomain:
      $ref: './components/schemas/MailRelayDomain.yaml'
    MailRelayRecipient:
      $ref: './components/schemas/MailRelayRecipient.yaml'
    MailTransport:
      $ref: './components/schemas/MailTransport.yaml'
    MailUser:
      $ref: './components/schemas/MailUser.yaml'
    MailUserAutoresponder:
      $ref: './components/schemas/MailUserAutoresponder.yaml'
    MailUserCC:
      $ref: './components/schemas/MailUserCC.yaml'
    MailUserFilter:
      $ref: './components/schemas/MailUserFilter.yaml'
    MailUserSpamFilter:
      $ref: './components/schemas/MailUserSpamFilter.yaml'
    Pagination:
      $ref: './components/schemas/Pagination.yaml'
    ServerConfig:
      $ref: './components/schemas/ServerConfig.yaml'
    ServerFirewall:
      $ref: './components/schemas/ServerFirewall.yaml'
    ServerIp:
      $ref: './components/schemas/ServerIp.yaml'
    ServerIpMapping:
      $ref: './components/schemas/ServerIpMap.yaml'
    ServerMailConfig:
      $ref: './components/schemas/ServerMailConfig.yaml'
    ServerJailkitConfig:
      $ref: './components/schemas/ServerJailkitConfig.yaml'
    ServerPhpVersion:
      $ref: './components/schemas/ServerPhp.yaml'
    ServerRescueConfig:
      $ref: './components/schemas/ServerRescueConfig.yaml'
    ServerVloggerConfig:
      $ref: './components/schemas/ServerVloggerConfig.yaml'
    ServerCronConfig:
      $ref: './components/schemas/ServerCronConfig.yaml'
    ServerUfwConfig:
      $ref: './components/schemas/ServerUfwConfig.yaml' 
    ServerWebConfig:
      $ref: './components/schemas/ServerWebConfig.yaml'
    ServerXmppConfig:
      $ref: './components/schemas/ServerXmppConfig.yaml'
    ShellUser:
      $ref: './components/schemas/ShellUser.yaml'
    SpamfilterPolicy:
      $ref: './components/schemas/SpamfilterPolicy.yaml'
    SpamfilterUser:
      $ref: './components/schemas/SpamfilterUser.yaml'
    SpamfilterWblist:
      $ref: './components/schemas/SpamfilterWblist.yaml'
    WebChildDomain:
      $ref: './components/schemas/WebChildDomain.yaml'
    WebDavUser:
      $ref: './components/schemas/WebDavUser.yaml'
    WebDomain:
      $ref: './components/schemas/WebDomain.yaml'
    WebFolder:
      $ref: './components/schemas/WebFolder.yaml'
    WebFolderUser:
      $ref: './components/schemas/WebFolderUser.yaml'
  
  # Reusable parameters
  parameters:
    limit:
      $ref: './components/parameters/limit.yaml'
    offset:
      $ref: './components/parameters/offset.yaml'
    sort:
      $ref: './components/parameters/sort.yaml'
    order:
      $ref: './components/parameters/order.yaml'
  
  # Reusable responses
  responses:
    BadRequest:
      $ref: './components/responses/BadRequest.yaml'
    Unauthorized:
      $ref: './components/responses/Unauthorized.yaml'
    Forbidden:
      $ref: './components/responses/Forbidden.yaml'
    NotFound:
      $ref: './components/responses/NotFound.yaml'
    Conflict:
      $ref: './components/responses/Conflict.yaml'
    InternalServerError:
      $ref: './components/responses/InternalServerError.yaml'
    UnprocessableEntity:
      $ref: './components/responses/UnprocessableEntity.yaml'

# Include all paths from modules
paths:
  # Client module paths
  /clients:
    $ref: './modules/client/clients.yaml#/~1clients'
  /clients/{id}:
    $ref: './modules/client/clients.yaml#/~1clients~1{id}'
  /clients/{client_id}/templates:
    $ref: './modules/client/template_assignments.yaml#/~1clients~1{client_id}~1templates'
  /clients/{client_id}/templates/{template_id}:
    $ref: './modules/client/template_assignments.yaml#/~1clients~1{client_id}~1templates~1{template_id}'
  /clients/templates:
    $ref: './modules/client/templates.yaml#/~1clients~1templates'
  /clients/templates/{template_id}:
    $ref: './modules/client/templates.yaml#/~1clients~1templates~1{template_id}'
  /clients/circles:
    $ref: './modules/client/circles.yaml#/~1clients~1circles'
  /clients/circles/{id}:
    $ref: './modules/client/circles.yaml#/~1clients~1circles~1{id}'
  /resellers:
    $ref: './modules/client/resellers.yaml#/~1resellers'
  /resellers/{id}:
    $ref: './modules/client/resellers.yaml#/~1resellers~1{id}'
  
  # DNS module paths
  /dns/records:
    $ref: './modules/dns/records.yaml#/~1dns~1records'
  /dns/records/{id}:
    $ref: './modules/dns/records.yaml#/~1dns~1records~1{id}'
  /dns/soa:
    $ref: './modules/dns/soa.yaml#/~1dns~1soa'
  /dns/soa/{id}:
