  /mail/relay-recipients/{id}:
    $ref: './modules/mail/relay-recipients.yaml#/~1mail~1relay-recipients~1{id}'
  /mail/transports:
    $ref: './modules/mail/transports.yaml#/~1mail~1transports'
  /mail/transports/{id}:
    $ref: './modules/mail/transports.yaml#/~1mail~1transports~1{id}'
  /mail/content-filters:
    $ref: './modules/mail/content-filters.yaml#/~1mail~1content-filters'
  /mail/content-filters/{id}:
    $ref: './modules/mail/content-filters.yaml#/~1mail~1content-filters~1{id}'
  /mail/spamfilter/config:
