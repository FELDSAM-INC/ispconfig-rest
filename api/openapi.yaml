  /mail/access-rules/{id}:
    $ref: './modules/mail/access-rules.yaml#/~1mail~1access-rules~1{id}'
  
  # Server module paths
  /servers:
    $ref: './modules/server/servers.yaml#/~1servers'
  /servers/{id}:
    $ref: './modules/server/servers.yaml#/~1servers~1{id}'
  /servers/configs:
    $ref: './modules/server/server-config.yaml#/~1servers~1configs'
  /servers/{id}/configs:
    $ref: './modules/server/server-config.yaml#/~1servers~1{id}~1configs'
