  /mail/users/{id}/filters:
    $ref: './modules/mail/user-filters.yaml#/~1mail~1users~1{id}~1filters'
  /mail/users/{id}/filters/{filter_id}:
    $ref: './modules/mail/user-filters.yaml#/~1mail~1users~1{id}~1filters~1{filter_id}'
  /mail/forwards:
    $ref: './modules/mail/forwards.yaml#/~1mail~1forwards'
  /mail/forwards/{id}:
    $ref: './modules/mail/forwards.yaml#/~1mail~1forwards~1{id}'
  /mail/alias-domains:
    $ref: './modules/mail/alias-domains.yaml#/~1mail~1alias-domains'
  /mail/alias-domains/{id}:
    $ref: './modules/mail/alias-domains.yaml#/~1mail~1alias-domains~1{id}'
  /mail/relay-domains:
    $ref: './modules/mail/relay-domains.yaml#/~1mail~1relay-domains'
  /mail/relay-domains/{id}:
    $ref: './modules/mail/relay-domains.yaml#/~1mail~1relay-domains~1{id}'
  /mail/relay-recipients:
