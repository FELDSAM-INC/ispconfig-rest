---
# Mail User Password endpoint (action on the mail_user row)

/mail/users/{id}/password:
  put:
    tags:
      - Mail Users
    summary: Update password for a mail user
    description: |
      Sets a new password for a specific mail user. Only the password column
      is updated (datalog update on the `mail_user` row); the password is
      stored as a SHA-512 crypt hash and never returned.
    operationId: updateMailUserPassword
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserPassword.yaml'
    responses:
      '200':
        description: Password updated successfully
        content:
          application/json:
            schema:
              type: object
              required:
                - success
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Password updated successfully
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
