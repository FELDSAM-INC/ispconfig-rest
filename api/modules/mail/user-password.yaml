---
# Mail User Password API Endpoints
# Path: /mail/users/{mailuser_id}/password

put:
  tags:
    - mail
    - user
    - password
  summary: Update password for a mail user
  description: Update the password for a specific mail user
  operationId: updateMailUserPassword
  parameters:
    - $ref: '../../../components/parameters/mailuser_id.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/MailUserPassword.yaml'
  responses:
    '200':
      description: Password updated successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Password updated successfully
    '400':
      $ref: '../../../components/responses/400BadRequest.yaml'
    '401':
      $ref: '../../../components/responses/401Unauthorized.yaml'
    '403':
      $ref: '../../../components/responses/403Forbidden.yaml'
    '404':
      $ref: '../../../components/responses/404NotFound.yaml'
    '500':
      $ref: '../../../components/responses/500InternalServerError.yaml'
  security:
    - basicAuth: []
