# Mail Alias Domain endpoints (rows of mail_forwarding with type='aliasdomain';
# there is no dedicated mail_alias_domain table)
/mail/alias-domains:
  get:
    tags:
      - Mail Alias Domains
    summary: List all mail alias domains
    description: |
      Returns a paginated list of mail alias domains.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source domain (stored with @ prefix)
        schema:
          type: string
      - name: destination
        in: query
        description: Filter by destination domain (stored with @ prefix)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail alias domains
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailAliasDomain.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Alias Domains
    summary: Create a new mail alias domain
    description: |
      Creates a new mail alias domain (stored as a `mail_forwarding` row with
      `type='aliasdomain'`).

      ### Validation Rules
      - Source domain must be valid and not already in use as an alias domain
      - Source and destination domains must both exist as mail domains
      - Source and destination domains must be different
      - `server_id` and `sys_groupid` are inherited from the destination domain

      ### Notes
      - Source and destination are automatically prefixed with '@' when the
        prefix is missing
      - Both domains are converted to lowercase punycode
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailAliasDomain.yaml'
    responses:
      '201':
        description: Mail alias domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailAliasDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/alias-domains/{id}:
  get:
    tags:
      - Mail Alias Domains
    summary: Get mail alias domain by ID
    description: Returns a single mail alias domain by its ID
    parameters:
      - name: id
        in: path
        description: Mail alias domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail alias domain details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailAliasDomain.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Alias Domains
    summary: Update mail alias domain
    description: |
      Updates an existing mail alias domain.

      ### Notes
      - The source domain cannot be changed after creation
      - The destination domain must be an existing mail domain
      - Only `destination` and `active` can be updated
    parameters:
      - name: id
        in: path
        description: Mail alias domain ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailAliasDomain.yaml'
    responses:
      '200':
        description: Mail alias domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailAliasDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Alias Domains
    summary: Delete mail alias domain
    description: |
      Deletes a mail alias domain by ID.

      ### Notes
      - Emails sent to the alias domain will no longer be delivered to the
        destination domain
      - This action cannot be undone
    parameters:
      - name: id
        in: path
        description: Mail alias domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail alias domain deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
