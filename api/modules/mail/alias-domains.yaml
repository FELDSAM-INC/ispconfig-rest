# Mail Alias Domain endpoints
/mail/alias-domains:
  get:
    tags:
      - Mail Alias Domains
    summary: List all mail alias domains
    description: |
      Returns a paginated list of mail alias domains.
      The results can be filtered, sorted, and paginated.
      
      ### Filtering
      You can filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Example: `source[ilike]=%@example.com&active[eq]=y`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=source` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../../components/parameters/limit.yaml'
      - $ref: '../../../components/parameters/offset.yaml'
      - $ref: '../../../components/parameters/sort.yaml'
      - $ref: '../../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source domain (supports wildcards with %)
        schema:
          type: string
      - name: destination
        in: query
        description: Filter by destination domain (supports wildcards with %)
        schema:
          type: string
      - name: type
        in: query
        description: Filter by alias type
        schema:
          type: string
          enum: [alias, forward]
      - name: active
        in: query
        description: Filter by active status (y/n)
        schema:
          type: string
          enum: [y, n]
    responses:
      '200':
        description: A list of mail alias domains
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../../components/schemas/MailAliasDomain.yaml'
                pagination:
                  $ref: '../../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Alias Domains
    summary: Create a new mail alias domain
    description: |
      Creates a new mail alias domain configuration.
      
      ### Validation Rules
      - Source domain must be a valid domain and not already in use
      - Destination domain must exist and belong to the current user
      - Source and destination domains must be different
      - User must have permission to create alias domains
      - User must be within their allowed limits for alias domains
      
      ### Notes
      - The source domain will automatically be prefixed with '@' if not provided
      - The destination domain will automatically be prefixed with '@' if not provided
      - Both domains will be converted to lowercase
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/MailAliasDomain.yaml'
    responses:
      '201':
        description: Mail alias domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailAliasDomain.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
        description: |
          Bad Request. Possible reasons:
          - Invalid domain format
          - Source domain already in use
          - Destination domain does not exist or not accessible
          - Source and destination domains are the same
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
        description: |
          Forbidden. Possible reasons:
          - User has reached alias domain limit
          - No permission to access destination domain
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

/mail/alias-domains/{id}:
  parameters:
    - name: id
      in: path
      description: Mail alias domain ID
      required: true
      schema:
        type: integer
        format: int64
  get:
    tags:
      - Mail Alias Domains
    summary: Get mail alias domain by ID
    description: Returns a single mail alias domain by its ID
    responses:
      '200':
        description: Mail alias domain details
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailAliasDomain.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Alias Domains
    summary: Update mail alias domain
    description: |
      Updates an existing mail alias domain configuration.
      
      ### Notes
      - The source domain cannot be changed after creation
      - The destination domain must be an existing domain that belongs to the user
      - The type and active status can be updated
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/MailAliasDomain.yaml'
    responses:
      '200':
        description: Mail alias domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailAliasDomain.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Alias Domains
    summary: Delete mail alias domain
    description: |
      Deletes a mail alias domain by ID.
      
      ### Notes
      - This will remove the alias domain configuration
      - Any emails sent to the alias domain will no longer be delivered to the destination domain
      - This action cannot be undone
    responses:
      '204':
        description: Mail alias domain deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Alias domain is currently in use
          - Insufficient permissions
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
