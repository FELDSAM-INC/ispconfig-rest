# Mail fetchmail endpoints (table mail_get)
/mail/fetchmail:
  get:
    tags:
      - Mail Fetchmail
    summary: List all fetchmail configurations
    description: |
      Returns a paginated list of fetchmail configurations (stored in the `mail_get` table).

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: type
        in: query
        description: Filter by protocol type
        schema:
          type: string
          enum: [pop3, imap, pop3ssl, imapssl]
      - name: source_server
        in: query
        description: Filter by source server hostname or IP
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of fetchmail configurations
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailGet.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Fetchmail
    summary: Create a new fetchmail configuration
    description: |
      Creates a new fetchmail configuration (stored in the `mail_get` table).

      ### Validation Rules
      - Source server must be a valid hostname or IPv4 address
      - Source username and password are required
      - `destination` must be the email address of an existing mailbox
      - `server_id` must reference a mail server
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailGet.yaml'
    responses:
      '201':
        description: Fetchmail configuration created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailGet.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/fetchmail/{id}:
  get:
    tags:
      - Mail Fetchmail
    summary: Get fetchmail configuration by ID
    description: Returns a single fetchmail configuration by its ID
    parameters:
      - name: id
        in: path
        description: Fetchmail configuration ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Fetchmail configuration details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailGet.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Fetchmail
    summary: Update fetchmail configuration
    description: |
      Updates an existing fetchmail configuration.

      ### Notes
      - `server_id` cannot be changed after creation
      - `source_password` is only updated when a non-empty value is provided
    parameters:
      - name: id
        in: path
        description: Fetchmail configuration ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailGet.yaml'
    responses:
      '200':
        description: Fetchmail configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailGet.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Fetchmail
    summary: Delete fetchmail configuration
    description: |
      Deletes a fetchmail configuration by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Fetchmail configuration ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Fetchmail configuration deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
