---
# Mail User Autoresponder endpoints (singleton sub-resource of a mailbox;
# view over the autoresponder columns of the mail_user row)

/mail/users/{id}/autoresponder:
  get:
    tags:
      - Mail Users
    summary: Get autoresponder configuration for a mail user
    description: Retrieve the current autoresponder settings for a specific mail user
    parameters:
      - name: id
        in: path
        description: ID of the mail user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Autoresponder configuration retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserAutoresponder.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Users
    summary: Update autoresponder configuration for a mail user
    description: |
      Update the autoresponder settings for a specific mail user
      (datalog update on the `mail_user` row).

      ### Validation Rules
      - `autoresponder_end_date` must be later than `autoresponder_start_date`
        when both are set
      - Disabling the autoresponder clears both dates (legacy parity)
    parameters:
      - name: id
        in: path
        description: ID of the mail user
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserAutoresponder.yaml'
    responses:
      '200':
        description: Autoresponder configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserAutoresponder.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Users
    summary: Disable autoresponder for a mail user
    description: |
      Disables the autoresponder for a specific mail user. This is NOT a row
      delete: it sets `autoresponder` to disabled and clears both dates
      (datalog update on the `mail_user` row, legacy parity).
    parameters:
      - name: id
        in: path
        description: ID of the mail user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Autoresponder disabled successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
