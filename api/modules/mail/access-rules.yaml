# Mail Access Rules (Blacklist/Whitelist) endpoints (table mail_access)
/mail/access-rules:
  get:
    tags:
      - Mail Access Rules
    summary: List all mail access rules
    description: |
      Returns a paginated list of mail access rules (blacklist/whitelist).

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source pattern
        schema:
          type: string
      - name: type
        in: query
        description: Filter by rule type
        schema:
          type: string
          enum: [recipient, sender, client]
      - name: access
        in: query
        description: Filter by access action (e.g., REJECT, OK)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail access rules
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailAccess.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Access Rules
    summary: Create a new mail access rule
    description: |
      Creates a new mail access rule (blacklist/whitelist).

      ### Validation Rules
      - Source must be a valid email, domain, or IP address/network
      - Source + type must be unique per server (database unique key) —
        duplicates yield 409
      - `server_id` must reference a mail server
      - `access` defaults to 'REJECT' (blacklist); use 'OK' for whitelist rules
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailAccess.yaml'
    responses:
      '201':
        description: Mail access rule created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailAccess.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/access-rules/{id}:
  get:
    tags:
      - Mail Access Rules
    summary: Get mail access rule by ID
    description: Returns a single mail access rule by its ID
    parameters:
      - name: id
        in: path
        description: Mail access rule ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail access rule details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailAccess.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Access Rules
    summary: Update mail access rule
    description: |
      Updates an existing mail access rule.

      ### Notes
      - `server_id` cannot be changed after creation
      - The source + type combination must remain unique per server —
        conflicts yield 409
    parameters:
      - name: id
        in: path
        description: Mail access rule ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailAccess.yaml'
    responses:
      '200':
        description: Mail access rule updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailAccess.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Access Rules
    summary: Delete mail access rule
    description: |
      Deletes a mail access rule by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail access rule ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail access rule deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
