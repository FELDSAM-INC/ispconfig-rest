# Mail Access Rules (Blacklist/Whitelist) endpoints
/mail/access-rules:
  get:
    tags:
      - Mail Access Rules
    summary: List all mail access rules
    description: |
      Returns a paginated list of mail access rules (blacklist/whitelist).
      The results can be filtered, sorted, and paginated.
      
      ### Filtering
      Filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Example: `source[ilike]=%example.com&type[eq]=sender`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=source` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../../components/parameters/limit.yaml'
      - $ref: '../../../components/parameters/offset.yaml'
      - $ref: '../../../components/parameters/sort.yaml'
      - $ref: '../../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source pattern (supports wildcards with %)
        schema:
          type: string
      - name: type
        in: query
        description: Filter by rule type (recipient/sender/client)
        schema:
          type: string
          enum: [recipient, sender, client]
      - name: access
        in: query
        description: Filter by access action (e.g., REJECT, OK)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status (y/n)
        schema:
          type: string
          enum: [y, n]
    responses:
      '200':
        description: A list of mail access rules
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../../components/schemas/MailAccess.yaml'
                pagination:
                  $ref: '../../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Access Rules
    summary: Create a new mail access rule
    description: |
      Creates a new mail access rule (blacklist/whitelist).
      
      ### Validation Rules
      - Source must be a valid email, domain, or IP address
      - Non-admin users can only create rules for their own domains
      - Non-admin users can only use 'recipient' or 'sender' types
      - User must be within their allowed limits for access rules
      - Source and type combination must be unique per server
      
      ### Notes
      - The source domain must be managed by the current user (for non-admins)
      - System administrators can create any type of rule
      - Client type rules are restricted to admin users only
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/MailAccess.yaml'
    responses:
      '201':
        description: Mail access rule created successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailAccess.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
        description: |
          Bad Request. Possible reasons:
          - Invalid source format
          - Invalid rule type for user role
          - Rule already exists
          - Invalid domain (for non-admin users)
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
        description: |
          Forbidden. Possible reasons:
          - User has reached access rule limit
          - No permission to create rules for the specified domain
          - Client type rules are admin-only
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

/mail/access-rules/{id}:
  parameters:
    - name: id
      in: path
      description: Mail access rule ID
      required: true
      schema:
        type: integer
        format: int64
  get:
    tags:
      - Mail Access Rules
    summary: Get mail access rule by ID
    description: Returns a single mail access rule by its ID
    responses:
      '200':
        description: Mail access rule details
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailAccess.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Access Rules
    summary: Update mail access rule
    description: |
      Updates an existing mail access rule.
      
      ### Notes
      - The server_id cannot be changed after creation
      - Non-admin users can only update rules for their own domains
      - Non-admin users cannot change the rule type to 'client'
      - The source and type combination must remain unique per server
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/MailAccess.yaml'
    responses:
      '200':
        description: Mail access rule updated successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailAccess.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Access Rules
    summary: Delete mail access rule
    description: |
      Deletes a mail access rule by ID.
      
      ### Notes
      - This will permanently delete the access rule
      - This action cannot be undone
      - Non-admin users can only delete their own rules
    responses:
      '204':
        description: Mail access rule deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Rule is currently in use
          - Insufficient permissions
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
