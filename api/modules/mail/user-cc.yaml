---
# Mail User CC endpoints (singleton sub-resource of a mailbox;
# view over the cc / forward_in_lda columns of the mail_user row)

/mail/users/{id}/cc:
  get:
    tags:
      - Mail Users
    summary: Get CC settings for a mail user
    description: Retrieve the CC and forward settings for a specific mail user
    operationId: getMailUserCC
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Successful operation
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserCC.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Users
    summary: Update CC settings for a mail user
    description: |
      Update the CC and forward settings for a specific mail user
      (datalog update on the `mail_user` row).

      ### Validation Rules
      - `cc` must be empty or a comma-separated list of valid email addresses
    operationId: updateMailUserCC
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserCC.yaml'
    responses:
      '200':
        description: CC settings updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserCC.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
