# Mail Relay Domains endpoints (table mail_relay_domain)
/mail/relay-domains:
  get:
    tags:
      - Mail Relay Domains
    summary: List all mail relay domains
    description: |
      Returns a paginated list of mail relay domains.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: domain
        in: query
        description: Filter by domain name
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail relay domains
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailRelayDomain.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Relay Domains
    summary: Create a new mail relay domain
    description: |
      Creates a new mail relay domain.

      ### Validation Rules
      - Domain must be a valid domain name
      - Domain must be unique per server (database unique key) — duplicates
        yield 409
      - `server_id` must reference a mail server
      - `access` defaults to 'OK' (legacy parity)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailRelayDomain.yaml'
    responses:
      '201':
        description: Mail relay domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailRelayDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/relay-domains/{id}:
  get:
    tags:
      - Mail Relay Domains
    summary: Get mail relay domain by ID
    description: Returns a single mail relay domain by its ID
    parameters:
      - name: id
        in: path
        description: Mail relay domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail relay domain details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailRelayDomain.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Relay Domains
    summary: Update mail relay domain
    description: |
      Updates an existing mail relay domain.

      ### Notes
      - `domain` cannot be changed after creation
      - Only `access` and `active` can be updated
    parameters:
      - name: id
        in: path
        description: Mail relay domain ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailRelayDomain.yaml'
    responses:
      '200':
        description: Mail relay domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailRelayDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Relay Domains
    summary: Delete mail relay domain
    description: |
      Deletes a mail relay domain by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail relay domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail relay domain deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
