# Mail User endpoints
/mail/users:
  get:
    tags:
      - Mail Users
    summary: List all mail users
    description: |
      Returns a paginated list of mail users.
      The results can be filtered, sorted, and paginated.
      
      ### Filtering
      You can filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Example: `email[ilike]=%@example.com&active[eq]=y`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=email` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: email
        in: query
        description: Filter by email address (supports wildcards with %)
        schema:
          type: string
      - name: domain
        in: query
        description: Filter by domain part of email (supports wildcards with %)
        schema:
          type: string
      - name: login
        in: query
        description: Filter by login username (supports wildcards with %)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status (y/n)
        schema:
          type: string
          enum: [y, n]
    responses:
      '200':
        description: A list of mail users
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailUser.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Users
    summary: Create a new mail user
    description: |
      Creates a new mail user account.
      
      ### Validation Rules
      - Email address must be valid and not already in use
      - Login username must be unique
      - Password is required and must meet complexity requirements
      - Domain must exist and belong to the current user
      - User must have permission to create mail users
      - User must be within their allowed limits for mail users
      
      ### Notes
      - The email domain must be managed by the current user
      - The password will be encrypted before storage
      - Quota is specified in bytes (use 0 for unlimited, -1 for domain default)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUser.yaml'
    responses:
      '201':
        description: Mail user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
        description: |
          Bad Request. Possible reasons:
          - Invalid email format
          - Email already in use
          - Invalid login format
          - Weak password
          - Non-existent domain
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
        description: |
          Forbidden. Possible reasons:
          - User has reached mailbox limit
          - No permission to use the specified domain
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/users/{id}:
  get:
    tags:
      - Mail Users
    summary: Get mail user by ID
    description: Returns a single mail user by its ID
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Users
    summary: Update mail user
    description: |
      Updates an existing mail user account.
      
      ### Notes
      - The email address cannot be changed after creation
      - The login username cannot be changed after creation
      - To update the password, provide the new password in the `password` field
      - Quota can be updated at any time
      - Set `active: n` to disable the account without deleting it
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUser.yaml'
    responses:
      '200':
        description: Mail user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Users
    summary: Delete mail user
    description: |
      Deletes a mail user by ID.
      
      ### Notes
      - This will permanently delete the mail user account
      - All emails in the mailbox will be deleted
      - Any forwards or aliases will be removed
      - This action cannot be undone
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail user deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Mail user is currently in use
          - Insufficient permissions
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
