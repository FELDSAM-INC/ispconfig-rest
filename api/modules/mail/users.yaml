# Mail User endpoints
/mail/users:
  get:
    tags:
      - Mail Users
    summary: List all mail users
    description: |
      Returns a paginated list of mail users.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: email
        in: query
        description: Filter by email address
        schema:
          type: string
      - name: domain
        in: query
        description: Filter by the domain part of the email address
        schema:
          type: string
      - name: login
        in: query
        description: Filter by login username
        schema:
          type: string
      - name: postfix
        in: query
        description: Filter by receiving-enabled status (mail_user.postfix)
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Users
    summary: Create a new mail user
    description: |
      Creates a new mail user (mailbox). The write is recorded in `sys_datalog`
      and provisioned asynchronously by the ISPConfig server.

      ### Validation Rules
      - Email address must be valid, unique, and must not collide with an
        active forward/alias source
      - The email's domain part must be an existing mail domain
      - Login defaults to the email address and must be unique
      - Password is required (minimum 5 characters, legacy interface policy)

      ### Derived values (legacy parity)
      - `server_id` and `sys_groupid` are taken from the mail domain
      - `maildir`, `homedir`, `uid`, `gid` and `maildir_format` are derived
        from the server mail configuration
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUser.yaml'
    responses:
      '201':
        description: Mail user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/users/{id}:
  get:
    tags:
      - Mail Users
    summary: Get mail user by ID
    description: Returns a single mail user by its ID
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Users
    summary: Update mail user
    description: |
      Updates an existing mail user account.

      ### Notes
      - `email` and `login` cannot be changed after creation
      - The password is re-hashed only when a non-empty `password` is provided
      - Set `postfix: false` to disable receiving without deleting the account
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUser.yaml'
    responses:
      '200':
        description: Mail user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Users
    summary: Delete mail user
    description: |
      Deletes a mail user by ID (datalog delete; the mail server removes the
      maildir asynchronously).

      ### Notes
      - Forwards or aliases pointing at the deleted address are NOT removed
        (legacy parity)
      - This action cannot be undone
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
