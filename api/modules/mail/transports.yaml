# Mail Transports endpoints (table mail_transport)
/mail/transports:
  get:
    tags:
      - Mail Transports
    summary: List all mail transports
    description: |
      Returns a paginated list of mail transports.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: domain
        in: query
        description: Filter by domain name
        schema:
          type: string
      - name: transport
        in: query
        description: Filter by transport definition
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail transports
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailTransport.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Transports
    summary: Create a new mail transport
    description: |
      Creates a new mail transport.

      ### Validation Rules
      - Domain must be a valid domain name
      - Domain must be unique per server (database unique key) — duplicates
        yield 409
      - Domain must not be an existing local mail domain
      - Transport is a raw Postfix transport string
      - `server_id` must reference a mail server
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailTransport.yaml'
    responses:
      '201':
        description: Mail transport created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailTransport.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/transports/{id}:
  get:
    tags:
      - Mail Transports
    summary: Get mail transport by ID
    description: Returns a single mail transport by its ID
    parameters:
      - name: id
        in: path
        description: Mail transport ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail transport details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailTransport.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Transports
    summary: Update mail transport
    description: |
      Updates an existing mail transport.

      ### Notes
      - `domain` and `server_id` cannot be changed after creation (legacy
        reverts server_id changes)
      - Only `transport`, `sort_order` and `active` can be updated
    parameters:
      - name: id
        in: path
        description: Mail transport ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailTransport.yaml'
    responses:
      '200':
        description: Mail transport updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailTransport.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Transports
    summary: Delete mail transport
    description: |
      Deletes a mail transport by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail transport ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail transport deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
