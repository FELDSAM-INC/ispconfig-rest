# Mail Domain endpoints (table mail_domain)
/mail/domains:
  get:
    tags:
      - Mail Domains
    summary: List all mail domains
    description: |
      Returns a paginated list of mail domains.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match; `domain`
      supports `*` as a wildcard.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: domain
        in: query
        description: Filter by domain name (use * as wildcard)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
      - name: local_delivery
        in: query
        description: Filter by local delivery status
        schema:
          type: boolean
      - name: dkim
        in: query
        description: Filter by DKIM status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail domains
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailDomain.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Domains
    summary: Create a new mail domain
    description: |
      Creates a new mail domain configuration.

      ### Validation Rules
      - Domain name must be valid and not already in use (application-level
        uniqueness check, mirroring the legacy UNIQUE validator)
      - If DKIM is enabled, a valid private key must be provided; the public
        key is derived server-side
      - Relay credentials (relay_user/relay_pass) are optional; leave them
        empty when the relay host authorizes by IP without SASL (#6877)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailDomain.yaml'
    responses:
      '201':
        description: Mail domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/domains/{id}:
  get:
    tags:
      - Mail Domains
    summary: Get mail domain by ID
    description: Returns a single mail domain by its ID
    parameters:
      - name: id
        in: path
        description: Mail domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail domain details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailDomain.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Domains
    summary: Update mail domain
    description: |
      Updates an existing mail domain configuration.

      ### Notes
      - Domain name cannot be changed after creation (legacy parity; legacy
        restricts renames to admins and cascades them — the API disallows
        renames instead)
      - To enable DKIM, set `dkim: true` and provide `dkim_private`; the
        public key is derived server-side
      - To disable DKIM, set `dkim: false`
    parameters:
      - name: id
        in: path
        description: Mail domain ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailDomain.yaml'
    responses:
      '200':
        description: Mail domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Domains
    summary: Delete mail domain
    description: |
      Deletes a mail domain by ID.

      ### Cascade (legacy parity)
      Deleting a mail domain also deletes its dependent records — mailboxes
      (`mail_user`), forwards/aliases/catchalls and alias domains
      (`mail_forwarding`), fetchmail entries (`mail_get`) and spamfilter
      users with their white/blacklist entries (`spamfilter_users`,
      `spamfilter_wblist`) — mirroring legacy `mail_domain_del.php`.
      This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail domain deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
