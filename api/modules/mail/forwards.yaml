# Mail Forwarding and Aliases endpoints
/mail/forwards:
  get:
    tags:
      - Mail
    summary: List all mail forwards, catchalls, and aliases
    description: |
      Returns a paginated list of mail forwards, catchalls, and aliases.
      The results can be filtered, sorted, and paginated.
      
      ### Types of Forwards
      - **Regular Forward**: Forwards emails from a specific address to one or more destinations
        - Source: `user@example.com`
        - Type: `forward`
      - **Catchall Forward**: Forwards all emails for a domain to a specific address
        - Source: `@example.com`
        - Type: `catchall`
      - **Alias**: Email alias that acts as an alternative email address
        - Source: `alias@example.com`
        - Type: `alias`
      
      ### Filtering
      Filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Examples:
      - List all catchalls: `type[eq]=catchall`
      - List all aliases: `type[eq]=alias`
      - Find forwards/aliases for a domain: `source[ilike]=%@example.com`
      - Find active forwards/aliases: `active[eq]=y`
      - Find by destination: `destination[ilike]=user@example.com`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=source` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../../components/parameters/limit.yaml'
      - $ref: '../../../components/parameters/offset.yaml'
      - $ref: '../../../components/parameters/sort.yaml'
      - $ref: '../../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source email address (supports wildcards with %)
        schema:
          type: string
      - name: destination
        in: query
        description: Filter by destination email address (supports wildcards with %)
        schema:
          type: string
      - name: type
        in: query
        description: Filter by forward type
        schema:
          type: string
          enum: [forward, catchall, alias]
          default: forward
      - name: active
        in: query
        description: Filter by active status (y/n)
        schema:
          type: string
          enum: [y, n]
    responses:
      '200':
        description: A list of mail forwards
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../../components/schemas/MailForwarding.yaml'
                pagination:
                  $ref: '../../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail
    summary: Create a new mail forward or catchall
    description: |
      Creates a new mail forward or catchall.
      
      ### Types of Forwards
      
      ### Validation Rules
      - Source must be a valid email or catchall format
      - For forwards/aliases: source must be a full email address
      - For catchalls: source must start with @ (e.g., @domain.tld)
      - Destination must contain at least one valid email
      - User must have permission to create the entry for the source domain
      - User must be within their allowed limits for mail entries
      - Source and destination combination must be unique
      
      ### Alias-Specific Notes
      - Aliases are essentially forwards with `type: alias`
      - The main difference is in the UI and how they're presented to users
      - Aliases can have `allow_send_as` enabled to allow sending as the alias address
      
      ### Notes
      - For catchalls, the source must be in the format @domain.tld
      - The source domain must be managed by the current user
      - Multiple destinations can be specified as a comma-separated list
      - System administrators can create forwards/catchalls for any domain
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/MailForwarding.yaml'
    responses:
      '201':
        description: Mail forward created successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailForwarding.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
        description: |
          Bad Request. Possible reasons:
          - Invalid email format
          - No destination specified
          - Invalid destination email
          - Forward already exists
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
        description: |
          Forbidden. Possible reasons:
          - User has reached forward limit
          - No permission to use the source domain
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

/mail/forwards/{id}:
  parameters:
    - name: id
      in: path
      description: Mail forward ID
      required: true
      schema:
        type: integer
        format: int64
  get:
    tags:
      - Mail
    summary: Get mail forward or catchall by ID
    description: |
      Returns a single mail forward or catchall by its ID.
      
      The response will include the `is_catchall` flag to easily identify catchall entries.
    responses:
      '200':
        description: Mail forward details
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailForwarding.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail
    summary: Update mail forward or catchall
    description: |
      Updates an existing mail forward or catchall.
      
      ### Notes
      - The source address cannot be changed after creation
      - The type (forward/catchall/alias) cannot be changed after creation
      - For catchalls, only the domain part is considered when matching
      - Only the destination, active status, allow_send_as, and greylisting can be updated
      - The `is_catchall` flag is read-only and determined by the source format
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/MailForwarding.yaml'
    responses:
      '200':
        description: Mail forward updated successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/MailForwarding.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail
    summary: Delete mail forward or catchall
    description: |
      Deletes a mail forward or catchall by ID.
      
      ### Notes
      - The operation is permanent and cannot be undone
      - User must have permission to modify the source domain
      - System administrators can delete any forward/catchall
    responses:
      '204':
        description: Mail forward deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Forward is in use
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
