# Mail Forwarding and Aliases endpoints (table mail_forwarding,
# type IN (forward, catchall, alias); alias domains have their own resource)
/mail/forwards:
  get:
    tags:
      - Mail Forwards
    summary: List all mail forwards, catchalls, and aliases
    description: |
      Returns a paginated list of mail forwards, catchalls, and aliases.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.

      ### Types
      - **forward**: forwards mail for a specific address (source `user@example.com`)
      - **catchall**: forwards all mail of a domain (source `@example.com`)
      - **alias**: alternative address for an existing mailbox
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source email address
        schema:
          type: string
      - name: destination
        in: query
        description: Filter by destination email address
        schema:
          type: string
      - name: type
        in: query
        description: Filter by forward type
        schema:
          type: string
          enum: [forward, catchall, alias]
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail forwards
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailForwarding.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Forwards
    summary: Create a new mail forward, catchall, or alias
    description: |
      Creates a new mail forward, catchall, or alias.

      ### Validation Rules
      - For forwards/aliases: source must be a full email address
      - For catchalls: source must be in `@domain.tld` form
      - The source domain must be an existing mail domain (`server_id` and
        `sys_groupid` are inherited from it)
      - The source must not equal an active mailbox address
      - Destination must contain at least one valid email address; input may
        be separated by commas, semicolons or whitespace and is stored
        normalized as a ', '-joined list
      - Source + type must be unique (application-level check)

      ### Defaults (legacy parity)
      - `active` true, `greylisting` false
      - `allow_send_as`: true for aliases, false for forwards and catchalls
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailForwarding.yaml'
    responses:
      '201':
        description: Mail forward created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailForwarding.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/forwards/{id}:
  get:
    tags:
      - Mail Forwards
    summary: Get mail forward or catchall by ID
    description: |
      Returns a single mail forward, catchall, or alias by its ID.

      The response includes the computed `is_catchall` flag.
    parameters:
      - name: id
        in: path
        description: Mail forward ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail forward details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailForwarding.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Forwards
    summary: Update mail forward or catchall
    description: |
      Updates an existing mail forward, catchall, or alias.

      ### Notes
      - `source` and `type` cannot be changed after creation
      - Only `destination`, `active`, `allow_send_as` and `greylisting` can be updated
    parameters:
      - name: id
        in: path
        description: Mail forward ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailForwarding.yaml'
    responses:
      '200':
        description: Mail forward updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailForwarding.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Forwards
    summary: Delete mail forward or catchall
    description: |
      Deletes a mail forward, catchall, or alias by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail forward ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail forward deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
