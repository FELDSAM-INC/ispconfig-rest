---
# Mail User Spam Filter endpoints (singleton sub-resource of a mailbox;
# view over the move_junk / purge_* / custom_mailfilter columns of mail_user)

/mail/users/{id}/spamfilter:
  get:
    tags:
      - Mail Users
    summary: Get spam filter settings for a mail user
    description: Retrieve the spam filter settings for a specific mail user
    operationId: getMailUserSpamFilter
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Successful operation
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserSpamFilter.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Users
    summary: Update spam filter settings for a mail user
    description: |
      Update the spam filter settings for a specific mail user
      (datalog update on the `mail_user` row).
    operationId: updateMailUserSpamFilter
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserSpamFilter.yaml'
    responses:
      '200':
        description: Spam filter settings updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserSpamFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
