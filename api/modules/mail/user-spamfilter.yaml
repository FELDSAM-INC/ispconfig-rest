---
# Mail User Spam Filter API Endpoints

/mail/users/{id}/spamfilter:
  get:
    tags:
      - Mail Users
    summary: Get spam filter settings for a mail user
    description: Retrieve the spam filter settings for a specific mail user
    operationId: getMailUserSpamFilter
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Successful operation
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserSpamFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  put:
    tags:
      - Mail Users
    summary: Update spam filter settings for a mail user
    description: Update the spam filter settings for a specific mail user
    operationId: updateMailUserSpamFilter
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserSpamFilter.yaml'
    responses:
      '200':
        description: Spam filter settings updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserSpamFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []
