# Spamfilter User endpoints (table spamfilter_users)
/mail/spamfilter/users:
  get:
    tags:
      - Mail Spamfilter
    summary: List all spamfilter users
    description: |
      Returns a paginated list of spamfilter users (email-to-policy mappings).

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: email
        in: query
        description: Filter by email address
        schema:
          type: string
      - name: server_id
        in: query
        description: Filter by server ID
        schema:
          type: integer
          format: int64
      - name: policy_id
        in: query
        description: Filter by policy ID
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: A list of spamfilter users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/SpamfilterUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Spamfilter
    summary: Create a new spamfilter user
    description: |
      Creates a new spamfilter user (email-to-policy mapping).

      ### Validation Rules
      - `email`, `fullname`, `policy_id` and `server_id` are required
      - `email` must be unique (database unique key) — duplicates yield 409
      - A non-zero `policy_id` must reference an existing policy (404 otherwise)
      - `server_id` must reference a mail server
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterUser.yaml'
    responses:
      '201':
        description: Spamfilter user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/spamfilter/users/{id}:
  get:
    tags:
      - Mail Spamfilter
    summary: Get spamfilter user by ID
    description: Returns a single spamfilter user by its ID
    parameters:
      - name: id
        in: path
        description: Spamfilter user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Spamfilter user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Spamfilter
    summary: Update spamfilter user
    description: |
      Updates an existing spamfilter user.

      ### Notes
      - `email` and `server_id` cannot be changed after creation
      - A non-zero `policy_id` must reference an existing policy
    parameters:
      - name: id
        in: path
        description: Spamfilter user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterUser.yaml'
    responses:
      '200':
        description: Spamfilter user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Spamfilter
    summary: Delete spamfilter user
    description: |
      Deletes a spamfilter user mapping by ID.

      Note: white/blacklist entries referencing this mapping via `rid` become
      inert on the mail server (their recipient can no longer be resolved).
    parameters:
      - name: id
        in: path
        description: Spamfilter user ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Spamfilter user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
