# Spamfilter Whitelist/Blacklist endpoints (table spamfilter_wblist)
/mail/spamfilter/wblist:
  get:
    tags:
      - Mail Spamfilter
    summary: List all whitelist/blacklist entries
    description: |
      Returns a paginated list of spamfilter whitelist and blacklist entries.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: email
        in: query
        description: Filter by email/pattern
        schema:
          type: string
      - name: wb
        in: query
        description: Filter by list type
        schema:
          type: string
          enum: [W, B]
      - name: rid
        in: query
        description: Filter by referenced spamfilter user ID
        schema:
          type: integer
          format: int64
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of whitelist/blacklist entries
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/SpamfilterWBList.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Spamfilter
    summary: Create a new whitelist/blacklist entry
    description: |
      Creates a new whitelist or blacklist entry.

      ### Validation Rules
      - `email` and `rid` are required; `wb` defaults to 'B'
      - A non-zero `rid` must reference an existing spamfilter user
        (404 otherwise)
      - `rid=0` is accepted but has no effect on Rspamd systems — use
        /mail/access-rules for global rules
      - `server_id` must reference a mail server
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterWBList.yaml'
    responses:
      '201':
        description: Whitelist/blacklist entry created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterWBList.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/spamfilter/wblist/{id}:
  get:
    tags:
      - Mail Spamfilter
    summary: Get whitelist/blacklist entry by ID
    description: Returns a single whitelist/blacklist entry by its ID
    parameters:
      - name: id
        in: path
        description: Whitelist/blacklist entry ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Whitelist/blacklist entry details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterWBList.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Spamfilter
    summary: Update whitelist/blacklist entry
    description: |
      Updates an existing whitelist/blacklist entry.

      ### Notes
      - `email` and `rid` cannot be changed after creation
    parameters:
      - name: id
        in: path
        description: Whitelist/blacklist entry ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterWBList.yaml'
    responses:
      '200':
        description: Whitelist/blacklist entry updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterWBList.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Spamfilter
    summary: Delete whitelist/blacklist entry
    description: Deletes a whitelist/blacklist entry by ID
    parameters:
      - name: id
        in: path
        description: Whitelist/blacklist entry ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Whitelist/blacklist entry deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
