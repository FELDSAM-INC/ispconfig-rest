# Spamfilter Whitelist/Blacklist endpoints
/mail/spamfilter/wblist:
  get:
    tags:
      - Mail Spamfilter
    summary: List all whitelist/blacklist entries
    description: |
      Returns a paginated list of whitelist and blacklist entries.
      Non-admin users can only see their own entries.

      ### Filtering
      Filter results using query parameters in the format `field[op]=value`.

      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list

      Example: `email[ilike]=%example.com&wb[eq]=B&active[eq]=y`

      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.

      Example: `sort=email` or `sort=-priority`

      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: email
        in: query
        description: Filter by email/pattern (supports wildcards with %)
        schema:
          type: string
      - name: wb
        in: query
        description: Filter by list type
        schema:
          type: string
          enum: [W, B]
      - name: rid
        in: query
        description: Filter by user ID (0 for global rules)
        schema:
          type: integer
          format: int64
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: string
          enum: [y, n]
    responses:
      '200':
        description: A list of whitelist/blacklist entries
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/SpamfilterWBList.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Spamfilter
    summary: Create a new whitelist/blacklist entry
    description: |
      Creates a new whitelist or blacklist entry.

      ### Validation Rules
      - Email/pattern and type (wb) are required
      - Non-admin users can only create entries for themselves (using their user ID as rid)
      - Admin users can create global entries (rid=0) or for specific users
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterWBList.yaml'
    responses:
      '201':
        description: Whitelist/blacklist entry created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterWBList.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        description: Referenced user or server not found
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/spamfilter/wblist/{id}:
  get:
    tags:
      - Mail Spamfilter
    summary: Get whitelist/blacklist entry by ID
    description: |
      Returns a single whitelist/blacklist entry by its ID.
      Non-admin users can only see their own entries.
    parameters:
      - name: id
        in: path
        description: Whitelist/blacklist entry ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Whitelist/blacklist entry details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterWBList.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Spamfilter
    summary: Update whitelist/blacklist entry
    description: |
      Updates an existing whitelist/blacklist entry.

      ### Notes
      - Non-admin users can only update their own entries
      - Email and rid cannot be changed after creation
    parameters:
      - name: id
        in: path
        description: Whitelist/blacklist entry ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterWBList.yaml'
    responses:
      '200':
        description: Whitelist/blacklist entry updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterWBList.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Spamfilter
    summary: Delete whitelist/blacklist entry
    description: |
      Deletes a whitelist/blacklist entry by ID.

      ### Notes
      - Non-admin users can only delete their own entries
    parameters:
      - name: id
        in: path
        description: Whitelist/blacklist entry ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Whitelist/blacklist entry deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
