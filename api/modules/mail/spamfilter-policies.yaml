# Spamfilter Policy endpoints (table spamfilter_policy)
/mail/spamfilter/policies:
  get:
    tags:
      - Mail Spamfilter
    summary: List all spamfilter policies
    description: |
      Returns a paginated list of spamfilter policies.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: policy_name
        in: query
        description: Filter by policy name
        schema:
          type: string
    responses:
      '200':
        description: A list of spamfilter policies
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/SpamfilterPolicy.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Spamfilter
    summary: Create a new spamfilter policy
    description: |
      Creates a new spamfilter policy.

      ### Validation Rules
      - `policy_name` is required and must be unique (application-level check)
      - Unexposed policy columns keep their database defaults
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterPolicy.yaml'
    responses:
      '201':
        description: Spamfilter policy created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterPolicy.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/spamfilter/policies/{id}:
  get:
    tags:
      - Mail Spamfilter
    summary: Get spamfilter policy by ID
    description: Returns a single spamfilter policy by its ID
    parameters:
      - name: id
        in: path
        description: Spamfilter policy ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Spamfilter policy details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterPolicy.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Spamfilter
    summary: Update spamfilter policy
    description: |
      Updates an existing spamfilter policy.

      ### Notes
      - `policy_name` must remain unique (application-level check)
    parameters:
      - name: id
        in: path
        description: Spamfilter policy ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterPolicy.yaml'
    responses:
      '200':
        description: Spamfilter policy updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterPolicy.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Spamfilter
    summary: Delete spamfilter policy
    description: |
      Deletes a spamfilter policy by ID.

      ### Notes
      - A policy that is referenced by spamfilter users cannot be deleted
        (returns 400; API-added guard — legacy has no in-use check)
    parameters:
      - name: id
        in: path
        description: Spamfilter policy ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Spamfilter policy deleted successfully
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
