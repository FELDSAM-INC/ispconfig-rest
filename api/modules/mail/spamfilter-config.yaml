# Spamfilter Configuration endpoints.
# This resource has no dedicated table: it exposes the [server] and [mail] INI
# sections of the serialized server.config column of the `server` table
# (legacy spamfilter_config form, db_table=server). Configs exist implicitly
# for every mail server — there are no create (POST) or delete endpoints.
/mail/spamfilter/config:
  get:
    tags:
      - Mail Spamfilter
    summary: List all spamfilter server configurations
    description: |
      Returns a paginated list of per-server spamfilter/mail configurations,
      one entry per mail server, read from the `[server]` and `[mail]` INI
      sections of each server's `server.config` column.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: hostname
        in: query
        description: Filter by hostname
        schema:
          type: string
    responses:
      '200':
        description: A list of spamfilter server configurations
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/SpamfilterConfig.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/spamfilter/config/{server_id}:
  get:
    tags:
      - Mail Spamfilter
    summary: Get spamfilter configuration by server ID
    description: |
      Returns the spamfilter/mail configuration of a single mail server,
      read from the `[server]` and `[mail]` INI sections of its
      `server.config` column.
    parameters:
      - name: server_id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Spamfilter server configuration details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Spamfilter
    summary: Update spamfilter server configuration
    description: |
      Updates the spamfilter/mail configuration of an existing mail server.

      ### Write semantics (read-merge-write, legacy parity)
      The stored `server.config` INI blob is read, only the keys of the
      `[server]` and `[mail]` sections are replaced with the request values,
      all other sections are preserved, and the blob is written back. Legacy
      ISPConfig performs this as a direct `UPDATE server SET config = ?`
      without a datalog entry (documented Constitution II exception).

      ### Notes
      - `server_id` identifies an existing mail server; configurations are
        never created or deleted through the API
      - All fields are required (legacy NOTEMPTY validators)
    parameters:
      - name: server_id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterConfig.yaml'
    responses:
      '200':
        description: Spamfilter server configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
