# Spamfilter Configuration endpoints
/mail/spamfilter/config:
  get:
    tags:
      - Mail Spamfilter
    summary: List all spamfilter server configurations
    description: |
      Returns a paginated list of spamfilter server configurations.
      Only accessible by admin users.

      ### Filtering
      Filter results using query parameters in the format `field[op]=value`.

      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list

      Example: `hostname[ilike]=%mail%`

      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.

      Example: `sort=hostname` or `sort=-server_id`

      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: hostname
        in: query
        description: Filter by hostname (supports wildcards with %)
        schema:
          type: string
    responses:
      '200':
        description: A list of spamfilter server configurations
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/SpamfilterConfig.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Spamfilter
    summary: Create a new spamfilter server configuration
    description: |
      Creates a new spamfilter server configuration.
      Only accessible by admin users.

      ### Validation Rules
      - All required fields must be provided
      - IP addresses must be valid IPv4 format
      - Server ID must not already exist
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterConfig.yaml'
    responses:
      '201':
        description: Spamfilter server configuration created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/spamfilter/config/{server_id}:
  parameters:
    - name: server_id
      in: path
      description: Server ID
      required: true
      schema:
        type: integer
        format: int64
  get:
    tags:
      - Mail Spamfilter
    summary: Get spamfilter configuration by server ID
    description: |
      Returns a single spamfilter server configuration by its ID.
      Only accessible by admin users.
    responses:
      '200':
        description: Spamfilter server configuration details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Spamfilter
    summary: Update spamfilter server configuration
    description: |
      Updates an existing spamfilter server configuration.
      Only accessible by admin users.

      ### Notes
      - Server ID cannot be changed
      - All fields are required on update
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SpamfilterConfig.yaml'
    responses:
      '200':
        description: Spamfilter server configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SpamfilterConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
