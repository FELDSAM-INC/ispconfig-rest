# Mail User Filters endpoints (nested under a mailbox; table mail_user_filter)
/mail/users/{id}/filters:
  get:
    tags:
      - Mail Users
    summary: List all mail user filters
    description: |
      Returns a paginated list of the filter rules of a mailbox.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by matched message attribute (stored values)
        schema:
          type: string
          enum: [Subject, From, To, List-Id, Header, Size]
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail user filters
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailUserFilter.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Users
    summary: Create a new mail user filter
    description: |
      Creates a new filter rule for the mailbox.

      ### Side effects (legacy parity)
      The owning mailbox's `custom_mailfilter` is regenerated (a
      `### BEGIN FILTER_ID:<id> ... ### END FILTER_ID:<id>` block is added)
      and a companion `mail_user` datalog update is emitted.
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserFilter.yaml'
    responses:
      '201':
        description: Mail user filter created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/users/{id}/filters/{filter_id}:
  get:
    tags:
      - Mail Users
    summary: Get mail user filter by ID
    description: |
      Returns a single mail user filter by its ID. A filter that belongs to a
      different mailbox than `{id}` yields 404.
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
      - name: filter_id
        in: path
        description: Mail user filter ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail user filter details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserFilter.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Users
    summary: Update mail user filter
    description: |
      Updates an existing mail user filter.

      ### Notes
      - The filter cannot be moved to another mailbox
      - The mailbox's `custom_mailfilter` block for this filter is regenerated
        (companion `mail_user` datalog update)
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
      - name: filter_id
        in: path
        description: Mail user filter ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailUserFilter.yaml'
    responses:
      '200':
        description: Mail user filter updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailUserFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Users
    summary: Delete mail user filter
    description: |
      Deletes a mail user filter by ID.

      ### Notes
      - The filter's block is removed from the mailbox's `custom_mailfilter`
        (companion `mail_user` datalog update)
      - The operation is permanent and cannot be undone
    parameters:
      - name: id
        in: path
        description: Mail user ID
        required: true
        schema:
          type: integer
          format: int64
      - name: filter_id
        in: path
        description: Mail user filter ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail user filter deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
