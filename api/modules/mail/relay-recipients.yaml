# Mail Relay Recipients endpoints (table mail_relay_recipient)
/mail/relay-recipients:
  get:
    tags:
      - Mail Relay Recipients
    summary: List all mail relay recipients
    description: |
      Returns a paginated list of mail relay recipients.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: source
        in: query
        description: Filter by source email or pattern
        schema:
          type: string
      - name: access
        in: query
        description: Filter by access value
        schema:
          type: string
    responses:
      '200':
        description: A list of mail relay recipients
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailRelayRecipient.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Relay Recipients
    summary: Create a new mail relay recipient
    description: |
      Creates a new mail relay recipient.

      ### Validation Rules
      - Source must be a valid email, domain (@domain.tld) or pattern
      - `server_id` must reference a mail server
      - `access` defaults to 'OK' (legacy parity)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailRelayRecipient.yaml'
    responses:
      '201':
        description: Mail relay recipient created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailRelayRecipient.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/relay-recipients/{id}:
  get:
    tags:
      - Mail Relay Recipients
    summary: Get mail relay recipient by ID
    description: Returns a single mail relay recipient by its ID
    parameters:
      - name: id
        in: path
        description: Mail relay recipient ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail relay recipient details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailRelayRecipient.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Relay Recipients
    summary: Update mail relay recipient
    description: |
      Updates an existing mail relay recipient.

      ### Notes
      - `source` and `server_id` cannot be changed after creation
      - Only `access` and `active` can be updated
    parameters:
      - name: id
        in: path
        description: Mail relay recipient ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailRelayRecipient.yaml'
    responses:
      '200':
        description: Mail relay recipient updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailRelayRecipient.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Relay Recipients
    summary: Delete mail relay recipient
    description: |
      Deletes a mail relay recipient by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail relay recipient ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail relay recipient deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
