# Mail Content Filter endpoints (table mail_content_filter)
/mail/content-filters:
  get:
    tags:
      - Mail Content Filters
    summary: List all mail content filter rules
    description: |
      Returns a paginated list of mail content filter rules.

      Use `limit`/`offset` for pagination and `sort`/`order` for ordering.
      The documented query parameters filter by exact match.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: type
        in: query
        description: Filter by filter type
        schema:
          type: string
          enum: [header, body, mime_header, nested_header]
      - name: action
        in: query
        description: Filter by action type
        schema:
          type: string
          enum: [DISCARD, DUNNO, FILTER, HOLD, IGNORE, PREPEND, REDIRECT, REPLACE, REJECT, WARN]
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of mail content filter rules
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/MailContentFilter.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Mail Content Filters
    summary: Create a new mail content filter rule
    description: |
      Creates a new mail content filter rule.

      ### Validation Rules
      - `pattern` is required
      - `server_id` must reference a mail server and cannot be changed after creation
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailContentFilter.yaml'
    responses:
      '201':
        description: Mail content filter rule created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailContentFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/mail/content-filters/{id}:
  get:
    tags:
      - Mail Content Filters
    summary: Get mail content filter rule by ID
    description: Returns a single mail content filter rule by its ID
    parameters:
      - name: id
        in: path
        description: Mail content filter rule ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Mail content filter rule details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailContentFilter.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Mail Content Filters
    summary: Update mail content filter rule
    description: |
      Updates an existing mail content filter rule.

      ### Notes
      - `server_id` cannot be changed after creation
      - All other fields can be updated
    parameters:
      - name: id
        in: path
        description: Mail content filter rule ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/MailContentFilter.yaml'
    responses:
      '200':
        description: Mail content filter rule updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/MailContentFilter.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Mail Content Filters
    summary: Delete mail content filter rule
    description: |
      Deletes a mail content filter rule by ID.

      The operation is permanent and cannot be undone.
    parameters:
      - name: id
        in: path
        description: Mail content filter rule ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Mail content filter rule deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
