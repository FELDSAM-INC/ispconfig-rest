# DNS SOA (Start of Authority) endpoints
/dns/soa:
  get:
    tags:
      - DNS
    summary: List all DNS zones
    description: |
      Returns a paginated list of DNS zones.

      ### Filtering
      Results can be filtered with the declared query parameters (plain
      equality). The `origin` filter additionally supports `*` as a wildcard
      (e.g. `origin=exa*`).

      ### Sorting & Pagination
      Use the shared `sort`, `order` (asc/desc, default asc), `limit`
      (default 25, max 100) and `offset` parameters.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: origin
        in: query
        description: Filter by zone origin (supports `*` as wildcard)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
      - name: client_id
        in: query
        description: Filter by owning client (resolved through the client's sys_group).
        required: false
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: A list of DNS zones
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/DnsSoa.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - DNS
    summary: Create a new DNS zone
    description: |
      Creates a new DNS zone with the specified configuration.

      The write is journaled to ISPConfig's `sys_datalog` and applied
      asynchronously by the DNS server. The SOA `serial` is generated
      server-side.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsSoa.yaml'
    responses:
      '201':
        description: DNS zone created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsSoa.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/dns/soa/{id}:
  get:
    tags:
      - DNS
    summary: Get DNS zone by ID
    description: Returns a single DNS zone by its ID
    parameters:
      - name: id
        in: path
        description: DNS zone ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: DNS zone details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsSoa.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - DNS
    summary: Update DNS zone
    description: |
      Updates an existing DNS zone configuration.

      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.

      The SOA `serial` is bumped automatically on every successful update
      (legacy parity); client-supplied serials are ignored.
    parameters:
      - name: id
        in: path
        description: DNS zone ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsSoa.yaml'
    responses:
      '200':
        description: DNS zone updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsSoa.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - DNS
    summary: Delete DNS zone
    description: |
      Deletes an **empty** DNS zone by ID (journaled to `sys_datalog`).

      A zone that still contains DNS records is refused with 400. This is an
      intentional deviation from legacy ISPConfig, which cascade-deletes all
      records of the zone: this API requires consumers to delete the zone's
      records first.
    parameters:
      - name: id
        in: path
        description: DNS zone ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: DNS zone deleted successfully
      '400':
        description: |
          Bad Request — the zone cannot be deleted because it still contains
          DNS records (RFC 9457 problem details; the `detail` member includes
          the record count). Delete the zone's records first.
          Intentional deviation from legacy ISPConfig's cascade delete.
        content:
          application/problem+json:
            schema:
              $ref: '../../components/schemas/Problem.yaml'
            example:
              type: 'about:blank'
              title: Bad Request
              status: 400
              detail: Cannot delete zone that contains DNS records (3 associated records).
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
