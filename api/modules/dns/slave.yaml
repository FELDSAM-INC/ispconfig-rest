# DNS Slave Zone endpoints
/dns/slaves:
  get:
    tags:
      - DNS Slave Zones
    summary: List all DNS slave zones
    description: |
      Returns a paginated list of DNS slave (secondary) zones.

      ### Filtering
      Results can be filtered with the declared query parameters (plain
      equality). The `origin` filter additionally supports `*` as a wildcard
      (e.g. `origin=exa*`).

      ### Sorting & Pagination
      Use the shared `sort`, `order` (asc/desc, default asc), `limit`
      (default 25, max 100) and `offset` parameters.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: origin
        in: query
        description: Filter by zone origin (supports `*` as wildcard)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
      - name: server_id
        in: query
        description: Filter by server ID
        schema:
          type: integer
      - name: client_id
        in: query
        description: Filter by owning client (resolved through the client's sys_group).
        required: false
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: A list of DNS slave zones
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/DnsSlave.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - DNS Slave Zones
    summary: Create a new DNS slave zone
    description: |
      Creates a new DNS slave (secondary) zone that is transferred from an
      external master server. The write is journaled to `sys_datalog`.
      The combination of `origin` and `server_id` must be unique.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsSlave.yaml'
    responses:
      '201':
        description: DNS slave zone created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsSlave.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/dns/slaves/{id}:
  get:
    tags:
      - DNS Slave Zones
    summary: Get DNS slave zone by ID
    description: Returns a single DNS slave zone by its ID
    parameters:
      - name: id
        in: path
        description: DNS slave zone ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: DNS slave zone details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsSlave.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - DNS Slave Zones
    summary: Update DNS slave zone
    description: |
      Updates an existing DNS slave zone configuration.

      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.
    parameters:
      - name: id
        in: path
        description: DNS slave zone ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsSlave.yaml'
    responses:
      '200':
        description: DNS slave zone updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsSlave.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - DNS Slave Zones
    summary: Delete DNS slave zone
    description: Deletes a DNS slave zone by ID (journaled to `sys_datalog`)
    parameters:
      - name: id
        in: path
        description: DNS slave zone ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: DNS slave zone deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
