# DNS Template endpoints
/dns/templates:
  get:
    tags:
      - DNS Templates
    summary: List all DNS templates
    description: |
      Returns a paginated list of DNS zone templates.

      ### Filtering
      Results can be filtered with the declared query parameters (plain
      equality). The `name` filter additionally supports `*` as a wildcard
      (e.g. `name=Standard*`).

      ### Sorting & Pagination
      Use the shared `sort`, `order` (asc/desc, default asc), `limit`
      (default 25, max 100) and `offset` parameters.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: name
        in: query
        description: Filter by template name (supports `*` as wildcard)
        schema:
          type: string
      - name: visible
        in: query
        description: Filter by visibility status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of DNS templates
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/DnsTemplate.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - DNS Templates
    summary: Create a new DNS template
    description: |
      Creates a new DNS zone template. The write is journaled to
      `sys_datalog`. Each token in `fields` must be one of:
      DOMAIN, IP, IPV6, NS1, NS2, EMAIL, DKIM, DNSSEC.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsTemplate.yaml'
    responses:
      '201':
        description: DNS template created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsTemplate.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/dns/templates/{id}:
  get:
    tags:
      - DNS Templates
    summary: Get DNS template by ID
    description: Returns a single DNS template by its ID
    parameters:
      - name: id
        in: path
        description: DNS template ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: DNS template details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsTemplate.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - DNS Templates
    summary: Update DNS template
    description: |
      Updates an existing DNS template.

      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.
    parameters:
      - name: id
        in: path
        description: DNS template ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsTemplate.yaml'
    responses:
      '200':
        description: DNS template updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsTemplate.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - DNS Templates
    summary: Delete DNS template
    description: Deletes a DNS template by ID (journaled to `sys_datalog`)
    parameters:
      - name: id
        in: path
        description: DNS template ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: DNS template deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
