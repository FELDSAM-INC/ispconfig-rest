# DNS Resource Record endpoints
/dns/records:
  get:
    tags:
      - DNS Records
    summary: List all DNS resource records
    description: |
      Returns a paginated list of DNS resource records. Every record includes
      a computed `meta` object with its type-specific fields decomposed from
      the stored `aux`/`data` values.

      ### Filtering
      Results can be filtered with the declared query parameters (plain
      equality). The `name` filter additionally supports `*` as a wildcard
      (e.g. `name=www*`); the `data` filter matches substrings.

      ### Sorting & Pagination
      Use the shared `sort`, `order` (asc/desc, default asc), `limit`
      (default 25, max 100) and `offset` parameters.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: zone
        in: query
        description: Filter by zone ID
        schema:
          type: integer
      - name: type
        in: query
        description: |
          Filter by record type (case-insensitive). SPF/DKIM/DMARC records
          are stored as TXT rows, so filter with `type=TXT` to include them.
        schema:
          type: string
          enum: [A, AAAA, ALIAS, CNAME, DNAME, CAA, DS, HINFO, LOC, MX, NAPTR, NS, PTR, RP, SRV, SSHFP, TXT, TLSA, DNSKEY]
      - name: name
        in: query
        description: Filter by record name (supports `*` as wildcard)
        schema:
          type: string
      - name: data
        in: query
        description: Filter by record data (substring match)
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of DNS resource records
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/DnsRecord.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - DNS Records
    summary: Create a new DNS resource record
    description: |
      Creates a new DNS resource record in an existing zone. The write is
      journaled to `sys_datalog` and the parent zone's SOA serial is bumped
      automatically (legacy parity). `server_id` is inherited from the zone.

      ### Common fields (all record types)
      - `zone`: Zone ID (required)
      - `name`: Record name (required, e.g. `www`, `mail`)
      - `type`: Record type (required)
      - `ttl`: Time to live in seconds (default: 3600)
      - `active`: Whether the record is active (y/n, default: `y`)

      ### Type-specific fields
      Simple types take the wire value in `data`; structured types take
      human-friendly meta fields at the top level of the request — the server
      composes the stored `aux` and `data` (quoting, trailing dots, SPF/DMARC
      text assembly). See the DnsRecord schema for per-field details.

      | Type | Fields |
      |------|--------|
      | A | `data` (IPv4 address) |
      | AAAA | `data` (IPv6 address) |
      | CNAME, NS, PTR, ALIAS, DNAME | `data` (target hostname) |
      | TXT, DKIM, LOC, RP, DNSKEY | `data` (raw record text) |
      | MX | `priority`, `hostname` |
      | SRV | `priority`, `weight`, `port`, `hostname` |
      | TLSA | `cert_usage`, `selector`, `matching_type`, `hash` |
      | SSHFP | `algorithm`, `hash_type`, `hash` |
      | CAA | `caa_flag`, `caa_type`, `ca_issuer` (issue/issuewild) or `additional` (iodef) |
      | HINFO | `cpu`, `os` |
      | SPF | `allow_mx`, `allow_a`, `ipv4_address`, `ipv6_address`, `hostname`, `include`, `policy` |
      | DMARC | `policy`, `pct`, `rua`, `ruf`, `sp`, `adkim`, `aspf` |
      | NAPTR | `order`, `pref`, `naptr_flag`, `service`, `regexp`, `replacement` |
      | DS | `key_tag`, `algorithm`, `digest_type`, `digest` |

      SPF, DKIM and DMARC records are stored as `TXT` rows (legacy parity);
      reads classify them back via the computed `meta` object.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsRecord.yaml'
    responses:
      '201':
        description: DNS record created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsRecord.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/dns/records/{id}:
  get:
    tags:
      - DNS Records
    summary: Get DNS record by ID
    description: |
      Returns a single DNS record by its ID, including the computed `meta`
      object with the type-specific fields decomposed from `aux`/`data`.
    parameters:
      - name: id
        in: path
        description: DNS record ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: DNS record details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsRecord.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - DNS Records
    summary: Update DNS record
    description: |
      Updates an existing DNS record. The record's `stamp` and `serial` are
      refreshed and the parent zone's SOA serial is bumped automatically
      (legacy parity).

      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.

      See the POST endpoint for the type-specific fields.
    parameters:
      - name: id
        in: path
        description: DNS record ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DnsRecord.yaml'
    responses:
      '200':
        description: DNS record updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DnsRecord.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - DNS Records
    summary: Delete DNS record
    description: |
      Deletes a DNS record by ID (journaled to `sys_datalog`). The parent
      zone's SOA serial is bumped automatically (legacy parity).
    parameters:
      - name: id
        in: path
        description: DNS record ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: DNS record deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
