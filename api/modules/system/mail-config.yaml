openapi: 3.0.0
info:
  title: ISPConfig Mail Configuration API
  description: API for managing ISPConfig mail-related system configuration
  version: 1.0.0
servers:
  - url: /api/v1
    description: ISPConfig API v1

paths:
  /system/config/mail:
    get:
      tags: [System]
      summary: Get mail configuration
      description: Retrieve the mail-related system configuration
      security:
        - basicAuth: []
      responses:
        '200':
          description: Mail configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/SystemMailConfig.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'
    
    put:
      tags: [System]
      summary: Update mail configuration
      description: Update the mail-related system configuration
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SystemMailConfig.yaml'
      responses:
        '200':
          description: Mail configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Mail configuration updated successfully"
        '400':
          $ref: '../../components/responses/BadRequest.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '403':
          $ref: '../../components/responses/Forbidden.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'
