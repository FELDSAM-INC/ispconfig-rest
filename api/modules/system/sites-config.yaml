/system/config/sites:
  get:
    tags: [System]
    summary: Get sites configuration
    description: Retrieve the sites-related system configuration
    security:
      - basicAuth: []
    responses:
      '200':
        description: Sites configuration retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SystemSitesConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags: [System]
    summary: Update sites configuration
    description: Update the sites-related system configuration
    security:
      - basicAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SystemSitesConfig.yaml'
    responses:
      '200':
        description: Sites configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SystemSitesConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
