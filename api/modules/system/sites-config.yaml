# [sites] section of the global system configuration — GET/PUT only
# (singleton section of the sys_ini blob; no create, delete or list).
/system/config/sites:
  get:
    tags: [System]
    summary: Get sites configuration
    description: |
      Retrieve the `[sites]` section of the global system configuration,
      parsed from the INI-formatted `config` blob of the `sys_ini` singleton
      (row `sysini_id = 1`). Keys absent from the blob are returned with
      their ISPConfig defaults.
    responses:
      '200':
        description: Sites configuration retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SystemSitesConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags: [System]
    summary: Update sites configuration
    description: |
      Partially update the `[sites]` section of the global system configuration.

      Update semantics — read-merge-write on the `sys_ini` INI blob:
      - The current blob (singleton row `sysini_id = 1`) is read, the submitted
        keys are merged into the `[sites]` section, and the whole blob is
        re-serialized and written back in one operation.
      - Keys absent from the request are left unchanged (absent key =
        "leave unchanged", not "unset").
      - All other sections and all legacy `[sites]` keys not exposed by this
        schema are preserved untouched.
      - The write is persisted through a single `sys_datalog` update entry
        (`dbtable=sys_ini`, `action=u`) per ISPConfig's change-management
        system — never a direct, unjournaled table write.

      Returns the updated section.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/SystemSitesConfig.yaml'
    responses:
      '200':
        description: Sites configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SystemSitesConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
