openapi: 3.0.0
info:
  title: ISPConfig System Configuration API
  description: API for managing ISPConfig system configuration
  version: 1.0.0
servers:
  - url: /api/v1
    description: ISPConfig API v1

paths:
  /system/config:
    get:
      tags: [System]
      summary: Get system configuration
      description: Retrieve the current system configuration including all sections
      security:
        - basicAuth: []
      responses:
        '200':
          description: System configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/SystemConfig.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'
    
    put:
      tags: [System]
      summary: Update system configuration
      description: Update the system configuration (all sections or specific sections)
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/SystemConfig.yaml'
      responses:
        '200':
          description: System configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/SystemConfig.yaml'
        '400':
          $ref: '../../components/responses/BadRequest.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '403':
          $ref: '../../components/responses/Forbidden.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'
