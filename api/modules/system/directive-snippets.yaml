# Directive Snippets API — CRUD over the `directive_snippets` table
# (reusable Apache/nginx/PHP/proxy configuration snippets referenced by
# web_domain.directive_snippets_id). All writes are journaled through
# sys_datalog (insert/update/delete entries).

/system/directive-snippets:
  get:
    tags:
      - Directive Snippets
    summary: List all directive snippets
    description: Returns a paginated list of directive snippets
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: type
        in: query
        description: Filter snippets by type (apache, nginx, php, proxy)
        schema:
          type: string
          enum: [apache, nginx, php, proxy]
      - name: active
        in: query
        description: Filter snippets by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A paginated list of directive snippets
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/DirectiveSnippet.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Directive Snippets
    summary: Create a new directive snippet
    description: |
      Creates a new directive snippet.

      ### Validation rules
      - `name` is required and must be non-empty
      - `type` must be one of apache, nginx, php, proxy
      - the (`name`, `type`) pair must be unique — duplicates are rejected
        with 409 (application-enforced, mirroring the legacy
        `validate_server_directive_snippets` validator; there is no DB
        UNIQUE constraint)
      - `required_php_snippets` may only reference active snippets of type php

      ### Defaults
      - `customer_viewable` defaults to `false`, `active` to `true`,
        `update_sites` to `false` (DB defaults 'n'/'y'/'n')
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DirectiveSnippet.yaml'
    responses:
      '201':
        description: Directive snippet created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DirectiveSnippet.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/system/directive-snippets/{id}:
  get:
    tags:
      - Directive Snippets
    summary: Get a directive snippet by ID
    description: Returns a single directive snippet by its ID
    parameters:
      - name: id
        in: path
        description: ID of the directive snippet
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Directive snippet details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DirectiveSnippet.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Directive Snippets
    summary: Update a directive snippet
    description: |
      Updates an existing directive snippet. Keys absent from the request
      are left unchanged.

      ### In-use guards (rejected with 409, problem+json)
      A snippet is "in use" when a `web_domain` row references it via
      `directive_snippets_id` (apache/nginx snippets) or — for php snippets —
      when it is listed in the `required_php_snippets` of a snippet that is
      itself in use. While in use:
      - disabling `active` is rejected
      - disabling `customer_viewable` is rejected

      Changing (`name`, `type`) to a combination that already exists is also
      rejected with 409 (application-enforced uniqueness).

      ### Side effect: update_sites
      When the update is saved with `update_sites=true` and `active=true`, every
      affected `web_domain` row is re-emitted to `sys_datalog` as a *forced*
      full-record update (an entry is written even though no column changed),
      so the web servers rewrite the vhosts that use this snippet.
    parameters:
      - name: id
        in: path
        description: ID of the directive snippet
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DirectiveSnippet.yaml'
    responses:
      '200':
        description: Directive snippet updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DirectiveSnippet.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Directive Snippets
    summary: Delete a directive snippet
    description: |
      Deletes a directive snippet by ID.

      ### In-use guard (rejected with 409, problem+json)
      Deletion is blocked while the snippet is in use: an apache/nginx
      snippet referenced by any `web_domain.directive_snippets_id`, or a php
      snippet listed in the `required_php_snippets` of a snippet that is
      itself in use.
    parameters:
      - name: id
        in: path
        description: ID of the directive snippet
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Directive snippet deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
