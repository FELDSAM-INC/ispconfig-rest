# Web Folder User endpoints
/sites/web-folder-users:
  get:
    tags:
      - Web Folder Users
    summary: List all web folder users
    description: |
      Returns a paginated list of web folder users.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `web_folder_id` and `active` parameters below
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: web_folder_id
        in: query
        description: Filter by web folder ID
        schema:
          type: integer
          format: int64
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of web folder users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/WebFolderUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Web Folder Users
    summary: Create a new web folder user
    description: |
      Creates a new user for accessing a protected web folder.

      ### Server-side behavior (legacy parity)
      - `server_id` and `sys_groupid` are derived from the web folder and
        its parent web domain
      - A duplicate (`web_folder_id`, `username`) pair is rejected with 422
      - The password is stored as a SHA-512 crypt hash
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebFolderUser.yaml'
    responses:
      '201':
        description: Web folder user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebFolderUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/web-folder-users/{id}:
  get:
    tags:
      - Web Folder Users
    summary: Get web folder user by ID
    description: Returns a single web folder user by its ID
    parameters:
      - name: id
        in: path
        description: ID of the web folder user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Web folder user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebFolderUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Web Folder Users
    summary: Update web folder user
    description: |
      Updates an existing web folder user.

      ### Notes
      Only `password` and `active` can be updated; `username` and
      `web_folder_id` are immutable after creation (contract restriction,
      stricter than legacy).
    parameters:
      - name: id
        in: path
        description: ID of the web folder user
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              password:
                type: string
                format: password
                writeOnly: true
                maxLength: 255
                description: New password (stored as a SHA-512 crypt hash, never returned)
              active:
                type: boolean
                description: Whether the web folder user is active
                x-db-format: "y/n"
    responses:
      '200':
        description: Web folder user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebFolderUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Web Folder Users
    summary: Delete web folder user
    description: |
      Deletes a web folder user by ID. Access is revoked when the ISPConfig
      daemons process the change. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the web folder user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Web folder user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
