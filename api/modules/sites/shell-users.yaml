# Shell User endpoints
/sites/shell-users:
  get:
    tags:
      - Shell Users
    summary: List all shell users
    description: |
      Returns a paginated list of shell users.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `search` matches against the `username` column
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term matched against the username
        schema:
          type: string
    responses:
      '200':
        description: A list of shell users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ShellUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Shell Users
    summary: Create a new shell user
    description: |
      Creates a new shell user for a web domain.

      ### Server-side behavior (legacy parity)
      - The username is prefixed with the resolved `shelluser_prefix`; the
        prefixed name must not exceed 32 characters, must be unique and must
        not be blacklisted (e.g. `root`) — violations are rejected with 422
      - `server_id`, `dir`, `puser`, `pgroup` and `sys_groupid` are derived
        from the parent web domain
      - Depending on the system SSH authentication mode, either `password`
        (key mode) or `ssh_rsa` (password mode) is cleared
      - The password is stored as a SHA-512 crypt hash
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ShellUser.yaml'
    responses:
      '201':
        description: Shell user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ShellUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/shell-users/{id}:
  get:
    tags:
      - Shell Users
    summary: Get shell user by ID
    description: Returns a single shell user by its ID
    parameters:
      - name: id
        in: path
        description: ID of the shell user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Shell user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ShellUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Shell Users
    summary: Update shell user
    description: |
      Updates an existing shell user. Only include the fields you want to
      change; omitted fields remain unchanged.

      ### Server-side behavior (legacy parity)
      - The stored username keeps its original prefix
      - When `parent_domain_id` changes, `server_id`, `dir`, `puser`,
        `pgroup` and `sys_groupid` are re-derived from the new parent domain
      - Depending on the system SSH authentication mode, either `password`
        (key mode) or `ssh_rsa` (password mode) is cleared
    parameters:
      - name: id
        in: path
        description: ID of the shell user
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ShellUser.yaml'
    responses:
      '200':
        description: Shell user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ShellUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Shell Users
    summary: Delete shell user
    description: Deletes a shell user by ID. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the shell user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Shell user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
