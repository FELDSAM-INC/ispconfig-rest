# FTP User endpoints
/sites/ftp-users:
  get:
    tags:
      - FTP Users
    summary: List all FTP users
    description: |
      Returns a paginated list of FTP users.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `search` matches against the `username` column
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term matched against the username
        schema:
          type: string
    responses:
      '200':
        description: A list of FTP users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/FtpUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - FTP Users
    summary: Create a new FTP user
    description: |
      Creates a new FTP user for a web domain.

      ### Server-side behavior (legacy parity)
      - The username is prefixed with the resolved `ftpuser_prefix`; a
        duplicate full username is rejected with 422
      - `server_id`, `dir`, `uid`, `gid` and `sys_groupid` are derived from
        the parent web domain
      - The password is stored as a SHA-512 crypt hash
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/FtpUser.yaml'
    responses:
      '201':
        description: FTP user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/FtpUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/ftp-users/{id}:
  get:
    tags:
      - FTP Users
    summary: Get FTP user by ID
    description: Returns a single FTP user by its ID
    parameters:
      - name: id
        in: path
        description: ID of the FTP user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: FTP user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/FtpUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - FTP Users
    summary: Update FTP user
    description: |
      Updates an existing FTP user. Only include the fields you want to
      change; omitted fields remain unchanged.

      ### Server-side behavior (legacy parity)
      - The stored username keeps its original prefix
      - When `parent_domain_id` changes, `server_id`, `dir`, `uid`, `gid`
        and `sys_groupid` are re-derived from the new parent domain
    parameters:
      - name: id
        in: path
        description: ID of the FTP user
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/FtpUser.yaml'
    responses:
      '200':
        description: FTP user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/FtpUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - FTP Users
    summary: Delete FTP user
    description: Deletes an FTP user by ID. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the FTP user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: FTP user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
