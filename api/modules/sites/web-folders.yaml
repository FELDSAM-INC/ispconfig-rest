# Web Folder endpoints
/sites/web-folders:
  get:
    tags:
      - Web Folders
    summary: List all web folders
    description: |
      Returns a paginated list of protected web folders.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `parent_domain_id` and `active` parameters below
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: parent_domain_id
        in: query
        description: Filter by parent domain ID
        schema:
          type: integer
          format: int64
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of web folders
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/WebFolder.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Web Folders
    summary: Create a new web folder
    description: |
      Creates a new protected folder for a web domain.

      ### Server-side behavior (legacy parity)
      - `server_id` and `sys_groupid` are derived from the parent web domain
      - A duplicate (`parent_domain_id`, `path`) pair is rejected with 422
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebFolder.yaml'
    responses:
      '201':
        description: Web folder created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebFolder.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/web-folders/{id}:
  get:
    tags:
      - Web Folders
    summary: Get web folder by ID
    description: Returns a single web folder by its ID
    parameters:
      - name: id
        in: path
        description: ID of the web folder
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Web folder details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebFolder.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Web Folders
    summary: Update web folder
    description: |
      Updates an existing web folder.

      ### Notes
      Only the `active` status can be updated; `path` and
      `parent_domain_id` are immutable after creation (contract restriction,
      stricter than legacy).
    parameters:
      - name: id
        in: path
        description: ID of the web folder
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              active:
                type: boolean
                description: Whether the web folder is active
                x-db-format: "y/n"
    responses:
      '200':
        description: Web folder updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebFolder.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Web Folders
    summary: Delete web folder
    description: |
      Deletes a web folder by ID.

      ### Cascade (legacy parity)
      All web folder users of this folder are deleted as well. The folder
      configuration is removed but not the directory contents. This action
      cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the web folder
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Web folder deleted successfully (including its folder users)
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
