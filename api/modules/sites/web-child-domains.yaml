# Web Child Domain endpoints
/sites/web-child-domains:
  get:
    tags:
      - Web Child Domains
    summary: List all web child domains
    description: |
      Returns a paginated list of web child domains (subdomains and alias
      domains).

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `type` and `parent_domain_id` parameters below
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: type
        in: query
        description: Filter by child domain type (subdomain or alias)
        schema:
          type: string
          enum: [subdomain, alias]
      - name: parent_domain_id
        in: query
        description: Filter by parent domain ID
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: A list of web child domains
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/WebChildDomain.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Web Child Domains
    summary: Create a new web child domain
    description: |
      Creates a new web child domain (subdomain or alias domain).

      ### Server-side behavior (legacy parity)
      - For subdomains, submit only the label in `domain`; the stored domain
        is composed as `{domain}.{parent domain}` and lower-cased
      - For alias domains, submit the full domain name
      - `server_id` and `sys_groupid` are copied from the parent web domain
      - `redirect_type=proxy` requires a URL (not a path) in `redirect_path`
      - A 409 is returned when the resulting domain already exists on the
        server (database unique key on `server_id`, `ip_address`, `domain`)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebChildDomain.yaml'
    responses:
      '201':
        description: Web child domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebChildDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/web-child-domains/{id}:
  get:
    tags:
      - Web Child Domains
    summary: Get web child domain by ID
    description: Returns a single web child domain by its ID
    parameters:
      - name: id
        in: path
        description: ID of the web child domain
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Web child domain details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebChildDomain.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Web Child Domains
    summary: Update web child domain
    description: |
      Updates an existing web child domain. Only include the fields you want
      to change; omitted fields remain unchanged.

      ### Server-side behavior (legacy parity)
      - Changing `parent_domain_id` re-syncs `sys_groupid` to the new
        parent's group and triggers a vhost-config regeneration for the old
        parent domain
      - `type` and `server_id` remain server-controlled
    parameters:
      - name: id
        in: path
        description: ID of the web child domain
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebChildDomain.yaml'
    responses:
      '200':
        description: Web child domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebChildDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Web Child Domains
    summary: Delete web child domain
    description: |
      Deletes a web child domain by ID. The web server configuration is
      updated asynchronously. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the web child domain
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Web child domain deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
