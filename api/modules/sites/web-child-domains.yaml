# Web Child Domain endpoints
/sites/web-child-domains:
  get:
    tags:
      - Web Child Domains
    summary: List all web child domains
    description: |
      Returns a paginated list of web child domains (subdomains and alias domains).
      The results can be filtered, sorted, and paginated.
      
      ### Filtering
      You can filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Example: `domain[ilike]=%example%&type[eq]=subdomain&active[eq]=y`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=id` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: type
        in: query
        description: Filter by child domain type (subdomain or alias)
        schema:
          type: string
          enum: [subdomain, alias]
      - name: parent_domain_id
        in: query
        description: Filter by parent domain ID
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: A list of web child domains
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/WebChildDomain.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Web Child Domains
    summary: Create a new web child domain
    description: |
      Creates a new web child domain (subdomain or alias domain).
      
      ### Validation Rules
      - Domain name must be unique within the parent domain for subdomains
      - Domain name must be globally unique for alias domains
      - Parent domain must exist and be accessible
      - User must have permission to create child domains
      - User must be within their allowed limits for child domains
      
      ### Notes
      - For subdomains, the `domain` field should not include the parent domain
      - The full domain will be constructed as `{domain}.{parent_domain}`
      - For alias domains, the `domain` field should be the full domain name
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebChildDomain.yaml'
    responses:
      '201':
        description: Web child domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebChildDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
        description: |
          Bad Request. Possible reasons:
          - Invalid domain format
          - Domain already exists
          - Parent domain not found or inaccessible
          - Invalid redirect configuration
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/web-child-domains/{id}:
  get:
    tags:
      - Web Child Domains
    summary: Get web child domain by ID
    description: Returns a single web child domain by its ID
    parameters:
      - name: id
        in: path
        description: ID of the web child domain
        required: true
        schema:
          type: integer
          format: int64 
    responses:
      '200':
        description: Web child domain details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebChildDomain.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Web Child Domains
    summary: Update web child domain
    description: |
      Updates an existing web child domain configuration.
      
      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.
      
      ### Notes
      - Changing the domain name or type may affect DNS and web server configuration
      - Some changes may require a web server reload
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebChildDomain.yaml'
    parameters:
      - name: id
        in: path
        description: ID of the web child domain
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Web child domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebChildDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Web Child Domains
    summary: Delete web child domain
    description: |
      Deletes a web child domain by ID.
      
      ### Notes
      - This will remove the web configuration and any associated files
      - DNS records will be updated if managed by ISPConfig
      - This action cannot be undone
    parameters:
      - name: id
        in: path
        description: ID of the web child domain
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Web child domain deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Child domain is currently in use
          - Insufficient permissions
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
