# Database User endpoints
/sites/database-users:
  get:
    tags:
      - Database Users
    summary: List all database users
    description: |
      Returns a paginated list of database users. The results can be filtered, sorted, and paginated.
      
      ### Filtering
      You can filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Example: `username[ilike]=%user%&active[eq]=y`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=username` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../../components/parameters/limit.yaml'
      - $ref: '../../../components/parameters/offset.yaml'
      - $ref: '../../../components/parameters/sort.yaml'
      - $ref: '../../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term to filter database users
        schema:
          type: string
    responses:
      '200':
        description: A list of database users
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../../components/schemas/DatabaseUser.yaml'
                pagination:
                  $ref: '../../../components/schemas/Pagination.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Database Users
    summary: Create a new database user
    description: Creates a new database user with the specified configuration
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/DatabaseUser.yaml'
    responses:
      '201':
        description: Database user created successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/DatabaseUser.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

/sites/database-users/{id}:
  parameters:
    - name: id
      in: path
      description: Database user ID
      required: true
      schema:
        type: integer
        format: int64
  get:
    tags:
      - Database Users
    summary: Get database user by ID
    description: Returns a single database user by its ID
    responses:
      '200':
        description: Database user details
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/DatabaseUser.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Database Users
    summary: Update database user
    description: |
      Updates an existing database user configuration.
      
      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/DatabaseUser.yaml'
    responses:
      '200':
        description: Database user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/DatabaseUser.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Database Users
    summary: Delete database user
    description: Deletes a database user by ID
    responses:
      '204':
        description: Database user deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Database user cannot be deleted because it's in use
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
