# Database User endpoints
/sites/database-users:
  get:
    tags:
      - Database Users
    summary: List all database users
    description: |
      Returns a paginated list of database users.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `search` matches against the `database_user` column
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term matched against the database username
        schema:
          type: string
    responses:
      '200':
        description: A list of database users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/DatabaseUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Database Users
    summary: Create a new database user
    description: |
      Creates a new database user (credential set referenced by databases).

      ### Server-side behavior (legacy parity)
      - The username is prefixed with the resolved `dbuser_prefix`; the
        prefixed name must not exceed 32 characters and must not be
        blacklisted (`root`, `mysql`, the control-panel DB user) —
        violations are rejected with 422
      - `server_id` is forced to 0 (provisioned on all relevant servers)
      - The plaintext password populates the MySQL, SHA2 and PostgreSQL
        hash columns; plaintext is never stored
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DatabaseUser.yaml'
    responses:
      '201':
        description: Database user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DatabaseUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/database-users/{id}:
  get:
    tags:
      - Database Users
    summary: Get database user by ID
    description: Returns a single database user by its ID
    parameters:
      - name: id
        in: path
        description: ID of the database user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Database user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DatabaseUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Database Users
    summary: Update database user
    description: |
      Updates an existing database user. Only include the fields you want to
      change; omitted fields remain unchanged.

      ### Server-side behavior (legacy parity)
      - The stored username keeps its original prefix
      - A changed password re-populates all hash columns
    parameters:
      - name: id
        in: path
        description: ID of the database user
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DatabaseUser.yaml'
    responses:
      '200':
        description: Database user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/DatabaseUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Database Users
    summary: Delete database user
    description: |
      Deletes a database user by ID. Databases still referencing this user
      lose their credentials — reassign them first. This action cannot be
      undone.
    parameters:
      - name: id
        in: path
        description: ID of the database user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Database user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
