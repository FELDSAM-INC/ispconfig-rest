# WebDAV User endpoints
/sites/webdav-users:
  get:
    tags:
      - WebDAV Users
    summary: List all WebDAV users
    description: |
      Returns a paginated list of WebDAV users.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `parent_domain_id` and `active` parameters below
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: parent_domain_id
        in: query
        description: Filter by parent domain ID
        schema:
          type: integer
          format: int64
      - name: active
        in: query
        description: Filter by active status
        schema:
          type: boolean
    responses:
      '200':
        description: A list of WebDAV users
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/WebdavUser.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - WebDAV Users
    summary: Create a new WebDAV user
    description: |
      Creates a new WebDAV user for a web domain directory.

      ### Server-side behavior (legacy parity)
      - The username is prefixed with the resolved `webdavuser_prefix`; a
        duplicate full username is rejected with 422
      - `server_id` and `sys_groupid` are derived from the parent web domain
      - `dir` must not contain `..` or `./`
      - The password is stored as the digest hash
        `md5(username:dir:password)`
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/WebdavUser.yaml'
    responses:
      '201':
        description: WebDAV user created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebdavUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/webdav-users/{id}:
  get:
    tags:
      - WebDAV Users
    summary: Get WebDAV user by ID
    description: Returns a single WebDAV user by its ID
    parameters:
      - name: id
        in: path
        description: ID of the WebDAV user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: WebDAV user details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebdavUser.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - WebDAV Users
    summary: Update WebDAV user
    description: |
      Updates an existing WebDAV user.

      ### Notes
      Only `password` and `active` can be updated; `username` and `dir` are
      immutable after creation (legacy restores the stored values). A changed
      password is re-digested with the stored username and dir.
    parameters:
      - name: id
        in: path
        description: ID of the WebDAV user
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              password:
                type: string
                format: password
                writeOnly: true
                maxLength: 255
                description: New password (stored as `md5(username:dir:password)` digest, never returned)
              active:
                type: boolean
                description: Whether the WebDAV user is active
                x-db-format: "y/n"
    responses:
      '200':
        description: WebDAV user updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/WebdavUser.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - WebDAV Users
    summary: Delete WebDAV user
    description: |
      Deletes a WebDAV user by ID. Access is revoked when the ISPConfig
      daemons process the change. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the WebDAV user
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: WebDAV user deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
