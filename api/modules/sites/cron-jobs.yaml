# Cron Job endpoints
/sites/cron-jobs:
  get:
    tags:
      - Cron Jobs
    summary: List all cron jobs
    description: |
      Returns a paginated list of cron jobs.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `search` matches against the `command` column
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term matched against the command
        schema:
          type: string
      - name: parent_domain_id
        in: query
        description: Filter by the parent web domain (web_domain id).
        required: false
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: A list of cron jobs
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/CronJob.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Cron Jobs
    summary: Create a new cron job
    description: |
      Creates a new cron job for a web domain.

      ### Server-side behavior (legacy parity)
      - `type` is derived server-side: http(s) commands become `url`,
        otherwise the owning client's `limit_cron_type` applies (`full` for
        admin-owned sites)
      - `server_id` and `sys_groupid` are copied from the parent web domain
      - Time fields are validated with the legacy `validate_cron` rules
        (see the CronJob schema); `@reboot` is accepted only in `run_month`
      - Commands are validated with the legacy `command_format` rules
        (URL parsing, `{DOMAIN}` substitution, no `\`/CR/LF/NUL)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/CronJob.yaml'
    responses:
      '201':
        description: Cron job created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/CronJob.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/cron-jobs/{id}:
  get:
    tags:
      - Cron Jobs
    summary: Get cron job by ID
    description: Returns a single cron job by its ID
    parameters:
      - name: id
        in: path
        description: ID of the cron job
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Cron job details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/CronJob.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Cron Jobs
    summary: Update cron job
    description: |
      Updates an existing cron job. Only include the fields you want to
      change; omitted fields remain unchanged.

      ### Validation (legacy parity)
      - Time fields follow the legacy `validate_cron` rules
      - `type` remains server-derived from the command and client limits
    parameters:
      - name: id
        in: path
        description: ID of the cron job
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/CronJob.yaml'
    responses:
      '200':
        description: Cron job updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/CronJob.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Cron Jobs
    summary: Delete cron job
    description: Deletes a cron job by ID. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the cron job
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Cron job deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
