# Database endpoints
/sites/databases:
  get:
    tags:
      - Databases
    summary: List all databases
    description: |
      Returns a paginated list of website databases.

      ### Query options
      - Pagination: `limit` (default 25, max 100) and `offset`
      - Sorting: `sort` (field name) and `order` (`asc`/`desc`)
      - Filtering: `search` matches against the `database_name` column
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term matched against the database name
        schema:
          type: string
      - name: parent_domain_id
        in: query
        description: Filter by the parent web domain (web_domain id).
        required: false
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: A list of databases
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/Database.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Databases
    summary: Create a new database
    description: |
      Creates a new website database.

      ### Server-side behavior (legacy parity)
      - The database name is prefixed with the resolved `dbname_prefix`;
        duplicate names on the same server and blacklisted names are
        rejected with 422
      - `parent_domain_id` must reference an existing vhost; the linked
        database users' `sys_groupid` is synced to the parent domain's group
      - When the web and database servers differ, the web server's IP is
        appended to `remote_ips` and `remote_access` is forced to `y`
      - An additional datalog update is written for the linked
        `database_user_id` / `database_ro_user_id` records
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Database.yaml'
    responses:
      '201':
        description: Database created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Database.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/databases/{id}:
  get:
    tags:
      - Databases
    summary: Get database by ID
    description: Returns a single database by its ID
    parameters:
      - name: id
        in: path
        description: ID of the database
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Database details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Database.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Databases
    summary: Update database
    description: |
      Updates an existing database. Only include the fields you want to
      change; omitted fields remain unchanged.

      ### Immutable fields (legacy parity)
      `database_name`, `database_charset` and `server_id` cannot be changed
      — attempts are rejected with 422. `database_user_id` is required.
      The remote-access auto-fix and the linked-user datalog sync run on
      update as well.
    parameters:
      - name: id
        in: path
        description: ID of the database
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Database.yaml'
    responses:
      '200':
        description: Database updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Database.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Databases
    summary: Delete database
    description: |
      Deletes a database by ID. The database and its grants are removed
      asynchronously by the ISPConfig daemons. This action cannot be undone.
    parameters:
      - name: id
        in: path
        description: ID of the database
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Database deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
