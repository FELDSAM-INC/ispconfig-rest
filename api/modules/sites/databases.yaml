# Database endpoints
/sites/databases:
  get:
    tags:
      - Databases
    summary: List all databases
    description: |
      Returns a paginated list of databases. The results can be filtered, sorted, and paginated.
      
      ### Filtering
      You can filter results using query parameters in the format `field[op]=value`.
      
      Supported operators:
      - `eq` - Equal to
      - `neq` - Not equal to
      - `gt` - Greater than
      - `gte` - Greater than or equal to
      - `lt` - Less than
      - `lte` - Less than or equal to
      - `like` - Case-sensitive pattern matching (use % as wildcard)
      - `ilike` - Case-insensitive pattern matching (use % as wildcard)
      - `in` - Value is in a comma-separated list
      
      Example: `database_name[ilike]=%prod%&type[eq]=mysql`
      
      ### Sorting
      Sort results using the `sort` parameter. Prefix with `-` for descending order.
      
      Example: `sort=database_name` or `sort=-created_at`
      
      ### Pagination
      - `page` - Page number (default: 1)
      - `per_page` - Items per page (default: 20, max: 100)
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: search
        in: query
        description: Search term to filter databases
        schema:
          type: string
    responses:
      '200':
        description: A list of databases
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/Database.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Databases
    summary: Create a new database
    description: Creates a new database with the specified configuration
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Database.yaml'
    responses:
      '201':
        description: Database created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Database.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/sites/databases/{id}:
  parameters:
    - name: id
      in: path
      description: Database ID
      required: true
      schema:
        type: integer
        format: int64
  get:
    tags:
      - Databases
    summary: Get database by ID
    description: Returns a single database by its ID
    responses:
      '200':
        description: Database details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Database.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Databases
    summary: Update database
    description: |
      Updates an existing database configuration.
      
      ### Partial Updates
      Only include the fields you want to update. Omitted fields will remain unchanged.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Database.yaml'
    responses:
      '200':
        description: Database updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Database.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Databases
    summary: Delete database
    description: Deletes a database by ID
    responses:
      '204':
        description: Database deleted successfully
      '400':
        description: |
          Bad Request. Possible reasons:
          - Database cannot be deleted because it's in use
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
