# Server Firewall API Endpoints
# Table: firewall (writes go through sys_datalog). Nested under a server:
# `server_id` is always taken from the {id} path parameter and is immutable
# (legacy firewall_edit.php::onBeforeUpdate).
#
# SINGLETON: the DB declares firewall.server_id UNIQUE (firewall.tform.php)
# — a server has AT MOST ONE firewall record. The resource is therefore
# modeled as a singleton: GET reads it (404 when absent), PUT upserts it
# (201 on create, 200 on update), DELETE removes it.

/servers/{id}/firewall:
  get:
    tags:
      - Server Firewall
    summary: Get the firewall record of a server
    description: |
      Returns the firewall record of the server. A server has at most one
      firewall record (UNIQUE on `firewall.server_id`); 404 is returned
      when the server has none (or the server does not exist).
    operationId: getServerFirewall
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Firewall record details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerFirewall.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Server Firewall
    summary: Create or replace the firewall record of a server
    description: |
      Upserts the firewall record of the server:
      - if the server has no firewall record yet, one is created
        (datalog insert on `firewall`) and **201** is returned;
      - if a record exists, it is updated (datalog update on `firewall`)
        and **200** is returned.

      `server_id` is always taken from the path and is immutable (legacy
      firewall_edit.php::onBeforeUpdate reverts any change); a request body
      value that differs from the path is rejected with 422.

      ### Validation Rules (legacy parity)
      - `tcp_port` / `udp_port` must match
        /^$|\d{1,5}(?::\d{1,5})?(?:,\d{1,5}(?::\d{1,5})?)*$/
        (comma-separated ports and low:high ranges; empty string = no ports).
    operationId: putServerFirewall
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerFirewall.yaml'
    responses:
      '200':
        description: Existing firewall record updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerFirewall.yaml'
      '201':
        description: Firewall record created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerFirewall.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Server Firewall
    summary: Delete the firewall record of a server
    description: >-
      Deletes the firewall record of the server (datalog delete on
      `firewall`). Returns 404 when the server has no firewall record.
    operationId: deleteServerFirewall
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '204':
        description: Firewall record deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
