# Server Firewall API Endpoints

/servers/{id}/firewall:
  get:
    tags:
      - Server Firewall
    summary: List all firewall rules
    description: |
      Returns a paginated list of firewall rules.
      
      ### Filtering
      - `server_id`: Filter by server ID
      - `active`: Filter by active status (y/n)
      - `tcp_port`: Filter by TCP port (partial match)
      - `udp_port`: Filter by UDP port (partial match)
      
      ### Sorting
      - `server_id`: Sort by server ID
      - `firewall_id`: Sort by rule ID
    operationId: listFirewallRules
    parameters:
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: active
        in: query
        description: Filter by active status (y/n)
        schema:
          type: string
          enum: [y, n]
      - name: tcp_port
        in: query
        description: Filter by TCP port (partial match)
        schema:
          type: string
      - name: udp_port
        in: query
        description: Filter by UDP port (partial match)
        schema:
          type: string
    responses:
      '200':
        description: A list of firewall rules
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ServerFirewall.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  post:
    tags:
      - Server Firewall
    summary: Create a new firewall rule
    description: |
      Creates a new firewall rule with the specified settings.
      
      ### Validation Rules
      - `server_id` must be a valid server ID
      - `tcp_port` must be a valid comma-separated list of ports or port ranges
      - `udp_port` must be a valid comma-separated list of ports or port ranges
      - `active` must be either 'y' or 'n'
    operationId: createFirewallRule
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerFirewall.yaml'
    responses:
      '201':
        description: Firewall rule created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerFirewall.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

/servers/{id}/firewall/{firewall_id}:
  get:
    tags:
      - Server Firewall
    summary: Get a firewall rule by ID
    description: Returns detailed information about a specific firewall rule
    operationId: getFirewallRule
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: firewall_id
        in: path
        description: ID of the firewall rule
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Firewall rule details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerFirewall.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  put:
    tags:
      - Server Firewall
    summary: Update a firewall rule
    description: |
      Updates an existing firewall rule with new settings.
      
      ### Validation Rules
      - `server_id` must be a valid server ID if provided
      - `tcp_port` must be a valid comma-separated list of ports or port ranges if provided
      - `udp_port` must be a valid comma-separated list of ports or port ranges if provided
      - `active` must be either 'y' or 'n' if provided
    operationId: updateFirewallRule
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: firewall_id
        in: path
        description: ID of the firewall rule
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerFirewall.yaml'
    responses:
      '200':
        description: Firewall rule updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerFirewall.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  delete:
    tags:
      - Server Firewall
    summary: Delete a firewall rule
    description: Deletes a firewall rule configuration
    operationId: deleteFirewallRule
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: firewall_id
        in: path
        description: ID of the firewall rule
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '204':
        description: Firewall rule deleted successfully
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []
