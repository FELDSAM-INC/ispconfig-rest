# Server Configuration endpoints
#
# The configuration is ONE INI-style text blob stored in the `config` column
# of the `server` table (parsed/serialized by legacy ISPConfig's ini_parser;
# see getconf::get_server_config). It always exists together with the server
# row, therefore there are no create/delete operations — the resource is
# read via GET and written one section at a time via PUT on the section
# endpoints below.
#
# Section PUT semantics (mirrors server_config_edit.php::onUpdateSave):
#   1. read the stored blob and parse it,
#   2. replace ONLY the target [section]; every other section and key —
#      including [global] and unknown sections — is preserved
#      byte-for-byte,
#   3. re-serialize with ISPConfig-compatible output and datalog-update the
#      `server` row's `config` field (action 'u' on table `server`).
# Within the updated section, omitted text/select keys keep their current
# value; omitted checkbox keys are written with their unchecked value,
# mirroring legacy form semantics.

# Main server configuration endpoints
/servers/{id}/configs:
  get:
    tags:
      - Server Configuration
    summary: Get the full configuration of a server
    description: >-
      Returns the fully parsed configuration blob of one server (all
      sections). Writes happen per section via the
      /servers/{id}/configs/{section} endpoints.
    operationId: getServerConfig
    parameters:
      - name: id
        in: path
        description: ID of the server
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Server configuration found
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

# Server ([server] section) configuration endpoints
/servers/{id}/configs/server:
  get:
    tags:
      - Server Configuration
    summary: Get the [server] configuration section of a server
    description: >-
      Returns the parsed [server] section of the server's configuration
      blob (network identity, firewall selection, logging, backups and
      monitoring).
    operationId: getServerServerConfig
    parameters:
      - name: id
        in: path
        description: ID of the server
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Server configuration section found
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerServerConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Server Configuration
    summary: Update the [server] configuration section of a server
    description: >-
      Replaces only the [server] section inside the configuration blob
      (read-merge-write, datalog update on the `server` row's `config`
      field; all other sections are preserved byte-for-byte). Omitted
      checkbox keys are written with their unchecked value ('n').
    operationId: updateServerServerConfig
    parameters:
      - name: id
        in: path
        description: ID of the server
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerServerConfig.yaml'
    responses:
      '200':
        description: Server configuration section updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerServerConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

