# Server Configuration API
# This API allows managing server configurations in ISPConfig

openapi: 3.0.0
info:
  title: Server Configuration API
  description: API for managing server configurations in ISPConfig
  version: 1.0.0

servers:
  - url: /api/v1
    description: ISPConfig API Server

tags:
  - name: Server Configuration
    description: Server configuration management
  - name: Server Mail Configuration
    description: Server mail service configuration
  - name: Server Web Configuration
    description: Server web service configuration
  - name: Server DNS Configuration
    description: Server DNS service configuration
  - name: Server FastCGI Configuration
    description: Server FastCGI configuration
  - name: Server XMPP Configuration
    description: Server XMPP service configuration
  - name: Server Jailkit Configuration
    description: Server Jailkit configuration
  - name: Server UFW Configuration
    description: Server UFW firewall configuration
  - name: Server Vlogger Configuration
    description: Server Vlogger configuration
  - name: Server Cron Configuration
    description: Server Cron configuration
  - name: Server Rescue Configuration
    description: Server Rescue system configuration

paths:
  # Main server configuration endpoints
  /server/configs:
    get:
      tags:
        - Server Configuration
      summary: List all server configurations
      description: Returns a paginated list of all server configurations
      security:
        - basicAuth: []
      parameters:
        - $ref: '../../components/parameters/offset.yaml'
        - $ref: '../../components/parameters/limit.yaml'
        - $ref: '../../components/parameters/order.yaml'
        - $ref: '../../components/parameters/sort.yaml'
      responses:
        '200':
          description: A paginated list of server configurations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '../../components/schemas/ServerConfig.yaml'
                  pagination:
                    $ref: '../../components/schemas/Pagination.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'

    post:
      tags:
        - Server Configuration
      summary: Create a new server configuration
      description: Creates a new server configuration
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerConfig.yaml'
      responses:
        '201':
          description: Server configuration created successfully
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/ServerConfig.yaml'
        '400':
          $ref: '../../components/responses/BadRequest.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'

  /server/configs/{server_id}:
    get:
      tags:
        - Server Configuration
      summary: Get server configuration by ID
      description: Returns a single server configuration by ID
      security:
        - basicAuth: []
      parameters:
        - $ref: '../../components/parameters/server_id.yaml'
      responses:
        '200':
          description: Server configuration found
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/ServerConfig.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '404':
          $ref: '../../components/responses/NotFound.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'

    put:
      tags:
        - Server Configuration
      summary: Update a server configuration
      description: Updates an existing server configuration
      security:
        - basicAuth: []
      parameters:
        - $ref: '../../components/parameters/server_id.yaml'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerConfig.yaml'
      responses:
        '200':
          description: Server configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/ServerConfig.yaml'
        '400':
          $ref: '../../components/responses/BadRequest.yaml'
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '404':
          $ref: '../../components/responses/NotFound.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'

    delete:
      tags:
        - Server Configuration
      summary: Delete a server configuration
      description: Deletes a server configuration by ID
      security:
        - basicAuth: []
      parameters:
        - $ref: '../../components/parameters/server_id.yaml'
      responses:
        '204':
          description: Server configuration deleted successfully
        '401':
          $ref: '../../components/responses/Unauthorized.yaml'
        '404':
          $ref: '../../components/responses/NotFound.yaml'
        '500':
          $ref: '../../components/responses/InternalServerError.yaml'

