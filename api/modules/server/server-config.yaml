# Mail configuration endpoints
/servers/{id}/configs/mail:
  get:
    tags:
      - Server Configuration
    summary: Get the [mail] configuration section of a server
    description: Returns the parsed [mail] section of the server's configuration blob
    operationId: getServerMailConfig
    parameters:
      - name: id
        in: path
        description: ID of the server
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Mail configuration found
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerMailConfig.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Server Configuration
    summary: Update the [mail] configuration section of a server
    description: |
      Replaces only the [mail] section inside the configuration blob
      (read-merge-write, datalog update on the `server` row's `config`
      field; all other sections are preserved byte-for-byte).

      ### Validation and side effects (legacy parity)
      - A nonzero `mailbox_size_limit` smaller than `message_size_limit` is
        rejected with 422 (legacy onSubmit check).
      - `rspamd_available` is always preserved from the stored blob; client
        input for it is ignored.
      - Switching `content_filter` to rspamd datalog-touches every
        spamfilter_users and spamfilter_wblist row of this server to trigger
        re-sync (legacy onAfterUpdate).
      - Omitted checkbox keys are written with their unchecked value ('n').
    operationId: updateServerMailConfig
    parameters:
      - name: id
        in: path
        description: ID of the server
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerMailConfig.yaml'
    responses:
      '200':
        description: Mail configuration updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerMailConfig.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

