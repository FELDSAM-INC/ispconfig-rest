  put:
    tags:
      - Server Configuration
    summary: Update the [rescue] configuration section of a server
    description: >-
      Replaces only the [rescue] section inside the configuration blob
      (read-merge-write, datalog update on the `server` row's `config`
      field; all other sections are preserved byte-for-byte). Omitted
      checkbox keys are written with their unchecked value ('n').
    operationId: updateServerRescueConfig
    parameters:
      - name: id
        in: path
        description: ID of the server
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerRescueConfig.yaml'
    responses:
