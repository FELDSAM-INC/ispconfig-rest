# Server PHP Versions API Endpoints

/servers/{id}/php-versions:
  get:
    tags:
      - Server PHP Versions
    summary: List all PHP versions
    description: Returns a list of all configured PHP versions with their settings
    operationId: listPhpVersions
    parameters:
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: A list of PHP versions
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ServerPhp.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  post:
    tags:
      - Server PHP Versions
    summary: Create a new PHP version
    description: Creates a new PHP version with the specified settings
    operationId: createPhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerPhp.yaml'
    responses:
      '201':
        description: PHP version created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerPhp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

/servers/{id}/php-versions/{php_version_id}:
  get:
    tags:
      - Server PHP Versions
    summary: Get a PHP version by ID
    description: Returns detailed information about a specific PHP version
    operationId: getPhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: php_version_id
        in: path
        description: ID of the PHP version
        required: true
        schema:
          type: integer
          format: int32
        example: 1
    responses:
      '200':
        description: PHP version details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerPhp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  put:
    tags:
      - Server PHP Versions
    summary: Update a PHP version
    description: Updates an existing PHP version with new settings
    operationId: updatePhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: php_version_id
        in: path
        description: ID of the PHP version
        required: true
        schema:
          type: integer
          format: int32
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerPhp.yaml'
    responses:
      '200':
        description: PHP version updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerPhp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  delete:
    tags:
      - Server PHP Versions
    summary: Delete a PHP version
    description: Deletes a PHP version configuration
    operationId: deletePhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: php_version_id
        in: path
        description: ID of the PHP version
        required: true
        schema:
          type: integer
          format: int32
        example: 1
    responses:
      '204':
        description: PHP version deleted successfully
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []
