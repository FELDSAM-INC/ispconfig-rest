# Server PHP Versions API Endpoints
# Table: server_php (writes go through sys_datalog). Nested under a server:
# `server_id` is always taken from the {id} path parameter. Legacy restricts
# PHP versions to servers with web_server = 1 AND mirror_server_id = 0.

/servers/{id}/php-versions:
  get:
    tags:
      - Server PHP Versions
    summary: List all PHP versions of a server
    description: Returns a paginated list of the additional PHP versions registered on the server
    operationId: listPhpVersions
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: A paginated list of PHP versions
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ServerPhp.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Server PHP Versions
    summary: Create a new PHP version
    description: |
      Registers an additional PHP version on the server (datalog insert on
      `server_php`; `server_id` is taken from the path).

      ### Validation Rules (legacy parity)
      - `name` is required, non-empty; tags/newlines stripped on save.
      - `php_cli_binary` is required and must match
        /^\/[a-zA-Z0-9\/\-\_\.\s]*$/ (absolute path).
      - `php_jk_section` is required and must match /^[a-zA-Z0-9\-\_]*$/.
      - FastCGI/FPM path fields are optional (max 255, tags/newlines
        stripped); `active` defaults to 'y'; `sortprio` defaults to 100;
        `client_id` defaults to 0.
      - The server should be a non-mirrored web server (legacy offers only
        servers with web_server = 1 AND mirror_server_id = 0) — otherwise 422.
    operationId: createPhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerPhp.yaml'
    responses:
      '201':
        description: PHP version created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerPhp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/servers/{id}/php-versions/{php_version_id}:
  get:
    tags:
      - Server PHP Versions
    summary: Get a PHP version by ID
    description: >-
      Returns detailed information about a specific PHP version.
      Returns 404 when the record exists but belongs to a different server.
    operationId: getPhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: php_version_id
        in: path
        description: ID of the PHP version
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: PHP version details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerPhp.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Server PHP Versions
    summary: Update a PHP version
    description: |
      Updates an existing PHP version (datalog update on `server_php`).
      The same validation rules as on create apply; `server_id` is taken
      from the path and cannot be changed.
    operationId: updatePhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: php_version_id
        in: path
        description: ID of the PHP version
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerPhp.yaml'
    responses:
      '200':
        description: PHP version updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerPhp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Server PHP Versions
    summary: Delete a PHP version
    description: Deletes a PHP version (datalog delete on `server_php`)
    operationId: deletePhpVersion
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: php_version_id
        in: path
        description: ID of the PHP version
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '204':
        description: PHP version deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
