# Servers API
# Table: server (writes go through sys_datalog; success responses confirm the
# datalog entry, not the asynchronously applied change).

/servers:
  get:
    tags:
      - Servers
    summary: List all servers
    description: Returns a paginated list of all servers
    operationId: listServers
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
    responses:
      '200':
        description: A paginated list of servers
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/Server.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Servers
    summary: Create a new server
    description: |
      Registers a new server row (datalog insert on `server`). In legacy
      ISPConfig server rows are normally created by the installer; this is an
      advanced operation.

      ### Behavior (legacy parity)
      - `server_name` is required; HTML tags and newlines are stripped on save.
      - Service-role flags and `active` are integers 0/1 (defaults: roles 0, active 1).
      - `mirror_server_id` is silently forced to 0 when it equals the new
        record's own ID (legacy server_edit.php::onSubmit).
    operationId: createServer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Server.yaml'
    responses:
      '201':
        description: Server created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Server.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/servers/{id}:
  get:
    tags:
      - Servers
    summary: Get a server by ID
    description: Returns a single server by its ID
    operationId: getServer
    parameters:
      - name: id
        in: path
        description: ID of the server to retrieve
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Server details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Server.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Servers
    summary: Update a server
    description: |
      Updates an existing server (datalog update on `server`).

      ### Behavior (legacy parity)
      - `mirror_server_id` is silently forced to 0 when it equals the
        record's own ID or when the record being edited is server 1
        (legacy server_edit.php::onSubmit).
      - `server_name` has HTML tags and newlines stripped on save.
    operationId: updateServer
    parameters:
      - name: id
        in: path
        description: ID of the server to update
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Server.yaml'
    responses:
      '200':
        description: Server updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/Server.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Servers
    summary: Delete a server
    description: |
      Deletes a server by ID (datalog delete on `server`).

      ### Warning (legacy parity)
      Dependent resources (websites, mail domains, DNS zones, server IPs,
      mirrors pointing at this server, ...) are NOT cascaded — legacy
      server_del.php runs a plain form delete with no cascade.
    operationId: deleteServer
    parameters:
      - name: id
        in: path
        description: ID of the server to delete
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '204':
        description: Server deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
