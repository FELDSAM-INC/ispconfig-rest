# Server IP Addresses API Endpoints
# Path: /server/ip-addresses

get:
  tags:
    - server
    - ip-addresses
  summary: List all server IP addresses
  description: Returns a list of all configured server IP addresses
  operationId: listServerIps
  parameters:
    - $ref: '../../../components/parameters/offset.yaml'
    - $ref: '../../../components/parameters/limit.yaml'
    - $ref: '../../../components/parameters/sort.yaml'
    - $ref: '../../../components/parameters/order.yaml'
  responses:
    '200':
      description: A list of server IP addresses
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '../../../components/schemas/ServerIp.yaml'
              pagination:
                $ref: '../../../components/schemas/Pagination.yaml'
    '400':
      $ref: '../../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../../components/responses/Unauthorized.yaml'
    '500':
      $ref: '../../../components/responses/InternalServerError.yaml'
  security:
    - basicAuth: []

post:
  tags:
    - server
    - ip-addresses
  summary: Create a new server IP address
  description: Creates a new server IP address with the specified settings
  operationId: createServerIp
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/ServerIp.yaml'
  responses:
    '201':
      description: Server IP address created successfully
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/ServerIp.yaml'
    '400':
      $ref: '../../../components/responses/BadRequest.yaml'
    '401':
      $ref: '../../../components/responses/Unauthorized.yaml'
    '403':
      $ref: '../../../components/responses/Forbidden.yaml'
    '500':
      $ref: '../../../components/responses/InternalServerError.yaml'
  security:
    - basicAuth: []

# Path: /server/ip-addresses/{ip_address_id}
'/{ip_address_id}':
  parameters:
    - name: ip_address_id
      in: path
      description: ID of the IP address
      required: true
      schema:
        type: integer
        format: int32
      example: 1

  get:
    tags:
      - server
      - ip-addresses
    summary: Get a server IP address by ID
    description: Returns detailed information about a specific server IP address
    operationId: getServerIp
    responses:
      '200':
        description: Server IP address details
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/ServerIp.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  put:
    tags:
      - server
      - ip-addresses
    summary: Update a server IP address
    description: Updates an existing server IP address with new settings
    operationId: updateServerIp
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/ServerIp.yaml'
    responses:
      '200':
        description: Server IP address updated successfully
        content:
          application/json:
            schema:
              $ref: '../../../components/schemas/ServerIp.yaml'
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  delete:
    tags:
      - server
      - ip-addresses
    summary: Delete a server IP address
    description: Deletes a server IP address configuration
    operationId: deleteServerIp
    responses:
      '204':
        description: Server IP address deleted successfully
      '400':
        $ref: '../../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []
