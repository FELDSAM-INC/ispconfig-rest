# Server IP Addresses API Endpoints
# Table: server_ip (writes go through sys_datalog). Nested under a server:
# `server_id` is always taken from the {id} path parameter and is immutable
# on update (legacy server_ip_edit.php::onBeforeUpdate).

/servers/{id}/ip-addresses:
  get:
    tags:
      - Server IPs
    summary: List all IP addresses of a server
    description: Returns a paginated list of the IP addresses registered on the server
    operationId: listServerIps
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: A paginated list of server IP addresses
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ServerIp.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Server IPs
    summary: Create a new server IP address
    description: |
      Registers a new IP address on the server (datalog insert on
      `server_ip`; `server_id` is taken from the path).

      ### Validation Rules (legacy parity)
      - `ip_address` must be valid for the declared `ip_type` (IPv4/IPv6,
        legacy validate_server::check_server_ip) — mismatch returns 422.
      - `ip_address` must be unique across ALL servers — duplicate returns 409.
      - `virtualhost_port` must match /^([0-9]{1,5}\,{0,1}){1,}$/i
        (default 80,443); `virtualhost` defaults to 'y'.
      - `client_id` must reference an existing client when nonzero
        (0 = unassigned) — a bad reference returns 400.
    operationId: createServerIp
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerIp.yaml'
    responses:
      '201':
        description: Server IP address created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/servers/{id}/ip-addresses/{ip_address_id}:
  get:
    tags:
      - Server IPs
    summary: Get a server IP address by ID
    description: >-
      Returns detailed information about a specific server IP address.
      Returns 404 when the record exists but belongs to a different server.
    operationId: getServerIp
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: ip_address_id
        in: path
        description: ID of the IP address
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Server IP address details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIp.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Server IPs
    summary: Update a server IP address
    description: |
      Updates an existing server IP address (datalog update on `server_ip`).

      ### Validation Rules (legacy parity)
      - `server_id` is immutable: an IP address cannot be moved to another
        server (legacy server_ip_edit.php::onBeforeUpdate) — a body value
        that differs from the current record returns 422.
      - Changing `ip_address` re-applies the per-type validation (422) and
        the table-wide uniqueness check (409).
    operationId: updateServerIp
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: ip_address_id
        in: path
        description: ID of the IP address
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerIp.yaml'
    responses:
      '200':
        description: Server IP address updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIp.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Server IPs
    summary: Delete a server IP address
    description: Deletes a server IP address (datalog delete on `server_ip`)
    operationId: deleteServerIp
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: ip_address_id
        in: path
        description: ID of the IP address
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '204':
        description: Server IP address deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
