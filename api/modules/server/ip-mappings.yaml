# Server IP Mappings API Endpoints (NAT source -> destination rewrites)
# Table: server_ip_map (writes go through sys_datalog). Nested under a
# server: `server_id` is always taken from the {id} path parameter.

/servers/{id}/ip-mappings:
  get:
    tags:
      - Server IPs
    summary: List all IP mappings of a server
    description: Returns a paginated list of the NAT IP mappings configured on the server
    operationId: listServerIpMappings
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: A paginated list of server IP mappings
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ServerIpMap.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Server IPs
    summary: Create a new server IP mapping
    description: |
      Creates a new NAT IP mapping on the server (datalog insert on
      `server_ip_map`; `server_id` is taken from the path).

      ### Validation Rules (legacy parity)
      - `source_ip` is required and non-empty (legacy NOTEMPTY).
      - `destination_ip` is required and must be a valid IPv4 address
        (legacy ISIPV4 — IPv6 destinations return 422).
      - `active` defaults to 'y'.
    operationId: createServerIpMapping
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerIpMap.yaml'
    responses:
      '201':
        description: Server IP mapping created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIpMap.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/servers/{id}/ip-mappings/{mapping_id}:
  get:
    tags:
      - Server IPs
    summary: Get a server IP mapping by ID
    description: >-
      Returns detailed information about a specific server IP mapping.
      Returns 404 when the record exists but belongs to a different server.
    operationId: getServerIpMapping
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: mapping_id
        in: path
        description: ID of the IP mapping
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '200':
        description: Server IP mapping details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIpMap.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Server IPs
    summary: Update a server IP mapping
    description: |
      Updates an existing server IP mapping (datalog update on
      `server_ip_map`). The same validation rules as on create apply;
      `server_id` is taken from the path and cannot be changed.
    operationId: updateServerIpMapping
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: mapping_id
        in: path
        description: ID of the IP mapping
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerIpMap.yaml'
    responses:
      '200':
        description: Server IP mapping updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIpMap.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Server IPs
    summary: Delete a server IP mapping
    description: Deletes a server IP mapping (datalog delete on `server_ip_map`)
    operationId: deleteServerIpMapping
    parameters:
      - name: id
        in: path
        description: Server ID
        required: true
        schema:
          type: integer
          format: int64
        example: 1
      - name: mapping_id
        in: path
        description: ID of the IP mapping
        required: true
        schema:
          type: integer
          format: int64
        example: 1
    responses:
      '204':
        description: Server IP mapping deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
