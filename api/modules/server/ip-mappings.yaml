# Server IP Mappings API Endpoints

/servers/{id}/ip-mappings:
  get:
    tags:
      - Server IPs
    summary: List all server IP mappings
    description: Returns a list of all configured server IP mappings
    operationId: listServerIpMappings
    parameters:
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
    responses:
      '200':
        description: A list of server IP mappings
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ServerIpMap.yaml'
                pagination:
                  $ref: '../../components/schemas/Pagination.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  post:
    tags:
      - Server IPs
    summary: Create a new server IP mapping
    description: Creates a new server IP mapping with the specified settings
    operationId: createServerIpMapping
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerIpMap.yaml'
    responses:
      '201':
        description: Server IP mapping created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIpMap.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

/servers/{id}/ip-mappings/{mapping_id}:
  parameters:
    - name: mapping_id
      in: path
      description: ID of the IP mapping
      required: true
      schema:
        type: integer
        format: int32
      example: 1

  get:
    tags:
      - Server IPs
    summary: Get a server IP mapping by ID
    description: Returns detailed information about a specific server IP mapping
    operationId: getServerIpMapping
    responses:
      '200':
        description: Server IP mapping details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIpMap.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  put:
    tags:
      - Server IPs
    summary: Update a server IP mapping
    description: Updates an existing server IP mapping with new settings
    operationId: updateServerIpMapping
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ServerIpMap.yaml'
    responses:
      '200':
        description: Server IP mapping updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ServerIpMap.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []

  delete:
    tags:
      - Server IPs
    summary: Delete a server IP mapping
    description: Deletes a server IP mapping configuration
    operationId: deleteServerIpMapping
    responses:
      '204':
        description: Server IP mapping deleted successfully
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
    security:
      - basicAuth: []
