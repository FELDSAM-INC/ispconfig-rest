# Client domain (domain module) endpoints

# Get all domains
/clients/domains:
  get:
    tags:
      - Client Domains
    summary: List all domains
    description: Returns a paginated list of domains registered in the domain module
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: client_id
        in: query
        description: Filter by owning client (resolved through the client's sys_group)
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: A list of domains
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ClientDomain.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Client Domains
    summary: Create a new domain
    description: |
      Creates a new domain owned by the given client. The domain row is stored
      with the client's sys_group and sys_perm_group 'ru'. Domain names are
      unique; creating a duplicate is rejected with 409.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ClientDomain.yaml'
    responses:
      '201':
        description: Domain created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ClientDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

# Get a specific domain
/clients/domains/{id}:
  get:
    tags:
      - Client Domains
    summary: Get a domain by ID
    description: Returns a single domain by its ID
    parameters:
      - name: id
        in: path
        description: Domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Domain details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ClientDomain.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Client Domains
    summary: Update a domain
    description: |
      Updates an existing domain's details. Renaming to a domain name that
      already exists is rejected with 409.
    parameters:
      - name: id
        in: path
        description: Domain ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ClientDomain.yaml'
    responses:
      '200':
        description: Domain updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ClientDomain.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Client Domains
    summary: Delete a domain
    description: Deletes a domain by its ID
    parameters:
      - name: id
        in: path
        description: Domain ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Domain deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
