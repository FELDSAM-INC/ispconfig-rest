# Reseller endpoints
/resellers:
  get:
    tags:
      - Resellers
    summary: List all resellers
    description: |
      Returns a paginated list of resellers with filtering, sorting, and pagination support.
      Resellers are clients with limit_client > 0 or = -1.
    parameters:
      - $ref: '../../components/parameters/limit.yaml'
      - $ref: '../../components/parameters/offset.yaml'
      - $ref: '../../components/parameters/sort.yaml'
      - $ref: '../../components/parameters/order.yaml'
      - name: contact_name
        in: query
        description: Filter by contact name (exact match)
        schema:
          type: string
      - name: company_name
        in: query
        description: Filter by company name (exact match)
        schema:
          type: string
      - name: email
        in: query
        description: Filter by email address (exact match)
        schema:
          type: string
      - name: customer_no
        in: query
        description: Filter by customer number (exact match)
        schema:
          type: string
    responses:
      '200':
        description: A list of resellers
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/ClientReseller.yaml'
                meta:
                  $ref: '../../components/schemas/Meta.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  post:
    tags:
      - Resellers
    summary: Create a new reseller
    description: |
      Create a new reseller with the provided details.
      The payload must satisfy the reseller condition (limit_client > 0 or -1);
      other values are rejected with 400.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ClientReseller.yaml'
    responses:
      '201':
        description: Reseller created successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ClientReseller.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

/resellers/{id}:
  get:
    tags:
      - Resellers
    summary: Get reseller by ID
    description: Returns a single reseller by ID
    parameters:
      - name: id
        in: path
        description: Reseller ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '200':
        description: Reseller details
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ClientReseller.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  put:
    tags:
      - Resellers
    summary: Update a reseller
    description: |
      Update an existing reseller's details.
      Setting limit_client to a non-reseller value (0) is rejected with 400.
    parameters:
      - name: id
        in: path
        description: Reseller ID
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/ClientReseller.yaml'
    responses:
      '200':
        description: Reseller updated successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/ClientReseller.yaml'
      '400':
        $ref: '../../components/responses/BadRequest.yaml'
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '422':
        $ref: '../../components/responses/UnprocessableEntity.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'

  delete:
    tags:
      - Resellers
    summary: Delete a reseller
    description: |
      Delete a reseller by ID.

      **Note:** A reseller cannot be deleted while clients are still assigned
      to it (parent_client_id); such requests are rejected with 409.
    parameters:
      - name: id
        in: path
        description: Reseller ID
        required: true
        schema:
          type: integer
          format: int64
    responses:
      '204':
        description: Reseller deleted successfully
      '401':
        $ref: '../../components/responses/Unauthorized.yaml'
      '403':
        $ref: '../../components/responses/Forbidden.yaml'
      '404':
        $ref: '../../components/responses/NotFound.yaml'
      '409':
        $ref: '../../components/responses/Conflict.yaml'
      '500':
        $ref: '../../components/responses/InternalServerError.yaml'
