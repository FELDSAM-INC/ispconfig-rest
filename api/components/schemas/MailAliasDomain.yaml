description: |
  A mail alias domain allows you to receive email for one domain and have it delivered to another domain.
  
  ### Key Features
  - Create domain aliases (e.g., receive email for @alias.com and deliver to @example.com)
  - Support for both standard aliases and forwarding
  - Active/inactive status for easy toggling
  
  ### Usage Notes
  - The source domain (alias) must be a valid domain that points to your mail server
  - The destination domain must be an existing mail domain in the system
  - Both source and destination domains must belong to the current user
  - Alias domains are automatically synchronized with the destination domain's server
  
  ### Example Use Cases
  - Brand protection: Receive email for multiple domains at a single inbox
  - Domain migration: Keep receiving email at old domain while transitioning to a new one
  - Simplified addressing: Use different domains for different purposes (e.g., @example.net for business, @example.com for personal)
