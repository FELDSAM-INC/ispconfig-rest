properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the mail alias domain
    example: 123
    x-db-field: id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID where the alias domain is hosted (inherited from destination domain)
    example: 1

  source:
    type: string
    description: |
      Source domain (the alias domain)
      - Must be a valid domain name
      - Must start with '@' (e.g., @alias.example.com)
      - Must be unique across all alias domains
      - Will be converted to lowercase on save
      - IDN domains are automatically converted to punycode
    example: "@alias.example.com"
    maxLength: 255
    pattern: '^@[\w\.\-]{1,255}\.[a-zA-Z0-9\-]{2,63}$'

  destination:
    type: string
    description: |
      Destination domain (the target domain)
      - Must be a valid domain name that exists in the system
      - Must belong to the current user
      - Must start with '@' (e.g., @example.com)
      - Cannot be the same as the source domain
      - Will be converted to lowercase on save
      - IDN domains are automatically converted to punycode
    example: "@example.com"
    maxLength: 255

  type:
    type: string
    description: |
      Type of alias domain
      - 'alias': Standard alias domain (all emails to source domain are delivered to destination domain)
      - 'forward': Forwarding alias (emails are forwarded to the destination domain)
    enum: [alias, forward]
    default: "alias"

  active:
    type: string
    description: |
      Whether the alias domain is active
      - 'y': Alias is active
      - 'n': Alias is inactive
