# There is NO mail_alias_domain table in ISPConfig. Alias domains are rows of
# mail_forwarding with type='aliasdomain' (PK forwarding_id) — verified against
# source_code/install/sql/ispconfig3.sql and
# source_code/interface/web/mail/form/mail_aliasdomain.tform.php (+ hidden
# type field in templates/mail_aliasdomain_edit.htm).
type: object
x-db-table: mail_forwarding
required:
  - source
  - destination
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the mail alias domain (mail_forwarding primary key)
    example: 123
    x-db-field: forwarding_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: |
      Server ID where the alias domain is hosted.
      Inherited from the destination mail domain (legacy parity) — not writable.
    example: 1
    x-db-field: server_id

  source:
    type: string
    description: |
      Source domain (the alias domain), stored with '@' prefix
      - Must start with '@' (e.g., @alias.example.com)
      - Must be an existing mail domain and different from the destination
      - Must be unique among alias domains
      - Will be converted to lowercase and punycode on save
      - Cannot be changed after creation
    example: "@alias.example.com"
    maxLength: 255
    pattern: '^@[\w\.\-]{1,255}\.[a-zA-Z0-9\-]{2,63}$'
    x-db-field: source

  destination:
    type: string
    description: |
      Destination domain (the target domain), stored with '@' prefix
      - Must start with '@' (e.g., @example.com)
      - Must be an existing mail domain
      - Cannot be the same as the source domain
      - Will be converted to lowercase and punycode on save
    example: "@example.com"
    maxLength: 255
    pattern: '^@[\w\.\-]{1,255}\.[a-zA-Z0-9\-]{2,63}$'
    x-db-field: destination

  active:
    type: boolean
    default: true
    description: Whether the alias domain is active
    x-db-field: active

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record (inherited from the destination mail domain)
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

description: |
  A mail alias domain delivers all email addressed to one domain (source) to
  the same local parts of another domain (destination).

  ### Storage
  Alias domains are stored as `mail_forwarding` rows with `type='aliasdomain'`
  (there is no dedicated table). The row's `type` is fixed and therefore not
  exposed as a property; `server_id` and `sys_groupid` are inherited from the
  destination mail domain, mirroring legacy ISPConfig.

  ### Usage Notes
  - Both domains must exist as mail domains in the system
  - Domains used as alias-domain sources are excluded from mailbox/forward
    domain choices in legacy ISPConfig
