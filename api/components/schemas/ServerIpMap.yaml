# Server IP Mapping Schema
type: object
x-db-table: server_ip_map
properties:
  server_ip_map_id:
    type: integer
    format: int32
    description: Unique identifier for the IP mapping
    readOnly: true
    example: 1
    x-db-field: server_ip_map_id
  sys_userid:
    type: integer
    format: int32
    description: System user ID who created the record
    readOnly: true
    example: 1
    x-db-field: sys_userid
  sys_groupid:
    type: integer
    format: int32
    description: System group ID
    readOnly: true
    example: 1
    x-db-field: sys_groupid
  sys_perm_user:
    type: string
    maxLength: 5
    description: User permissions (r = read, i = insert, u = update, d = delete)
    example: "riud"
    x-db-field: sys_perm_user
  sys_perm_group:
    type: string
    maxLength: 5
    description: Group permissions (r = read, i = insert, u = update, d = delete)
    example: "riud"
    x-db-field: sys_perm_group
  sys_perm_other:
    type: string
    maxLength: 5
    description: Other permissions (r = read, i = insert, u = update, d = delete)
    example: ""
    x-db-field: sys_perm_other
  server_id:
    type: integer
    format: int32
    description: ID of the server this IP mapping is associated with
    example: 1
    x-db-field: server_id
  source_ip:
    type: string
    format: ipv4
    description: Source IP address to be mapped
    example: "192.168.1.1"
    x-db-field: source_ip
  destination_ip:
    type: string
    format: ipv4
    description: Destination IP address to map to
    example: "10.0.0.1"
    x-db-field: destination_ip
  active:
    type: string
    enum: ["y", "n"]
    description: Whether this IP mapping is active
    default: "y"
    example: "y"
    x-db-field: active
required:
  - server_id
  - source_ip
  - destination_ip
