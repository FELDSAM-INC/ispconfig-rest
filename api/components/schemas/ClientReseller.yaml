# Reseller resource — same `client` table as Client.yaml (there is no separate
# reseller table in ispconfig3.sql). A reseller is a client whose limit_client
# is > 0 or -1; the /resellers endpoints only ever read/write such rows.
x-db-table: client
description: >-
  Represents a reseller: a client (same `client` table) with
  `limit_client > 0` or `limit_client = -1`. All Client properties apply;
  `limit_client` is mandatory and must satisfy the reseller condition
  (a value of 0 is rejected because it would demote the reseller to a
  regular client).
allOf:
  - $ref: './Client.yaml'
  - type: object
    required:
      - limit_client
    properties:
      limit_client:
        type: integer
        description: >-
          Maximum number of clients this reseller may create.
          Must be greater than 0, or -1 for unlimited. 0 is not a valid
          reseller value and is rejected with 400.
        example: 10
