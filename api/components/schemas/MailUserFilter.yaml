type: object
x-db-table: mail_user_filter
required:
  - mailuser_id
  - rulename
  - source
  - op
  - searchterm
  - action
  - active
properties:
  filter_id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the filter rule
    example: 1
    x-db-field: filter_id

  mailuser_id:
    type: integer
    format: int64
    description: ID of the mail user this filter belongs to
    example: 1
    x-db-field: mailuser_id

  rulename:
    type: string
    description: Name of the filter rule
    example: "Block newsletters"
    maxLength: 255
    x-db-field: rulename

  source:
    type: string
    description: Email header or field to filter on
    enum: [subject_txt, from_txt, to_txt, list_id_txt, header_txt, size_over_txt]
    example: subject_txt
    x-db-field: source

  op:
    type: string
    description: Operation to perform for matching
    enum: [contains_txt, is_txt, begins_with_txt, ends_with_txt, regex_txt, localpart_txt, domain_txt]
    example: contains_txt
    x-db-field: op

  searchterm:
    type: string
    description: Text or pattern to search for
    example: "newsletter"
    maxLength: 255
    x-db-field: searchterm

  action:
    type: string
    description: Action to take when the filter matches
    enum: [move_to_folder, forward_to, delete, redirect_to, stop_processing, mark_as_read, flag]
    example: move_to_folder
    x-db-field: action

  action_value:
    type: string
    description: Value for the action (e.g., folder name, email address)
    example: "Junk"
    maxLength: 255
    x-db-field: action_value

  active:
    type: string
    enum: [y, n]
    default: y
    description: Whether the filter rule is active
    x-db-field: active

description: |
  Email filter rules for mail users.
  
  ### Features
  - Filter emails based on various headers and content
  - Multiple matching operations
  - Various actions for matched emails
  - Can be enabled/disabled
  
  ### Validation Rules
  - Rule name is required
  - Valid source field must be selected
  - Valid operation must be selected
  - Search term is required
  - Valid action must be selected
  
  ### Notes
  - Filters are processed in order of their ID
  - System administrators can manage all filters
  - Regular users can only manage their own filters
