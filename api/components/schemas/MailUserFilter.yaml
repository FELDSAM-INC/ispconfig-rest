# Verified against source_code/install/sql/ispconfig3.sql (table mail_user_filter)
# and source_code/interface/web/mail/form/mail_user_filter.tform.php.
# Enum values are the values legacy actually STORES (not UI language keys).
type: object
x-db-table: mail_user_filter
required:
  - rulename
  - source
  - op
  - searchterm
  - action
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the filter rule
    example: 1
    x-db-field: filter_id

  mailuser_id:
    type: integer
    format: int64
    readOnly: true
    description: ID of the mail user this filter belongs to (taken from the URL path)
    example: 1
    x-db-field: mailuser_id

  rulename:
    type: string
    description: Name of the filter rule
    example: "Block newsletters"
    maxLength: 64
    x-db-field: rulename

  source:
    type: string
    description: Message attribute to match on (stored values per legacy mail_user_filter form)
    enum: [Subject, From, To, List-Id, Header, Size]
    example: Subject
    x-db-field: source

  op:
    type: string
    description: |
      Matching operation (stored values per legacy mail_user_filter form).
      `localpart` and `domain` apply to address fields, `regex` to any source;
      for `Size` the search term is compared numerically.
    enum: [contains, is, begins, ends, regex, localpart, domain]
    example: contains
    x-db-field: op

  searchterm:
    type: string
    description: Text or pattern to search for
    example: "newsletter"
    maxLength: 255
    x-db-field: searchterm

  action:
    type: string
    description: |
      Action to take when the filter matches (stored values per legacy form):
      - move: file the message into the folder named by `target`
      - delete: discard the message
      - keep: keep the message (stop further filtering)
      - reject: reject the message
    enum: [move, delete, keep, reject]
    example: move
    x-db-field: action

  target:
    type: string
    description: |
      Target of the action (e.g. folder name for `move`).
      Validated with the legacy pattern below (max 100 characters).
    example: "Junk"
    maxLength: 100
    pattern: "^[\\p{Latin}0-9\\.\\'\\-\\_\\ \\&\\/]{0,100}$"
    x-db-field: target

  active:
    type: boolean
    default: true
    description: Whether the filter rule is active (inactive rules generate no sieve code)
    x-db-field: active

description: |
  Server-side mail sorting rule for a mailbox (table `mail_user_filter`).

  ### Side effects
  Every create/update/delete regenerates the owning mailbox's
  `mail_user.custom_mailfilter`: the block between `### BEGIN FILTER_ID:<id>`
  and `### END FILTER_ID:<id>` is replaced/removed (new rules are prepended,
  inactive rules render nothing), and a `mail_user` datalog update is emitted
  alongside the `mail_user_filter` entry. Rule syntax (sieve or maildrop)
  follows the server mail config `mail_filter_syntax`.
