# Verified against source_code/install/sql/ispconfig3.sql (table spamfilter_wblist)
# and source_code/interface/web/mail/form/spamfilter_blacklist.tform.php /
# spamfilter_whitelist.tform.php.
type: object
x-db-table: spamfilter_wblist
required:
  - server_id
  - email
  - rid
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the whitelist/blacklist entry
    example: 1
    x-db-field: wblist_id

  server_id:
    type: integer
    format: int64
    description: |
      Server ID where the spamfilter is configured
      - Must reference a mail server (server.mail_server=1, mirror_server_id=0)
    example: 1
    x-db-field: server_id

  wb:
    type: string
    description: Type of list entry (stored uppercase, exact casing preserved)
    enum: [W, B]
    default: "B"
    x-db-field: wb
    x-enum-titles:
      W: "Whitelist"
      B: "Blacklist"

  rid:
    type: integer
    format: int64
    description: |
      Recipient reference — the spamfilter user ID the entry applies to
      - Must reference an existing spamfilter user
      - `rid=0` is accepted but has NO effect on Rspamd systems (the server
        plugin skips entries whose rid does not resolve); use
        /mail/access-rules for global rules
      - Cannot be changed after creation
    default: 0
    example: 1
    x-db-field: rid

  email:
    type: string
    description: |
      Sender email address or pattern to white/blacklist
      - Lowercased and IDN-encoded on save
      - Cannot be changed after creation
    maxLength: 255
    example: "spammer@example.com"
    x-db-field: email

  priority:
    type: integer
    description: |
      Priority of the rule (1-10; legacy form default 5).
      Note: the database column default is 0.
    minimum: 1
    maximum: 10
    default: 5
    example: 5
    x-db-field: priority

  active:
    type: boolean
    default: true
    description: Whether the rule is active
    x-db-field: active

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

description: |
  Per-recipient whitelist/blacklist entry for the spamfilter
  (table `spamfilter_wblist`).

  ### Server side effects
  On Rspamd systems each entry becomes a per-user file
  (`spamfilter_wblist_<id>.conf`); the recipient is resolved via `rid` against
  the spamfilter users table. Entries with an unresolvable `rid` (including
  rid=0) are skipped — global filtering belongs in /mail/access-rules.
