type: object
x-db-table: web_folder_user
description: |
  An HTTP-auth credential for a protected web folder — table
  `web_folder_user` (primary key `web_folder_user_id`).

  ### Server-derived fields
  `server_id` and `sys_groupid` are always derived from the web folder
  (and its parent web domain).

  ### Constraints
  - The (`web_folder_id`, `username`) pair must be unique (legacy duplicate
    check)
  - Only `password` and `active` can be changed after creation (contract
    restriction; stricter than legacy)

  ### Password storage
  `password` is write-only and stored as a SHA-512 crypt hash (legacy
  `CRYPT` encryption). Plaintext is never stored or returned.
required:
  - web_folder_id
  - username
  - password
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the web folder user (database column `web_folder_user_id`)
    example: 123
    x-db-field: web_folder_user_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID — always derived from the web folder
    example: 1

  web_folder_id:
    type: integer
    format: int64
    description: ID of the web folder this user can access
    example: 42

  username:
    type: string
    minLength: 1
    maxLength: 64
    pattern: '^[\w\.\-]{1,64}$'
    description: |
      Username for HTTP authentication. Legacy regex `/^[\w\.\-]{0,64}$/`.
      Must be unique within the web folder.
    example: "user123"

  password:
    type: string
    format: password
    writeOnly: true
    maxLength: 255
    description: |
      Password for HTTP authentication. Write-only — never returned in
      responses. Stored as a SHA-512 crypt hash (legacy `CRYPT` encryption).
    example: "securePassword123"

  active:
    type: boolean
    default: true
    description: Whether the web folder user is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID — always synced from the web folder's parent domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the folder
    example: "web1.example.com"

  web_folder_path:
    type: string
    readOnly: true
    description: Path of the web folder this user can access
    example: "/protected"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
