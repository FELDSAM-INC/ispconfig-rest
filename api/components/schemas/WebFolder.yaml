type: object
x-db-table: web_folder
description: |
  An HTTP-auth protected directory of a website — table `web_folder`
  (primary key `web_folder_id`).

  ### Usage
  Used together with web folder users to password-protect a directory.
  The path is relative to the website's document root.

  ### Server-derived fields
  `server_id` and `sys_groupid` are always derived from the parent web
  domain.

  ### Constraints
  - The (`parent_domain_id`, `path`) pair must be unique (legacy duplicate
    check)
  - Only `active` can be changed after creation (contract restriction;
    stricter than legacy)
  - Deleting a folder also deletes all of its web folder users (cascade)
required:
  - parent_domain_id
  - path
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the web folder (database column `web_folder_id`)
    example: 123
    x-db-field: web_folder_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID — always derived from the parent web domain
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain
    example: 42

  path:
    type: string
    maxLength: 255
    pattern: '^[\w\.\-\/]{1,255}$'
    default: "/"
    description: |
      Path of the protected folder relative to the website's document root.
      Legacy regex `/^[\w\.\-\_\/]{0,255}$/` (letters, digits, underscore,
      dot, hyphen, slash). Must be unique per parent domain.
    example: "/protected"

  active:
    type: boolean
    default: true
    description: Whether the folder protection is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID — always synced from the parent web domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the folder
    example: "web1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
