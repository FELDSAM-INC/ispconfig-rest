type: object
x-db-table: web_folder
required:
  - server_id
  - parent_domain_id
  - path
  - active
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the web folder
    example: 123
    x-db-field: id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID where the web folder is located
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain
    example: 42

  path:
    type: string
    description: |
      Path to the web folder relative to the website's document root
      
      ### Validation Rules:
      - Must be a valid path
      - Can only contain alphanumeric characters, dots, hyphens, underscores, and forward slashes
      - Must start with a forward slash (/)
      - Maximum length: 255 characters
    default: "/"
    pattern: '^[\w\.\-\_\/]{1,255}$'
    example: "/uploads"

  active:
    type: string
    description: Whether the web folder is active
    enum: [y, n]
    default: "y"


  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1

  sys_perm:
    type: string
    readOnly: true
    description: Permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""

  created_at:
    type: string
    format: date-time
    readOnly: true
    description: Creation timestamp
    example: "2023-01-01T12:00:00Z"

  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: Last update timestamp
    example: "2023-01-01T12:00:00Z"

  # Response only fields (not for input)
  server_name:
    type: string
    readOnly: true
    description: Name of the server where the web folder is located
    example: "server1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"

description: |
  A web folder represents a directory within a website that can be protected with HTTP authentication.
  
  ### Key Features
  - Defines a directory path within a website
  - Can be protected with HTTP authentication
  - Can be enabled or disabled
  
  ### Usage
  - Used in conjunction with web folder users to create protected directories
  - The path is relative to the website's document root
  
  ### Security Notes
  - Only active folders are protected
  - Actual file permissions on the server must also be set correctly
