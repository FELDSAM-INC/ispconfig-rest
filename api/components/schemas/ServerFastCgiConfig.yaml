type: object
x_db_table: server
required:
  - fastcgi_server
  - fastcgi_socket
  - fastcgi_port
  - fastcgi_children
properties:
  fastcgi_server:
    type: string
    enum: [y, n]
    description: Whether FastCGI server is enabled
    example: "y"
  fastcgi_socket:
    type: string
    description: Path to FastCGI socket
    example: "/var/run/php/php-fpm.sock"
  fastcgi_port:
    type: integer
    minimum: 1
    maximum: 65535
    description: Port for FastCGI service
    example: 9000
  fastcgi_children:
    type: integer
    description: Number of FastCGI children
    example: 5
  fastcgi_max_requests:
    type: integer
    description: Maximum number of requests per FastCGI process
    example: 500
  fastcgi_idle_timeout:
    type: integer
    description: Idle timeout for FastCGI processes (seconds)
    example: 30
  fastcgi_process_manager:
    type: string
    enum: [static, dynamic, ondemand]
    description: Process manager for FastCGI
    example: "dynamic"
  fastcgi_start_servers:
    type: integer
    description: Number of FastCGI start servers
    example: 2
  fastcgi_min_spare_servers:
    type: integer
    description: Minimum number of FastCGI spare servers
    example: 1
  fastcgi_max_spare_servers:
    type: integer
    description: Maximum number of FastCGI spare servers
    example: 3
  fastcgi_pm_max_requests:
    type: integer
    description: Maximum number of requests per FastCGI server
    example: 500
  fastcgi_pm_status_path:
    type: string
    description: Path for FastCGI status page
    example: "/status"
  fastcgi_pm_ping_path:
    type: string
    description: Path for FastCGI ping page
    example: "/ping"
