# Verified against source_code/install/sql/ispconfig3.sql (table mail_access) and
# source_code/interface/web/mail/form/mail_blacklist.tform.php / mail_whitelist.tform.php.
type: object
x-db-table: mail_access
required:
  - server_id
  - source
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the mail access rule
    example: 123
    x-db-field: access_id

  server_id:
    type: integer
    format: int64
    description: |
      Server ID where the access rule is configured
      - Must reference a mail server (server.mail_server=1, mirror_server_id=0)
      - Cannot be changed after creation
    example: 1
    x-db-field: server_id

  source:
    type: string
    description: |
      Source pattern to match
      - Can be an email address, domain, or IP address/network
      - Email/domain values are lowercased and IDN-encoded on save
      - Unique per server in combination with `type` (database unique key)
    example: "spammer@example.com"
    maxLength: 255
    x-db-field: source

  access:
    type: string
    description: |
      Postfix access(5) action for matching messages
      - 'REJECT': Reject the message (blacklist, legacy blacklist default)
      - 'OK': Allow the message (whitelist, legacy whitelist default)
      - Other Postfix access(5) actions may be supported
    default: "REJECT"
    example: "REJECT"
    maxLength: 255
    x-db-field: access

  type:
    type: string
    description: |
      Type of access rule
      - 'recipient': Apply to recipient addresses
      - 'sender': Apply to sender addresses
      - 'client': Apply to client connections (IP/hostname; admin-only in the legacy panel)
    enum: [recipient, sender, client]
    default: "recipient"
    x-db-field: type

  active:
    type: boolean
    default: true
    description: Whether the rule is active
    x-db-field: active

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

description: |
  Mail access rule (table `mail_access`) — server-level blacklist/whitelist for
  senders, recipients or connecting clients.

  ### Uniqueness
  The combination of `server_id`, `source` and `type` is unique (database
  constraint) — duplicates are rejected with 409.

  ### Server side effects
  On Rspamd systems these rules become *global* white/blacklist maps
  (`global_wblist_<id>.conf`): `access='OK'` entries whitelist, all other
  actions blacklist; `sender` maps to `from`, `recipient` to `rcpt`,
  `client` to ip/hostname.
