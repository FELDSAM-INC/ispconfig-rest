# Verified against source_code/install/sql/ispconfig3.sql (table mail_content_filter)
# and source_code/interface/web/mail/form/mail_content_filter.tform.php.
type: object
x-db-table: mail_content_filter
required:
  - server_id
  - type
  - pattern
  - action
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the content filter rule
    example: 1
    x-db-field: content_filter_id

  server_id:
    type: integer
    format: int64
    description: |
      Server ID where the filter rule is configured
      - Must reference a mail server (server.mail_server=1, mirror_server_id=0)
      - Cannot be changed after creation
    example: 1
    x-db-field: server_id

  type:
    type: string
    description: |
      Type of content filter
      - 'header': Header Filter
      - 'body': Body Filter
      - 'mime_header': MIME-Header Filter
      - 'nested_header': Nested-Header Filter
    enum: [header, body, mime_header, nested_header]
    example: "header"
    x-db-field: type

  pattern:
    type: string
    description: Pattern (regexp) to match in the email content
    maxLength: 255
    example: "/^X-Spam-Flag: YES/"
    x-db-field: pattern

  data:
    type: string
    description: Additional data for the filter action (used with actions like REPLACE, REDIRECT or PREPEND)
    maxLength: 255
    example: "X-Spam-Status: Yes, score=10.0"
    x-db-field: data

  action:
    type: string
    description: |
      Postfix header/body_checks action to take when the pattern matches
      - 'DISCARD': Silently discard the message
      - 'DUNNO': Continue processing as if no match
      - 'FILTER': Route through the named content filter
      - 'HOLD': Hold the message for manual review
      - 'IGNORE': Delete the matching line
      - 'PREPEND': Add a header line
      - 'REDIRECT': Redirect the message
      - 'REPLACE': Replace the matched line
      - 'REJECT': Reject the message with an error
      - 'WARN': Log a warning
    enum: [DISCARD, DUNNO, FILTER, HOLD, IGNORE, PREPEND, REDIRECT, REPLACE, REJECT, WARN]
    example: "REJECT"
    x-db-field: action

  active:
    type: boolean
    default: true
    description: Whether the filter rule is active
    x-db-field: active

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

description: |
  Mail content filter rule (table `mail_content_filter`) — pattern-based
  header/body filtering applied by Postfix on the selected mail server.

  ### Usage Notes
  - Use with caution as incorrect rules may affect email delivery
  - Server assignment is fixed after creation
