# This resource has NO dedicated table. It is a view over the [server] and
# [mail] INI sections of the serialized `server.config` column of the `server`
# table (legacy spamfilter_config.tform.php declares db_table=server and
# spamfilter_config_edit.php reads/writes the INI sections via ini_parser).
type: object
x-db-table: server
required:
  - ip_address
  - netmask
  - gateway
  - hostname
  - nameservers
  - module
  - maildir_path
  - homedir_path
  - mailuser_uid
  - mailuser_gid
  - mailuser_name
  - mailuser_group
properties:
  server_id:
    type: integer
    format: int64
    readOnly: true
    description: ID of the server row whose config is exposed (primary key of the `server` table)
    example: 1
    x-db-field: server_id

  # [server] INI section of server.config
  ip_address:
    type: string
    format: ipv4
    description: IP address of the server (INI section [server])
    example: 192.168.0.105

  netmask:
    type: string
    format: ipv4
    description: Network mask (INI section [server])
    example: 255.255.255.0

  gateway:
    type: string
    format: ipv4
    description: Default gateway (INI section [server])
    example: 192.168.0.1

  hostname:
    type: string
    description: Server hostname (INI section [server])
    example: server1.domain.tld

  nameservers:
    type: string
    description: Comma-separated list of nameservers (INI section [server])
    example: 192.168.0.1,192.168.0.2

  # [mail] INI section of server.config
  module:
    type: string
    description: Mail server module (INI section [mail])
    enum: [postfix_mysql]
    default: postfix_mysql

  maildir_path:
    type: string
    description: Path pattern for mail directories, with [domain]/[localpart] placeholders (INI section [mail])
    default: /var/vmail/[domain]/[localpart]
    example: /var/vmail/[domain]/[localpart]

  homedir_path:
    type: string
    description: Base path for mail user home directories (INI section [mail])
    default: /var/vmail
    example: /var/vmail

  mailuser_uid:
    type: integer
    description: UID of the mail system user (INI section [mail])
    default: 5000
    example: 5000

  mailuser_gid:
    type: integer
    description: GID of the mail system group (INI section [mail])
    default: 5000
    example: 5000

  mailuser_name:
    type: string
    description: Username of the mail system user (INI section [mail])
    default: vmail
    example: vmail

  mailuser_group:
    type: string
    description: Group name of the mail system group (INI section [mail])
    default: vmail
    example: vmail

description: |
  Per-server spamfilter/mail configuration.

  ### Storage
  These fields are NOT columns of a dedicated table: they are keys of the
  `[server]` and `[mail]` INI sections inside the serialized `server.config`
  column of the `server` table (the legacy spamfilter config form). Updates
  perform a read-merge-write of the config blob: the stored INI is parsed,
  only the keys of these two sections are replaced, all other sections are
  preserved, and the blob is written back. Legacy ISPConfig updates this
  column directly without a datalog entry (documented Constitution II
  exception).

  ### Semantics
  - One config exists per mail server row — configs are never created or
    deleted through the API (no POST/DELETE endpoints)
  - All fields are required on update (legacy NOTEMPTY validators)
