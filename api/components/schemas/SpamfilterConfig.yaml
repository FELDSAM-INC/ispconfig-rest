type: object
x-db-table: server
description: Auto-generated schema for server
required:
  - server_id
  - ip_address
  - netmask
  - gateway
  - hostname
  - nameservers
  - module
  - maildir_path
  - homedir_path
  - mailuser_uid
  - mailuser_gid
  - mailuser_name
  - mailuser_group
properties:
  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID where the spamfilter is configured
    example: 1
    x-db-field: server_id

  # Server Configuration
  ip_address:
    type: string
    format: ipv4
    description: IP address of the server
    example: 192.168.0.105
    x-db-field: ip_address

  netmask:
    type: string
    format: ipv4
    description: Network mask
    example: 255.255.255.0
    x-db-field: netmask

  gateway:
    type: string
    format: ipv4
    description: Default gateway
    example: 192.168.0.1
    x-db-field: gateway

  hostname:
    type: string
    description: Server hostname
    example: server1.domain.tld
    x-db-field: hostname

  nameservers:
    type: string
    description: Comma-separated list of nameservers
    example: 192.168.0.1,192.168.0.2
    x-db-field: nameservers

  # Mail Configuration
  module:
    type: string
    description: Mail server module
    enum: [postfix_mysql]
    default: postfix_mysql
    x-db-field: module

  maildir_path:
    type: string
    description: Path pattern for mail directories
    default: /home/vmail/[domain]/[localpart]/
    example: /home/vmail/example.com/user/
    x-db-field: maildir_path

  homedir_path:
    type: string
    description: Base path for mail user home directories
    default: /home/vmail/
    example: /home/vmail/
    x-db-field: homedir_path

  mailuser_uid:
    type: integer
    description: UID for mail user
    default: 5000
    example: 5000
    x-db-field: mailuser_uid

  mailuser_gid:
    type: integer
    description: GID for mail user
    default: 5000
    example: 5000
    x-db-field: mailuser_gid

  mailuser_name:
    type: string
    description: Username for mail system user
    default: vmail
    example: vmail
    x-db-field: mailuser_name

  mailuser_group:
    type: string
    description: Group name for mail system user
    default: vmail
    example: vmail
    x-db-field: mailuser_group

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1
    x-db-field: sys_groupid

  sys_perm:
    type: string
    readOnly: true
    description: Permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

description: |
  Spamfilter server and mail configuration.
  
  ### Key Features
  - Server network configuration (IP, netmask, gateway, hostname, nameservers)
  - Mail system user and directory configuration
  - Mail server module settings
  
  ### Access Control
  - Only accessible by admin users
  - Server ID cannot be changed after creation
