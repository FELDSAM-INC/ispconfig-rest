type: object
x-db-table: dns_template
description: |
  A DNS zone template used by ISPConfig's zone wizard. Maps 1:1 to the
  `dns_template` table (primary key `template_id`). The API stores templates
  only; expanding a template into a zone (the legacy wizard) has no REST
  counterpart.
required:
  - name
  - fields
  - template

properties:
  # System Fields
  id:
    type: integer
    format: int64
    x-db-field: template_id
    minimum: 1
    readOnly: true
    description: Unique identifier for the DNS template
    example: 1

  sys_userid:
    type: integer
    format: int32
    minimum: 1
    readOnly: true
    description: ID of the system user who created this template (derived from the API key)
    example: 1

  sys_groupid:
    readOnly: true
    type: integer
    format: int32
    minimum: 1
    description: System group ID that owns this template (defaults to the API user's group when omitted)
    example: 10

  sys_perm_user:
    readOnly: true
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: 'riud'
    description: User permissions (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_group:
    readOnly: true
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: 'riud'
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_other:
    readOnly: true
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: ''
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Template Information
  name:
    type: string
    maxLength: 64
    description: |
      The name of the DNS template.
      Must be unique and descriptive.
    example: "Standard Web Hosting"

  fields:
    type: string
    maxLength: 255
    description: |
      Comma-separated list of placeholder fields used in the template.
      Each token is validated against the allowed set:
      DOMAIN, IP, IPV6, NS1, NS2, EMAIL, DKIM, DNSSEC.
    example: "DOMAIN,IP,NS1,NS2,EMAIL"

  template:
    type: string
    description: |
      The actual template content that will be used to generate DNS records.
      Use placeholders like {DOMAIN}, {IP}, etc. as defined in the fields.
    example: |
      [ZONE]
      origin={DOMAIN}.
      ns={NS1}.
      mbox={EMAIL}.
      refresh=7200
      retry=540
      expire=604800
      minimum=3600
      ttl=3600
      xfer=
      also_notify=
      dnssec_wanted=N
      dnssec_algo=ECDSAP256SHA256

      [DNS_RECORDS]
      A|{DOMAIN}.|{IP}|0|3600
      A|www|{IP}|0|3600
      A|mail|{IP}|0|3600
      NS|{DOMAIN}.|{NS1}.|0|3600
      NS|{DOMAIN}.|{NS2}.|0|3600
      MX|{DOMAIN}.|mail.{DOMAIN}.|10|3600
      TXT|{DOMAIN}.|v=spf1 mx a ~all|0|3600

  visible:
    type: boolean
    default: true
    description: Whether the template is visible in the UI
    example: true
    x-db-format: "Y/N"
