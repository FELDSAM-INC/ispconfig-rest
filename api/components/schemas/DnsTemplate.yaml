type: object
x-db-table: dns_template
required:
  - name
  - fields
  - template
  - visible
  - sys_groupid

properties:
  # System Fields
  template_id:
    type: integer
    format: int32
    x-db-field: template_id
    minimum: 1
    readOnly: true
    description: Unique identifier for the DNS template
    example: 1

  sys_userid:
    type: integer
    format: int32
    minimum: 1
    readOnly: true
    description: ID of the system user who created this template
    example: 1

  sys_groupid:
    type: integer
    format: int32
    minimum: 1
    description: System group ID that owns this template
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: 'riud'
    description: User permissions (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: 'riud'
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: ''
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Template Information
  name:
    type: string
    maxLength: 64
    description: |
      The name of the DNS template.
      Must be unique and descriptive.
    example: "Standard Web Hosting"

  fields:
    type: string
    description: |
      Comma-separated list of fields used in the template.
      Common values: DOMAIN, IP, IPV6, NS1, NS2, EMAIL, DKIM, DNSSEC
    example: "DOMAIN,IP,NS1,NS2,EMAIL"

  template:
    type: string
    format: text
    description: |
      The actual template content that will be used to generate DNS records.
      Use placeholders like {DOMAIN}, {IP}, etc. as defined in the fields.
    example: |
      [ZONE]
      origin={DOMAIN}.
      ns={NS1}.
      mbox={EMAIL}.
      refresh=7200
      retry=540
      expire=604800
      minimum=3600
      ttl=3600
      xfer=
      also_notify=
      dnssec_wanted=N
      dnssec_algo=ECDSAP256SHA256

      [DNS_RECORDS]
      A|{DOMAIN}.|{IP}|0|3600
      A|www|{IP}|0|3600
      A|mail|{IP}|0|3600
      NS|{DOMAIN}.|{NS1}.|0|3600
      NS|{DOMAIN}.|{NS2}.|0|3600
      MX|{DOMAIN}.|mail.{DOMAIN}.|10|3600
      TXT|{DOMAIN}.|v=spf1 mx a ~all|0|3600

  visible:
    type: string
    enum: [y, n]
    default: 'y'
    description: |
      Whether the template is visible in the UI.
      - y: Template is visible
      - n: Template is hidden
    example: 'y'
