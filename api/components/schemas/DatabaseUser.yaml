type: object
x-db-table: web_database_user
description: |
  A database credential set shared by website databases — table
  `web_database_user`. Databases reference these records via
  `database_user_id` / `database_ro_user_id`.

  ### Username prefixing
  The submitted `database_user` is prepended with the resolved ISPConfig
  `dbuser_prefix` (e.g. `c1`); the applied prefix is stored in
  `database_user_prefix`. The prefixed name must not exceed 32 characters
  and must not be blacklisted (the ISPConfig control-panel DB user, `mysql`,
  `root`).

  ### Server assignment
  `server_id` is always forced to 0 — database users are provisioned on
  every server that hosts one of their databases (legacy behavior).

  ### Password storage
  `database_password` is write-only. From the submitted plaintext the server
  populates three hash columns (legacy encryption types):
  - `database_password` — MySQL `PASSWORD()`-style hash (`*SHA1(SHA1(...))`)
  - `database_password_sha2` — SHA2-256 hash (MySQL 8 caching_sha2_password)
  - `database_password_postgres` — PostgreSQL SHA-256 hash

  Plaintext is never stored; no password field is ever returned.
required:
  - database_user
  - database_password
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the database user (database column `database_user_id`)
    example: 42
    x-db-field: database_user_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Always 0 — database users are provisioned on all relevant servers
    example: 0

  database_user:
    type: string
    minLength: 2
    maxLength: 64
    pattern: '^[a-zA-Z0-9_]{2,64}$'
    description: |
      Database username (without prefix). Legacy regex
      `/^[a-zA-Z0-9_]{2,64}$/`. The prefixed name must not exceed 32
      characters and must not be blacklisted.
    example: "appuser"

  database_user_prefix:
    type: string
    readOnly: true
    maxLength: 50
    description: Prefix applied to the username (resolved from the ISPConfig `dbuser_prefix` setting)
    example: "c1"

  database_password:
    type: string
    format: password
    writeOnly: true
    maxLength: 64
    description: |
      Database password (plaintext in the request only). Write-only — never
      returned. The server derives and stores the MySQL, SHA2 and PostgreSQL
      hash columns from this value.
    example: "securepassword123"

  client_id:
    type: integer
    minimum: 1
    writeOnly: true
    description: >-
      Optional owning client. On create, resolved to the client's sys_group and
      set as the record's owner (sys_groupid) — mirroring the ISPConfig "Client"
      select. Admin keys may assign any client; a client/reseller key only a
      client within its own scope (otherwise 403). Write-only; not returned.
    example: 5

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: |
      System group ID. Kept in sync with the parent web domain's group of
      the databases that use this user.
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""
