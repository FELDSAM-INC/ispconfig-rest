# Verified against source_code/install/sql/ispconfig3.sql (table mail_relay_recipient)
# and source_code/interface/web/mail/form/mail_relay_recipient.tform.php.
type: object
x-db-table: mail_relay_recipient
required:
  - server_id
  - source
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the relay recipient
    example: 1
    x-db-field: relay_recipient_id

  server_id:
    type: integer
    format: int64
    description: |
      Server ID where the relay recipient is configured
      - Must reference a mail server (server.mail_server=1, mirror_server_id=0)
      - Cannot be changed after creation
    example: 1
    x-db-field: server_id

  source:
    type: string
    description: Recipient email address, domain (@domain.tld) or pattern allowed to relay
    example: user@example.com
    maxLength: 255
    x-db-field: source
    pattern: '^[^@]+@[^@]+\.[^@]+$|^@[^@]+\.[^@]+$|^[^@]+$'

  access:
    type: string
    description: Postfix access(5) action for the recipient (legacy default 'OK')
    example: OK
    default: OK
    maxLength: 255
    x-db-field: access

  active:
    type: boolean
    default: true
    description: Whether the relay recipient entry is active
    x-db-field: active

description: |
  Email relay recipient configuration (table `mail_relay_recipient`) —
  controls which recipient addresses the server accepts mail for relaying.
