# Server [server] Configuration Schema — the [server] section of the
# server.config INI blob (server table, `config` column). Field inventory
# mirrors the legacy `server` tab of server_config.tform.php: network
# identity, firewall selection, logging, backups and monitoring.
# Note: the server's hostname and primary IP address live HERE, not on the
# `server` table.
# All properties are optional on PUT: omitted text/select keys keep their
# current value; omitted checkbox keys are written with their unchecked
# value ('n'). Keys present in the stored blob but unknown to this schema
# are preserved untouched.
type: object
x-db-table: server
x-db-field: config
x-ini-section: server
additionalProperties: true
properties:
  auto_network_configuration:
    type: string
    enum: ["y", "n"]
    description: Apply the network configuration below to the operating system (checkbox)
    default: "n"
    example: "n"
  ip_address:
    type: string
    format: ipv4
    maxLength: 255
    description: Primary IPv4 address of the server (legacy ISIPV4)
    example: "192.168.1.100"
  netmask:
    type: string
    format: ipv4
    maxLength: 255
    description: Netmask of the primary IPv4 address (legacy ISIPV4)
    example: "255.255.255.0"
  v6_prefix:
    type: string
    description: IPv6 prefix of the server (legacy ISV6PREFIX/V6PREFIXEND/V6PREFIXLENGTH; may be empty)
    default: ""
    example: ""
  gateway:
    type: string
    format: ipv4
    maxLength: 255
    description: Default IPv4 gateway (legacy ISIPV4)
    example: "192.168.1.1"
  firewall:
    type: string
    enum: [bastille, ufw]
    description: >-
      Firewall implementation used by the server daemon. This key selects
      the UFW code path in firewall_plugin.inc.php; UFW takes its port
      lists from the `firewall` table.
    default: bastille
    example: bastille
  hostname:
    type: string
    maxLength: 255
    pattern: '^[\w\.\-]{1,255}\.[a-zA-Z0-9\-]{2,63}$'
    description: Fully qualified hostname of the server (legacy NOTEMPTY + FQDN regex; IDN- and lowercase-normalized)
    example: "web01.example.com"
  nameservers:
    type: string
    maxLength: 255
    description: Comma-separated list of DNS resolvers used by the server (legacy NOTEMPTY; a single key, not dns1/dns2/dns3)
    example: "8.8.8.8,8.8.4.4"
  loglevel:
    type: integer
    enum: [0, 1, 2]
    description: Server daemon log level — 0 = debug, 1 = warnings, 2 = errors
    default: 2
    example: 2
  admin_notify_events:
    type: integer
    enum: [0, 1, 2, 3]
    description: Send events to the admin starting with — 0 = debug, 1 = warnings, 2 = errors, 3 = no notifications
    default: 1
    example: 1
  backup_dir:
    type: string
    maxLength: 255
    description: Backup directory (legacy regex; may be empty to disable)
    default: "/var/backup"
    example: "/var/backup"
  backup_tmp:
    type: string
    maxLength: 255
    description: Temporary directory used by zip-mode backups (legacy NOTEMPTY + regex)
    default: "/tmp/"
    example: "/tmp/"
  backup_dir_is_mount:
    type: string
    enum: ["y", "n"]
    description: Backup directory is a separate mount point (checkbox)
    default: "y"
    example: "y"
  backup_mode:
    type: string
    enum: [userzip, rootgz, borg]
    description: Backup mode — userzip = zip owned by web user, rootgz = tar.gz as root, borg = BorgBackup
    default: userzip
    example: rootgz
  backup_time:
    type: string
    pattern: '^\d{1,2}:(00|15|30|45)$'
    description: Time of day the backup cron starts (15-minute steps)
    default: "0:00"
    example: "0:00"
  backup_delete:
    type: string
    enum: ["y", "n"]
    description: Delete backups when a domain/website is deleted (checkbox)
    default: "y"
    example: "y"
  sysbackup_copies:
    type: integer
    minimum: 0
    maximum: 999
    description: Number of system-configuration backup copies to keep (legacy NOTEMPTY + /^[0-9]{1,3}$/)
    default: 3
    example: 3
  monit_url:
    type: string
    maxLength: 255
    pattern: '^[0-9a-zA-Z\:\/\-\.\[\]]{0,255}$'
    description: Monit web interface URL (may be empty)
    default: ""
    example: ""
  monit_user:
    type: string
    maxLength: 255
    description: Monit web interface user (tags/newlines stripped)
    default: ""
    example: ""
  monit_password:
    type: string
    maxLength: 255
    format: password
    description: Monit web interface password
    default: ""
    example: ""
  munin_url:
    type: string
    maxLength: 255
    pattern: '^[0-9a-zA-Z\:\/\-\.\[\]]{0,255}$'
    description: Munin web interface URL (may be empty)
    default: ""
    example: ""
  munin_user:
    type: string
    maxLength: 255
    description: Munin web interface user (tags/newlines stripped)
    default: ""
    example: ""
  munin_password:
    type: string
    maxLength: 255
    format: password
    description: Munin web interface password
    default: ""
    example: ""
  monitor_system_updates:
    type: string
    enum: ["y", "n"]
    description: Monitor for available system updates (checkbox)
    default: "y"
    example: "y"
  log_retention:
    type: integer
    minimum: 0
    description: Days to retain website log files (legacy ISPOSITIVE)
    default: 30
    example: 30
  migration_mode:
    type: string
    enum: ["y", "n"]
    description: Enable migration mode (checkbox; used by the ISPConfig Migration Tool)
    default: "n"
    example: "n"
