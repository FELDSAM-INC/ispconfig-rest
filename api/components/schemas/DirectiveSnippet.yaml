# Directive Snippet Schema
# Reusable web-server configuration snippet (table `directive_snippets`,
# verified against source_code/install/sql/ispconfig3.sql). Referenced by
# `web_domain.directive_snippets_id`; php snippets are composable via
# `required_php_snippets`. The (`name`, `type`) pair must be unique —
# enforced by the application mirroring the legacy
# `validate_server_directive_snippets` validator (no DB UNIQUE constraint).
# `master_directive_snippets_id` is intentionally unexposed.

type: object
x-db-table: directive_snippets
properties:
  id:
    type: integer
    format: int32
    description: Unique identifier for the directive snippet
    readOnly: true
    example: 1
    x-db-field: directive_snippets_id
  sys_userid:
    type: integer
    format: int32
    description: System user ID who created the record
    readOnly: true
    example: 1
    x-db-field: sys_userid
  sys_groupid:
    type: integer
    format: int32
    description: System group ID
    readOnly: true
    example: 1
    x-db-field: sys_groupid
  sys_perm_user:
    type: string
    maxLength: 5
    description: User permissions (r = read, i = insert, u = update, d = delete)
    example: "riud"
    x-db-field: sys_perm_user
  sys_perm_group:
    type: string
    maxLength: 5
    description: Group permissions (r = read, i = insert, u = update, d = delete)
    example: "riud"
    x-db-field: sys_perm_group
  sys_perm_other:
    type: string
    maxLength: 5
    description: Other permissions (r = read, i = insert, u = update, d = delete)
    example: ""
    x-db-field: sys_perm_other
  name:
    type: string
    maxLength: 255
    description: >
      Name of the directive snippet (required, non-empty; must be unique
      per snippet type — duplicates are rejected with 409)
    example: "Custom PHP Settings"
    x-db-field: name
  type:
    type: string
    enum: [apache, nginx, php, proxy]
    description: Type of the directive snippet
    example: "php"
    x-db-field: type
  snippet:
    type: string
    description: The actual directive snippet content
    example: "php_admin_value memory_limit 256M"
    x-db-field: snippet
  customer_viewable:
    type: boolean
    default: false
    description: >
      Whether the snippet is visible to customers.
      Disabling it is rejected with 409 while the snippet is in use.
    example: true
    x-db-field: customer_viewable
    x-db-format: "y/n"
  active:
    type: boolean
    default: true
    description: >
      Whether the snippet is active.
      Disabling it is rejected with 409 while the snippet is in use.
    example: true
    x-db-field: active
    x-db-format: "y/n"
  update_sites:
    type: boolean
    default: false
    description: >
      Side-effect trigger — when an update is saved with update_sites=true
      and active=true, every web_domain using this snippet is re-emitted to
      sys_datalog as a forced full-record update so the web servers rewrite
      their vhosts
    example: true
    x-db-field: update_sites
    x-db-format: "y/n"
  required_php_snippets:
    type: string
    description: >
      Comma-separated list of required PHP snippet IDs; each ID must
      reference an active snippet of type php
    example: "1,2,3"
    x-db-field: required_php_snippets
