# Server DNS Configuration Schema — the [dns] section of the server.config
# INI blob (server table, `config` column). Field inventory mirrors the
# legacy `dns` tab of server_config.tform.php.
# All properties are optional on PUT: omitted text/select keys keep their
# current value; omitted checkbox keys are written with their unchecked
# value ('n'), mirroring legacy form semantics. Keys present in the stored
# blob but unknown to this schema are preserved untouched.
type: object
x-db-table: server
x-db-field: config
x-ini-section: dns
additionalProperties: true
properties:
  bind_user:
    type: string
    maxLength: 255
    pattern: '^(?!ispconfig)([a-zA-Z0-9]{1,20})$'
    description: System user BIND runs as (legacy NOTEMPTY + regex /^(?!ispconfig)([a-zA-Z0-9]{1,20})$/)
    example: "root"
  bind_group:
    type: string
    maxLength: 255
    pattern: '^(?!ispconfig)([a-zA-Z0-9]{1,20})$'
    description: System group BIND runs as (legacy NOTEMPTY + regex /^(?!ispconfig)([a-zA-Z0-9]{1,20})$/)
    example: "bind"
  bind_zonefiles_dir:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of the BIND zone file directory (legacy NOTEMPTY + path regex)
    example: "/etc/bind"
  bind_keyfiles_dir:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of the BIND DNSSEC key file directory (legacy NOTEMPTY + path regex)
    example: "/etc/bind"
  bind_zonefiles_masterprefix:
    type: string
    maxLength: 255
    pattern: '^[a-zA-Z0-9\.\-\_\/]{0,128}$'
    description: Filename prefix for master zone files (may be empty)
    example: "pri."
  bind_zonefiles_slaveprefix:
    type: string
    maxLength: 255
    pattern: '^[a-zA-Z0-9\.\-\_\/]{0,128}$'
    description: Filename prefix for slave zone files (may be empty)
    example: "slave/sec."
  named_conf_path:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of named.conf (legacy NOTEMPTY + path regex)
    example: "/etc/bind/named.conf"
  named_conf_local_path:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of named.conf.local (legacy NOTEMPTY + path regex)
    example: "/etc/bind/named.conf.local"
  disable_bind_log:
    type: string
    enum: ["y", "n"]
    description: Suppress BIND warning/error logging (checkbox)
    default: "n"
    example: "n"
