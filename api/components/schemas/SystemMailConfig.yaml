# [mail] section of the global system configuration (sys_ini INI blob).
# Field set verified against legacy source_code/interface/web/admin/form/system_config.tform.php.
# This schema is a deliberate subset of the legacy key set: the SMTP block
# (admin_mail, admin_name, smtp_enabled/host/port/user/pass/crypt) is not exposed.
# Unexposed legacy keys are preserved untouched by PUT (read-merge-write).
type: object
description: Mail-related global system configuration (the `[mail]` section of the `sys_ini` blob)
properties:
  enable_custom_login:
    type: string
    enum: [y, n]
    description: Whether mail users may set a custom login name
    example: "n"
  enable_welcome_mail:
    type: string
    enum: [y, n]
    description: Whether to send welcome emails when a mailbox is created
    example: "y"
  show_per_domain_relay_options:
    type: string
    enum: [y, n]
    description: Whether to show per-domain relay options
    example: "n"
  mailbox_show_autoresponder_tab:
    type: string
    enum: [y, n]
    description: Whether to show the autoresponder tab for mailboxes
    example: "y"
  mailbox_show_mail_filter_tab:
    type: string
    enum: [y, n]
    description: Whether to show the mail filter tab for mailboxes
    example: "y"
  mailbox_show_custom_rules_tab:
    type: string
    enum: [y, n]
    description: Whether to show the custom mailfilter rules tab for mailboxes
    example: "y"
  mailbox_show_last_access:
    type: string
    enum: [y, n]
    description: Whether to show the last access time for mailboxes
    example: "n"
  mailboxlist_webmail_link:
    type: string
    enum: [y, n]
    description: Whether to link the mailbox list to webmail
    example: "n"
  webmail_url:
    type: string
    format: uri
    maxLength: 255
    description: URL for webmail access
    example: "https://webmail.example.com"
  mailmailinglist_link:
    type: string
    enum: [y, n]
    description: Whether to link the mailing list to the mailing list admin URL
    example: "n"
  mailmailinglist_url:
    type: string
    format: uri
    maxLength: 255
    description: URL for mailing list management
    example: "https://lists.example.com"
  default_mailserver:
    type: integer
    description: Default mail server ID
    example: 1
