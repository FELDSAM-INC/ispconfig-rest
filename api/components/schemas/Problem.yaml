# RFC 9457 Problem Details for HTTP APIs (application/problem+json).
# Canonical error body for ALL non-2xx responses (Constitution v2.0.0, Principle V).
type: object
description: RFC 9457 problem details object returned with content type `application/problem+json`
properties:
  type:
    type: string
    format: uri-reference
    description: A URI reference that identifies the problem type
    default: 'about:blank'
    example: 'about:blank'
  title:
    type: string
    description: A short, human-readable summary of the problem type
    example: Not Found
  status:
    type: integer
    description: The HTTP status code generated by the origin server for this occurrence of the problem
    example: 404
  detail:
    type: string
    description: A human-readable explanation specific to this occurrence of the problem
    example: DNS zone with id 42 does not exist.
  instance:
    type: string
    description: A URI reference that identifies the specific occurrence of the problem
    example: /api/v1/dns/soa/42
