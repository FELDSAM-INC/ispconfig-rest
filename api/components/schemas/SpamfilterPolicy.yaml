# Verified against source_code/install/sql/ispconfig3.sql (table spamfilter_policy)
# and source_code/interface/web/mail/form/spamfilter_policy.tform.php.
# The API exposes a subset of the ~50 policy columns; all unexposed columns
# keep their database defaults. Y/N flags are stored uppercase — exact casing
# is preserved (they are not booleans in the API).
type: object
x-db-table: spamfilter_policy
required:
  - policy_name
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the spamfilter policy
    example: 1
    x-db-field: id

  policy_name:
    type: string
    description: Name of the spamfilter policy (unique, application-level check)
    maxLength: 64
    example: "Default Policy"
    x-db-field: policy_name

  virus_lover:
    type: string
    description: Whether to deliver mail even when a virus is detected (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: virus_lover

  spam_lover:
    type: string
    description: Whether to deliver mail even when it is classified as spam (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: spam_lover

  banned_files_lover:
    type: string
    description: Whether to deliver mail containing banned file types (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: banned_files_lover

  bad_header_lover:
    type: string
    description: Whether to deliver mail with bad headers (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: bad_header_lover

  bypass_virus_checks:
    type: string
    description: Whether to bypass virus checks (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: bypass_virus_checks

  bypass_spam_checks:
    type: string
    description: Whether to bypass spam checks (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: bypass_spam_checks

  bypass_banned_checks:
    type: string
    description: Whether to bypass banned file checks (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: bypass_banned_checks

  bypass_header_checks:
    type: string
    description: Whether to bypass header checks (stored uppercase)
    enum: [Y, N]
    default: "N"
    x-db-field: bypass_header_checks

  virus_quarantine_to:
    type: string
    description: Email address to send quarantined viruses to
    maxLength: 255
    example: "virus-quarantine@example.com"
    x-db-field: virus_quarantine_to

  spam_quarantine_to:
    type: string
    description: Email address to send quarantined spam to
    maxLength: 255
    example: "spam-quarantine@example.com"
    x-db-field: spam_quarantine_to

  banned_quarantine_to:
    type: string
    description: Email address to send quarantined banned files to
    maxLength: 255
    example: "banned-quarantine@example.com"
    x-db-field: banned_quarantine_to

  bad_header_quarantine_to:
    type: string
    description: Email address to send emails with bad headers to
    maxLength: 255
    example: "bad-header-quarantine@example.com"
    x-db-field: bad_header_quarantine_to

  clean_quarantine_to:
    type: string
    description: Email address to send clean messages to
    maxLength: 255
    example: "clean-quarantine@example.com"
    x-db-field: clean_quarantine_to

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record (spamfilter policies are readable by all panel users)
    example: "r"
    x-db-field: sys_perm_other

description: |
  Spamfilter (Amavis/Rspamd) policy — how messages are processed for the
  addresses mapped to it via spamfilter users (table `spamfilter_policy`).

  ### Notes
  - The API exposes a subset of the policy columns (lovers, bypasses and
    quarantine addresses); tag/kill levels, address extensions, admin
    addresses and rspamd_* columns keep their database defaults
  - The `spamfilter_policy` table has no `server_id` — policies are global
  - Record permissions default to `sys_perm_other='r'` (unlike other mail
    resources), so policies are readable by all users
