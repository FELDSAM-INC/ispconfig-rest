description: |
  Spamfilter policy defines how email messages should be processed by the spam filter.
  It includes settings for handling viruses, spam, banned files, and more.
  
  ### Key Features
  - Configure how different types of email content are handled
  - Set up quarantine destinations for different message types
  - Control which security checks to bypass
  
  ### Access Control
  - Readable by all authenticated users
  - Only admin users can create, update, or delete policies
