# Sub-resource view of the mail_user table (spam handling columns only).
# Verified against source_code/install/sql/ispconfig3.sql and
# source_code/interface/web/mail/form/mail_user.tform.php (Mail Filter tab).
type: object
x-db-table: mail_user
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: ID of the mail user (taken from the URL path)
    example: 1
    x-db-field: mailuser_id

  move_junk:
    type: string
    enum: [y, a, n]
    default: y
    description: |
      Whether to move detected spam to the Junk folder (3-state flag stored
      exactly as legacy does):
      - y: Move spam to Junk folder
      - a: Move spam to Junk folder and mark it as read
      - n: Do not move spam to the Junk folder
    example: "y"
    x-db-field: move_junk

  purge_trash_days:
    type: integer
    format: int32
    minimum: 0
    default: 0
    description: |
      Number of days after which emails in Trash are automatically deleted
      - 0: Disable automatic purging
    example: 30
    x-db-field: purge_trash_days

  purge_junk_days:
    type: integer
    format: int32
    minimum: 0
    default: 0
    description: |
      Number of days after which emails in Junk are automatically deleted
      - 0: Disable automatic purging
    example: 14
    x-db-field: purge_junk_days

  custom_mailfilter:
    type: string
    nullable: true
    description: |
      Custom mail filter rules (sieve or maildrop syntax, depending on the
      server's `mail_filter_syntax` setting). Note: the blocks between
      `### BEGIN FILTER_ID:<id>` and `### END FILTER_ID:<id>` are generated
      from the `/mail/users/{id}/filters` rules and are rewritten automatically.
    example: |
      if header :contains "X-Spam-Flag" "YES" {
        fileinto "Junk";
        stop;
      }
    x-db-field: custom_mailfilter

description: |
  ## Mail user spam filter settings

  Per-mailbox spam handling. This is a view over the `move_junk`,
  `purge_trash_days`, `purge_junk_days` and `custom_mailfilter` columns of the
  `mail_user` row — updates produce a `mail_user` datalog update.
