type: object
x-db-table: webdav_user
description: |
  A WebDAV account for a website directory — table `webdav_user`
  (primary key `webdav_user_id`).

  ### Username prefixing
  The submitted `username` is prepended with the resolved ISPConfig
  `webdavuser_prefix`; the applied prefix is stored in `username_prefix`.
  The full (prefixed) username must be unique across all WebDAV users.

  ### Server-derived fields
  `server_id` and `sys_groupid` are always derived from the parent web
  domain.

  ### Immutability
  `username` and `dir` cannot be changed after creation (legacy restores the
  stored values); only `password` and `active` are updatable.

  ### Password storage
  `password` is write-only and stored as an Apache digest-auth hash:
  `md5(username:dir:password)` computed with the stored username and dir
  (legacy `webdav_user_edit.php`). Plaintext is never stored or returned.
required:
  - parent_domain_id
  - username
  - password
  - dir
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the WebDAV user (database column `webdav_user_id`)
    example: 123
    x-db-field: webdav_user_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID — always derived from the parent web domain
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain
    example: 42

  username:
    type: string
    minLength: 1
    maxLength: 64
    pattern: '^[\w\.\-@]{1,64}$'
    description: |
      WebDAV username (without prefix). Legacy regex `/^[\w\.\-@]{0,64}$/`.
      The full (prefixed) username must be unique across all WebDAV users.
      Immutable after creation.
    example: "user123"

  username_prefix:
    type: string
    readOnly: true
    maxLength: 50
    description: Prefix applied to the username (resolved from the ISPConfig `webdavuser_prefix` setting)
    example: "web42_"

  password:
    type: string
    format: password
    writeOnly: true
    maxLength: 255
    description: |
      WebDAV password. Write-only — never returned in responses. Stored as
      the digest hash `md5(username:dir:password)`; password changes are
      re-digested with the stored username and dir.
    example: "securePassword123"

  dir:
    type: string
    maxLength: 255
    description: |
      Directory the WebDAV user can access (relative to the website's web
      root). Must not contain `..` or `./`. Immutable after creation.
    example: "webdav"

  active:
    type: boolean
    default: true
    description: Whether the WebDAV user is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID — always synced from the parent web domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the WebDAV user
    example: "web1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
