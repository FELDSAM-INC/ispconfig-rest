type: object
x-db-table: web_domain
description: |
  A web domain (vhost) hosted by ISPConfig â€” table `web_domain`.

  This resource covers the vhost types managed by the legacy "Website" form
  (`vhost`, `vhostsubdomain`, `vhostalias`). Subdomains and alias domains of
  type `subdomain` / `alias` are managed via the web child domain resource
  (same table, different form).

  ### Server-generated provisioning fields
  On create, ISPConfig derives `document_root` (from the server web config
  `website_path` template), `system_user` (`web{domain_id}`), `system_group`
  (`client{client_id}`), `allow_override` and `php_open_basedir` defaults,
  `added_date`/`added_by` and `log_retention`. These fields are read-only.
  For `vhostsubdomain`/`vhostalias` they are copied from the parent domain and
  `hd_quota` is forced to 0.

  ### SSL certificate material
  Certificate columns (`ssl_cert`, `ssl_key`, `ssl_bundle`, `ssl_request`,
  `ssl_action`) are managed via the `/sites/web-domains/{id}/ssl` subresource,
  not through this schema. When `ssl=y` and `ssl_letsencrypt=y` on create, the
  record is first datalogged with both flags `n` and immediately followed by a
  datalog update enabling them (legacy Let's Encrypt two-step create).

  ### Immutability
  `server_id` cannot be changed after creation. `system_user`, `system_group`
  and `web_folder` are preserved server-side on update.
required:
  - server_id
  - domain
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the web domain (database column `domain_id`)
    example: 42
    x-db-field: domain_id

  server_id:
    type: integer
    format: int64
    description: |
      ID of the web server hosting the domain. Must reference a server with
      the web role. Immutable after creation.
    example: 1

  ip_address:
    type: string
    maxLength: 39
    nullable: true
    description: |
      IPv4 address the vhost binds to, or `*` to bind to all addresses.
      Subject to the server's SNI configuration: when SNI is disabled, only
      one SSL-enabled domain is allowed per IP address.
    example: "192.168.1.1"

  ipv6_address:
    type: string
    maxLength: 255
    nullable: true
    description: IPv6 address the vhost binds to (empty for none)
    example: "2001:db8::1"

  domain:
    type: string
    maxLength: 255
    description: |
      Fully qualified domain name.

      ### Validation Rules
      - Lower-cased on save; IDN names are converted to punycode (legacy
        `TOLOWER` + `IDNTOASCII` filters)
      - Must pass the legacy `validate_domain` check for the domain type
      - Unique per (`server_id`, `ip_address`, `domain`) â€” database unique key
    example: "example.com"

  type:
    type: string
    enum: [vhost, vhostsubdomain, vhostalias]
    default: vhost
    description: |
      Vhost type:
      - `vhost`: regular website (main domain)
      - `vhostsubdomain`: subdomain with its own vhost configuration
      - `vhostalias`: alias domain with its own vhost configuration

      For `vhostsubdomain`/`vhostalias` a valid `parent_domain_id` is required.
    example: vhost

  parent_domain_id:
    type: integer
    format: int64
    default: 0
    description: |
      ID of the parent web domain. Required (non-zero) when `type` is
      `vhostsubdomain` or `vhostalias`; 0 for regular vhosts.
    example: 0

  vhost_type:
    type: string
    enum: [name, ip]
    default: name
    description: Name-based or IP-based virtual host
    example: name

  web_folder:
    type: string
    maxLength: 100
    nullable: true
    description: |
      Web folder below the parent domain's document root (only for
      `vhostsubdomain`/`vhostalias`). Must not contain `..`, `./` or `//`
      (legacy regex `@^((?!(.*\.\.)|(.*\./)|(.*//))[^/][\w/_\.\-]{1,100})?$@`).
      Preserved server-side on update.
    example: "blog"

  hd_quota:
    type: integer
    format: int64
    minimum: -1
    default: -1
    description: |
      Disk quota in MB. `-1` = unlimited, otherwise a positive integer
      (legacy regex `/^(\-1|[0-9]{1,10})$/`). `0` is rejected for `type=vhost`;
      for `vhostsubdomain`/`vhostalias` the value is forced to 0 (quota is
      accounted on the parent domain).
    example: 1024

  traffic_quota:
    type: integer
    format: int64
    minimum: -1
    default: -1
    description: |
      Monthly traffic quota in MB. `-1` = unlimited, otherwise a positive
      integer (legacy regex `/^(\-1|[0-9]{1,10})$/`).
    example: 10240

  document_root:
    type: string
    maxLength: 255
    readOnly: true
    description: |
      Absolute path to the site root. Server-generated on create from the
      server web config `website_path` template (placeholders
      `[website_id]`, `[client_id]`, id-hash variants).
    example: "/var/www/clients/client1/web42"

  system_user:
    type: string
    maxLength: 255
    readOnly: true
    description: System user owning the site files. Server-generated as `web{domain_id}`.
    example: "web42"

  system_group:
    type: string
    maxLength: 255
    readOnly: true
    description: System group owning the site files. Server-generated as `client{client_id}`.
    example: "client1"

  cgi:
    type: boolean
    default: false
    description: Enable CGI script execution
    example: false
    x-db-format: "y/n"

  ssi:
    type: boolean
    default: false
    description: Enable Server Side Includes
    example: false
    x-db-format: "y/n"

  suexec:
    type: boolean
    default: true
    description: Run CGI/FastCGI processes under the site's system user (Apache SuEXEC)
    example: true
    x-db-format: "y/n"

  errordocs:
    type: integer
    enum: [0, 1]
    default: 1
    description: Use ISPConfig's own error documents (1) or the server defaults (0)
    example: 1

  subdomain:
    type: string
    enum: [none, www, "*"]
    default: www
    description: |
      Automatic subdomain for the vhost:
      - `none`: no auto subdomain
      - `www`: also serve www.{domain}
      - `*`: wildcard subdomain (only when wildcards are enabled on the server)
    example: www

  php:
    type: string
    enum: ['no', fast-cgi, cgi, mod, suphp, php-fpm, hhvm]
    default: fast-cgi
    description: |
      PHP handler mode (legacy value set):
      - `no`: PHP disabled
      - `fast-cgi`: PHP as FastCGI
      - `cgi`: PHP as CGI
      - `mod`: Apache mod_php
      - `suphp`: SuPHP
      - `php-fpm`: PHP-FPM
      - `hhvm`: HipHop VM (legacy)

      A custom PHP version (`server_php_id`) is only honoured for `php-fpm`
      and `fast-cgi`; otherwise it is reset to 0.
    example: php-fpm

  server_php_id:
    type: integer
    format: int64
    default: 0
    description: |
      ID of an additional PHP version (`server_php` record) to use.
      0 = the server's default PHP. Only honoured when `php` is `php-fpm`
      or `fast-cgi`.
    example: 0

  perl:
    type: boolean
    default: false
    description: Enable Perl script execution
    example: false
    x-db-format: "y/n"

  ruby:
    type: boolean
    default: false
    description: Enable Ruby script execution
    example: false
    x-db-format: "y/n"

  python:
    type: boolean
    default: false
    description: Enable Python script execution
    example: false
    x-db-format: "y/n"

  enable_pagespeed:
    type: boolean
    default: false
    description: Enable Google PageSpeed module (nginx)
    example: false
    x-db-format: "y/n"

  active:
    type: boolean
    default: true
    description: Whether the web domain is active
    example: true
    x-db-format: "y/n"

  directive_snippets_id:
    type: integer
    format: int64
    default: 0
    description: ID of the directive snippet applied to the vhost (0 = none)
    example: 0

  # Redirects
  redirect_type:
    type: string
    enum: ["", 'no', R, L, "R,L", "R=301,L", last, break, redirect, permanent, proxy]
    default: ""
    description: |
      Redirect flag / type (Apache rewrite flags or nginx directives):
      `""` = no redirect; `no`, `R`, `L`, `R,L`, `R=301,L` (Apache);
      `last`, `break`, `redirect`, `permanent` (nginx); `proxy`.
      `proxy` requires a URL (not a path) in `redirect_path`.
    example: "R=301,L"

  redirect_path:
    type: string
    maxLength: 255
    nullable: true
    description: |
      Redirect target: a URL (`http://`, `https://`, `ftp://`) or an absolute
      path ending in `/` without `..` (legacy redirect regex).
    example: "https://www.example.com/"

  seo_redirect:
    type: string
    enum: ["", non_www_to_www, www_to_non_www, "*_domain_tld_to_domain_tld", "*_domain_tld_to_www_domain_tld", "*_to_domain_tld", "*_to_www_domain_tld"]
    default: ""
    description: |
      SEO canonicalisation redirect:
      - `""`: none
      - `non_www_to_www`: domain.tld => www.domain.tld
      - `www_to_non_www`: www.domain.tld => domain.tld
      - `*_domain_tld_to_domain_tld`: *.domain.tld => domain.tld
      - `*_domain_tld_to_www_domain_tld`: *.domain.tld => www.domain.tld
      - `*_to_domain_tld`: * => domain.tld
      - `*_to_www_domain_tld`: * => www.domain.tld
    example: ""

  rewrite_rules:
    type: string
    nullable: true
    description: |
      Custom nginx rewrite rules. Validated line-by-line against the legacy
      whitelist (`if`, `rewrite`, `set`, `return`, `break` directives and
      block braces).
    example: |
      if (!-e $request_filename) {
        rewrite ^/(.*)$ /index.php?q=$1 last;
      }

  rewrite_to_https:
    type: boolean
    default: false
    description: Redirect all HTTP requests to HTTPS
    example: true
    x-db-format: "y/n"

  # SSL
  ssl:
    type: boolean
    default: false
    description: |
      Enable SSL for the vhost. When the server web config has SNI disabled,
      only one SSL-enabled domain is allowed per IP address.
    example: true
    x-db-format: "y/n"

  ssl_letsencrypt:
    type: boolean
    default: false
    description: |
      Obtain and renew the certificate via Let's Encrypt. When enabled
      together with `ssl=true` on create, ISPConfig performs the legacy
      two-step create (insert with both flags disabled, then a datalog
      update enabling them).
    example: true
    x-db-format: "y/n"

  ssl_letsencrypt_exclude:
    type: boolean
    default: false
    description: Exclude this domain from the Let's Encrypt certificate
    example: false
    x-db-format: "y/n"

  ssl_state:
    type: string
    maxLength: 255
    nullable: true
    description: State/province for the SSL certificate subject (CSR)
    example: "Bavaria"

  ssl_locality:
    type: string
    maxLength: 255
    nullable: true
    description: City/locality for the SSL certificate subject (CSR)
    example: "Munich"

  ssl_organisation:
    type: string
    maxLength: 255
    nullable: true
    description: Organisation for the SSL certificate subject (CSR)
    example: "Example Inc."

  ssl_organisation_unit:
    type: string
    maxLength: 255
    nullable: true
    description: Organisational unit for the SSL certificate subject (CSR)
    example: "IT"

  ssl_country:
    type: string
    maxLength: 255
    nullable: true
    description: ISO 3166-1 alpha-2 country code for the SSL certificate subject (CSR)
    example: "DE"

  ssl_domain:
    type: string
    maxLength: 255
    nullable: true
    description: Common Name (domain) the SSL certificate is issued for
    example: "example.com"

  # Statistics
  stats_type:
    type: string
    enum: [awstats, goaccess, webalizer, ""]
    default: awstats
    description: Web statistics engine (`""` = statistics disabled)
    example: awstats

  stats_password:
    type: string
    format: password
    writeOnly: true
    maxLength: 255
    nullable: true
    description: |
      Password protecting the /stats directory. Write-only â€” never returned.
      Stored as a SHA-512 crypt hash (legacy `CRYPT` encryption).
    example: "securepassword123"

  # Backup
  backup_interval:
    type: string
    enum: [none, daily, weekly, monthly]
    default: none
    description: Backup interval for the web domain
    example: weekly

  backup_copies:
    type: integer
    minimum: 1
    maximum: 30
    default: 1
    description: Number of backup copies to keep (legacy options 1-10, 15, 20, 30)
    example: 7

  backup_excludes:
    type: string
    nullable: true
    description: |
      Comma-separated files/directories to exclude from backups. Must match
      the legacy regex `@^(?!.*\.\.)[-a-zA-Z0-9_/.~,*]*$@` (no `..`).
    example: "tmp/*,cache/*"

  # Advanced options (legacy admin/reseller "Options" tab)
  allow_override:
    type: string
    maxLength: 255
    default: All
    description: |
      Apache AllowOverride directive for the site. Default derives from the
      server web config `htaccess_allow_override` on create.
    example: All

  proxy_protocol:
    type: boolean
    default: false
    description: Enable the PROXY protocol on the vhost
    example: false
    x-db-format: "y/n"

  php_fpm_use_socket:
    type: boolean
    default: true
    description: Use a Unix socket instead of TCP for PHP-FPM
    example: true
    x-db-format: "y/n"

  php_fpm_chroot:
    type: boolean
    default: false
    description: Run the PHP-FPM pool chrooted
    example: false
    x-db-format: "y/n"

  pm:
    type: string
    enum: [static, dynamic, ondemand]
    default: ondemand
    description: |
      PHP-FPM process manager mode. With `dynamic`, the pool sizes must
      satisfy `pm_max_children >= pm_max_spare_servers >= pm_start_servers
      >= pm_min_spare_servers > 0`.
    example: ondemand

  pm_max_children:
    type: integer
    minimum: 1
    default: 10
    description: PHP-FPM pm.max_children
    example: 10

  pm_start_servers:
    type: integer
    minimum: 1
    default: 2
    description: PHP-FPM pm.start_servers
    example: 2

  pm_min_spare_servers:
    type: integer
    minimum: 1
    default: 1
    description: PHP-FPM pm.min_spare_servers
    example: 1

  pm_max_spare_servers:
    type: integer
    minimum: 1
    default: 5
    description: PHP-FPM pm.max_spare_servers
    example: 5

  pm_process_idle_timeout:
    type: integer
    minimum: 1
    default: 10
    description: PHP-FPM pm.process_idle_timeout in seconds (ondemand mode)
    example: 10

  pm_max_requests:
    type: integer
    minimum: 0
    default: 0
    description: PHP-FPM pm.max_requests (0 = unlimited)
    example: 0

  disable_symlinknotowner:
    type: boolean
    default: false
    description: Disable the SymlinksIfOwnerMatch protection for this site
    example: false
    x-db-format: "y/n"

  php_open_basedir:
    type: string
    nullable: true
    description: |
      PHP open_basedir restriction (colon-separated paths). Default is
      generated on create from the server web config template
      (`[website_path]`, `[website_domain]` placeholders).
    example: "/var/www/clients/client1/web42/web:/tmp"

  custom_php_ini:
    type: string
    nullable: true
    description: |
      Custom php.ini directives, one `key = value` per line (comments start
      with `;`). Validated line-by-line like the legacy interface.
    example: |
      upload_max_filesize = 64M
      post_max_size = 64M

  apache_directives:
    type: string
    nullable: true
    description: |
      Custom Apache directives added to the vhost. Validated against the
      legacy blocked-directive list (`validate_domain::web_apache_directives`).
    example: |
      <IfModule mod_headers.c>
        Header set X-Content-Type-Options nosniff
      </IfModule>

  nginx_directives:
    type: string
    nullable: true
    description: |
      Custom nginx directives added to the server block. Validated against the
      legacy blocked-directive list (`validate_domain::web_nginx_directives`).
    example: |
      add_header X-Content-Type-Options nosniff;

  proxy_directives:
    type: string
    nullable: true
    description: Custom proxy directives (used when `redirect_type=proxy`)
    example: |
      ProxyPreserveHost On

  http_port:
    type: integer
    minimum: 1
    maximum: 65535
    default: 80
    description: HTTP port of the vhost
    example: 80

  https_port:
    type: integer
    minimum: 1
    maximum: 65535
    default: 443
    description: HTTPS port of the vhost
    example: 443

  log_retention:
    type: integer
    minimum: 0
    maximum: 9999
    description: |
      Days to keep access logs. Default derives from the server config on
      create (fallback 10).
    example: 30

  jailkit_chroot_app_sections:
    type: string
    nullable: true
    description: Jailkit chroot application sections (space-separated, legacy regex `/^[a-zA-Z0-9\-\_\ ]*$/`)
    example: "basicshell editors"

  jailkit_chroot_app_programs:
    type: string
    nullable: true
    description: Additional programs available in the jail (space-separated paths, legacy regex `/^[a-zA-Z0-9\.\-\_\/\ ]*$/`)
    example: "/usr/bin/git"

  delete_unused_jailkit:
    type: boolean
    default: false
    description: Delete the jail when it is no longer used
    example: false
    x-db-format: "y/n"

  added_date:
    type: string
    format: date
    readOnly: true
    nullable: true
    description: Date the domain was created (server-generated)
    example: "2026-07-04"

  added_by:
    type: string
    maxLength: 255
    readOnly: true
    nullable: true
    description: User who created the domain (server-generated)
    example: "admin"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  client_id:
    type: integer
    minimum: 1
    writeOnly: true
    description: >-
      Optional owning client. On create, resolved to the client's sys_group and
      set as the record's owner (sys_groupid) â€” mirroring the ISPConfig "Client"
      select. Admin keys may assign any client; a client/reseller key only a
      client within its own scope (otherwise 403). Write-only; not returned.
      Ignored for vhostsubdomain/vhostalias, whose group is inherited from the
      parent vhost.
    example: 5

  sys_groupid:
    readOnly: true
    type: integer
    description: |
      System group ID (client group) that owns the web domain. Defaults to
      the admin group; supply a client group to assign the site to a client.
      Child resources (FTP/shell/cron/WebDAV users, folders, databases)
      inherit this group.
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the web domain
    example: "web1.example.com"
