type: object
x_db_table: server
required:
  - rescue_system
  - rescue_kernel
  - rescue_initrd
  - rescue_root
properties:
  rescue_system:
    type: string
    enum: [y, n]
    description: Whether rescue system is enabled
    example: "y"
  rescue_kernel:
    type: string
    description: Path to rescue kernel image
    example: "/boot/vmlinuz-rescue"
  rescue_initrd:
    type: string
    description: Path to rescue initrd image
    example: "/boot/initrd.img-rescue"
  rescue_root:
    type: string
    description: Root device for rescue system
    example: "UUID=1234-5678"
  rescue_root_fstype:
    type: string
    description: Filesystem type for root device
    example: "ext4"
  rescue_root_flags:
    type: string
    description: Mount flags for root device
    example: "ro"
  rescue_modules:
    type: string
    description: Kernel modules to load in rescue mode
    example: "ext4 vfat nls_utf8"
  rescue_networking:
    type: string
    enum: [y, n]
    description: Whether to enable networking in rescue mode
    example: "y"
  rescue_dhcp:
    type: string
    enum: [y, n]
    description: Whether to use DHCP in rescue mode
    example: "y"
  rescue_ip:
    type: string
    format: ipv4
    description: Static IP address for rescue mode
    example: "192.168.1.100"
  rescue_netmask:
    type: string
    format: ipv4
    description: Netmask for static IP in rescue mode
    example: "255.255.255.0"
  rescue_gateway:
    type: string
    format: ipv4
    description: Gateway for static IP in rescue mode
    example: "192.168.1.1"
  rescue_dns:
    type: string
    description: DNS servers for rescue mode
    example: "8.8.8.8 8.8.4.4"
