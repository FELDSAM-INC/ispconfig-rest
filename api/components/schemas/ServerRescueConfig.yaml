# Server Rescue Configuration Schema — the [rescue] section of the
# server.config INI blob (server table, `config` column). Field inventory
# mirrors the legacy `rescue` tab of server_config.tform.php (previously
# declared rescue_* properties were invented and have been removed).
# All properties are checkboxes and optional on PUT: omitted checkbox keys
# are written with their unchecked value ('n'), mirroring legacy form
# semantics. Keys present in the stored blob but unknown to this schema are
# preserved untouched.
type: object
x-db-table: server
x-db-field: config
x-ini-section: rescue
additionalProperties: true
properties:
  try_rescue:
    type: string
    enum: ["y", "n"]
    description: Enable the rescue watchdog (monitors and restarts failed services)
    default: "n"
    example: "n"
  do_not_try_rescue_httpd:
    type: string
    enum: ["y", "n"]
    description: Exclude the web server (httpd) from rescue restarts
    default: "n"
    example: "n"
  do_not_try_rescue_mongodb:
    type: string
    enum: ["y", "n"]
    description: Exclude MongoDB from rescue restarts
    default: "n"
    example: "n"
  do_not_try_rescue_mysql:
    type: string
    enum: ["y", "n"]
    description: Exclude MySQL/MariaDB from rescue restarts
    default: "n"
    example: "n"
  do_not_try_rescue_mail:
    type: string
    enum: ["y", "n"]
    description: Exclude the mail services from rescue restarts
    default: "n"
    example: "n"
