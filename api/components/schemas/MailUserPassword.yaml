type: object
x-db-table: mail_user
required:
  - mailuser_id
  - password
properties:
  mailuser_id:
    type: integer
    format: int64
    description: ID of the mail user
    example: 1
    x-db-field: mailuser_id

  password:
    type: string
    format: password
    description: New password for the mail user
    minLength: 8
    maxLength: 255
    example: "newSecurePassword123!"
    x-db-field: password

description: |
  ## Mail user password management

  Password management for a mail user.
  
  ### Features
  - Set a new password for the mail user
  - Password strength validation
  
  ### Password Requirements
  - Minimum 8 characters
  - Should include uppercase and lowercase letters
  - Should include numbers
  - Should include special characters
  
  ### Notes
  - Passwords are stored using secure hashing
  - Only the user or an administrator can change the password
  - Passwords are never returned in API responses
