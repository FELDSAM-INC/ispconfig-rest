# Request body for PUT /mail/users/{id}/password (mail_user.password column).
type: object
x-db-table: mail_user
required:
  - password
properties:
  password:
    type: string
    format: password
    writeOnly: true
    description: |
      New password for the mail user
      - Minimum length 5 characters (legacy ISPConfig interface policy:
        `min_password_length` default 5, admin/form/system_config.tform.php)
      - Stored as a SHA-512 crypt hash (`$6$rounds=5000$...`, legacy CRYPTMAIL)
      - Never returned in API responses
    minLength: 5
    maxLength: 255
    example: "newSecurePassword123!"
    x-db-field: password

description: |
  ## Mail user password change

  Sets a new password for the mailbox identified by the URL path. Only the
  `password` column is updated (datalog update on `mail_user`).
