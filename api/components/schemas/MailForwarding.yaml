# Verified against source_code/install/sql/ispconfig3.sql (table mail_forwarding)
# and source_code/interface/web/mail/form/mail_forward.tform.php /
# mail_alias.tform.php / mail_domain_catchall.tform.php.
# Rows with type=aliasdomain are exposed through /mail/alias-domains instead.
type: object
x-db-table: mail_forwarding
required:
  - source
  - destination
  - type
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the forwarding entry
    example: 1
    x-db-field: forwarding_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: |
      Server ID where the forwarding is configured.
      Derived from the mail domain of the source address (legacy parity) — not writable.
    example: 1
    x-db-field: server_id

  source:
    type: string
    description: |
      Source address for the forwarding rule
      - For forwards/aliases: a full email address (user@domain.tld)
      - For catchalls: the domain with @ prefix (@domain.tld), matching
        the legacy pattern ^@[\w.-]{1,255}\.[a-zA-Z-]{2,63}$
      - The domain part must be an existing mail domain
      - Must not equal the address of an active mailbox
      - Lowercased and IDN-encoded on save; cannot be changed after creation
    example: "user@example.com"
    maxLength: 255
    x-db-field: source

  destination:
    type: string
    description: |
      Destination email address(es)
      - Input may be separated by commas, semicolons or whitespace; each part
        must be a valid email address
      - Stored normalized as a ', '-joined list (legacy parity)
    example: "forward@example.com, another@example.com"
    x-db-field: destination

  type:
    type: string
    description: |
      Type of the forwarding entry (cannot be changed after creation):
      - 'forward' - Regular email forward
      - 'catchall' - Catch-all forward for a domain
      - 'alias' - Email alias pointing at an existing mailbox
    enum: [forward, catchall, alias]
    x-db-field: type

  allow_send_as:
    type: boolean
    description: |
      Allow sending emails as the source address.
      Legacy default: true for aliases, false for forwards and catchalls.
    default: false
    x-db-field: allow_send_as

  active:
    type: boolean
    default: true
    description: Whether the forwarding is active (legacy form default is active)
    x-db-field: active

  greylisting:
    type: boolean
    default: false
    description: Whether greylisting is enabled for this address (legacy default is disabled)
    x-db-field: greylisting

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record (inherited from the source mail domain)
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

  # Computed metadata (not stored in DB)
  is_catchall:
    type: boolean
    readOnly: true
    description: True if this is a catchall forward (source starts with @); computed, not a table column
    example: false

description: |
  Email forwarding configuration (table `mail_forwarding`).

  ### Types
  - **forward**: forwards mail for a specific address to one or more destinations
  - **catchall**: forwards all mail of a domain (source `@example.com`)
  - **alias**: alternative address for an existing mailbox

  Alias domains (`type=aliasdomain`) live in the same table but are managed
  through the dedicated `/mail/alias-domains` endpoints.

  ### Validation Rules
  - Source must be a valid email (forward/alias) or `@domain.tld` (catchall)
  - Destination must contain at least one valid email address
  - The source must not collide with an active mailbox address
