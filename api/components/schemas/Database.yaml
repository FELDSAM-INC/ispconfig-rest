type: object
x-db-table: web_database
description: |
  A website database — table `web_database`.

  ### Database name prefixing
  The submitted `database_name` is prepended with the resolved ISPConfig
  `dbname_prefix` (e.g. `c1`); the applied prefix is stored in
  `database_name_prefix`. The full name is cropped to 64 characters, must be
  unique per server, and must not be blacklisted (the ISPConfig control-panel
  database name or `mysql`).

  ### Parent site
  `parent_domain_id` must reference an existing `vhost` web domain (legacy
  rejects 0 with `database_site_error_empty`). The linked database users'
  `sys_groupid` is kept in sync with the parent domain's group.

  ### Remote access auto-fix
  When the parent web domain lives on a different server than the database,
  the web server's IP (plus configured `default_remote_dbserver` and mirror
  IPs) is appended to `remote_ips` and `remote_access` is forced to `y` —
  on create and update (legacy behavior).

  ### Linked user sync
  Create and update write an additional datalog update for the linked
  `database_user_id` / `database_ro_user_id` records to sync their
  `server_id`, so the daemons (re)create the grants.

  ### Immutability
  `database_name`, `database_charset` and `server_id` cannot be changed
  after creation.
required:
  - parent_domain_id
  - database_name
  - database_user_id
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the database (database column `database_id`)
    example: 42
    x-db-field: database_id

  server_id:
    type: integer
    format: int64
    description: |
      ID of the database server. Must reference a server with the DB role.
      Immutable after creation.
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: |
      ID of the parent web domain (`vhost`) this database belongs to.
      Required — legacy ISPConfig rejects databases without a site.
    example: 123

  type:
    type: string
    enum: [mysql, postgresql]
    default: mysql
    description: |
      Database type. `postgresql` is only available when enabled in the
      ISPConfig sites configuration. For PostgreSQL databases the read/write
      and read-only users must not be reused by another PostgreSQL database
      on the same server.
    example: mysql

  database_name:
    type: string
    minLength: 2
    maxLength: 64
    pattern: '^[a-zA-Z0-9_]{2,64}$'
    description: |
      Database name (without prefix). Legacy regex `/^[a-zA-Z0-9_]{2,64}$/`.
      The full (prefixed) name must be unique per server and not blacklisted.
      Immutable after creation.
    example: "mydb"

  database_name_prefix:
    type: string
    readOnly: true
    maxLength: 50
    description: Prefix applied to the database name (resolved from the ISPConfig `dbname_prefix` setting)
    example: "c1"

  database_name_full:
    type: string
    readOnly: true
    maxLength: 64
    description: Full database name including prefix
    example: "c1mydb"

  database_quota:
    type: integer
    format: int64
    minimum: -1
    default: -1
    description: Database quota in MB (`-1` = unlimited)
    example: 1024

  database_user_id:
    type: integer
    format: int64
    description: |
      ID of the database user with read/write access. Required on create and
      update (legacy `database_user_missing` check).
    example: 42

  database_ro_user_id:
    type: integer
    format: int64
    default: 0
    description: ID of the database user with read-only access (0 = none)
    example: 0

  database_charset:
    type: string
    enum: ["", latin1, utf8, utf8mb4]
    default: ""
    description: |
      Character set for the database (`""` = server default).
      Immutable after creation.
    example: utf8mb4

  remote_access:
    type: boolean
    default: false
    description: |
      Allow remote access to the database. Forced to `true` server-side when
      the parent web domain lives on a different server than the database.
    example: false
    x-db-format: "y/n"

  remote_ips:
    type: string
    nullable: true
    description: |
      Comma-separated list of IPs/hostnames allowed to connect when remote
      access is enabled (empty = any). The web server's IP is appended
      automatically when web and database servers differ.
    example: "203.0.113.10,%.example.com"

  backup_interval:
    type: string
    enum: [none, daily, weekly, monthly]
    default: none
    description: Backup interval for the database
    example: daily

  backup_copies:
    type: integer
    minimum: 1
    maximum: 30
    default: 1
    description: Number of backup copies to keep (legacy options 1-10, 15, 20, 30)
    example: 7

  active:
    type: boolean
    default: true
    description: Whether the database is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID — always synced from the parent web domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the database
    example: "db1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
