type: object
x-db-table: web_database
description: Represents a database in the system
required:
  - database_name
  - type
  - server_id
  - sys_groupid
properties:
  database_id:
    type: integer
    readOnly: true
    description: Unique identifier for the database
    x-db-field: database_id
    example: 42
  sys_groupid:
    type: integer
    description: System group ID that owns this database
    example: 10
  server_id:
    type: integer
    description: ID of the server where the database is hosted
    example: 1

  type:
    type: string
    enum: [mysql, postgresql, mongo]
    description: Database type
    example: "mysql"
  database_name:
    type: string
    description: Name of the database (without prefix)
    minLength: 1
    maxLength: 64
    pattern: '^[a-zA-Z0-9_]+$'
    example: "mydb"
  database_name_prefix:
    type: string
    maxLength: 25
    description: Prefix for the database name (auto-generated by ISPConfig)
    readOnly: true
    example: "db12345_"

  database_name_full:
    type: string
    readOnly: true
    description: Full database name including prefix
    example: "db12345_mydb"
    maxLength: 64
    pattern: '^[a-zA-Z0-9_]+$'
    
  database_charset:
    type: string
    description: Character set for the database
    enum: ["", "latin1", "utf8", "utf8mb4"]
    default: ""
    example: "utf8mb4"
  # Database Users
  database_user_id:
    type: integer
    description: ID of the database user with read/write access
    example: 42
    
  database_ro_user_id:
    type: integer
    description: ID of the database user with read-only access (0 = none)
    default: 0
    example: 43
    
  remote_access:
    type: string
    enum: [y, n]
    description: Allow remote access to the database
    default: "n"
    example: "n"
    
  remote_ips:
    type: string
    description: |
      Comma-separated list of IP addresses or hostnames allowed to connect
      when remote access is enabled. Use % as wildcard (e.g., 192.168.1.%, %.example.com)
    example: "192.168.1.%, %.example.com"
    default: ""
  backup_interval:
    type: string
    enum: [daily, weekly, monthly, none]
    description: Backup interval for the database
    default: "none"
    example: "daily"
  backup_copies:
    type: integer
    description: Number of backup copies to keep
    minimum: 0
    maximum: 100
    default: 1
  active:
    type: string
    enum: [y, n]
    description: Whether the database is active
    default: "y"
    example: "y"

  # Database Quota
  database_quota:
    type: integer
    description: |
      Database quota in MB. 
      -1 means unlimited (default)
      0 means disabled
      Any positive number sets the quota in MB
    default: -1
    example: 1024
    

  created_at:
    type: string
    format: date-time
    readOnly: true
    description: Timestamp when the database was created
    example: "2023-01-01T12:00:00Z"

  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: Timestamp when the database was last updated
    example: "2023-01-01T12:00:00Z"

  # Parent Domain (for web databases)
  parent_domain_id:
    type: integer
    description: ID of the parent web domain this database belongs to (0 = standalone)
    default: 0
    example: 123
    

