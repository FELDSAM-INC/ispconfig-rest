# Server Jailkit Configuration Schema — the [jailkit] section of the
# server.config INI blob (server table, `config` column). Field inventory
# mirrors the legacy `jailkit` tab of server_config.tform.php.
# All properties are optional on PUT: omitted text/select keys keep their
# current value. Keys present in the stored blob but unknown to this schema
# are preserved untouched.
type: object
x-db-table: server
x-db-field: config
x-ini-section: jailkit
additionalProperties: true
properties:
  jailkit_chroot_home:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/\[\]]{1,}$'
    description: >-
      Absolute path of the jail home directory; supports the [username]
      placeholder (legacy NOTEMPTY + path regex).
    example: "/home/[username]"
  jailkit_chroot_app_sections:
    type: string
    maxLength: 1000
    pattern: '^[a-zA-Z0-9\.\-\_\ ]{1,}$'
    description: Space-separated list of jk_init sections installed into new jails (legacy NOTEMPTY + regex)
    example: "coreutils basicshell editors extendedshell netutils ssh sftp scp jk_lsh mysql-client git"
  jailkit_chroot_app_programs:
    type: string
    maxLength: 1000
    pattern: '^[a-zA-Z0-9\.\-\_\/\ ]{1,}$'
    description: Space-separated list of additional programs copied into new jails (legacy NOTEMPTY + regex)
    example: "lesspipe pico unzip zip patch which"
  jailkit_chroot_cron_programs:
    type: string
    maxLength: 1000
    pattern: '^[a-zA-Z0-9\.\-\_\/\ ]{1,}$'
    description: Space-separated list of programs/paths available to jailed cron jobs (legacy NOTEMPTY + regex)
    example: "/usr/bin/php /usr/lib/php/ /usr/share/php/ /usr/share/zoneinfo/ /usr/bin/perl /usr/share/perl/"
  jailkit_chroot_authorized_keys_template:
    type: string
    maxLength: 1000
    pattern: '^[a-zA-Z0-9\.\-\_\/\ ]*$'
    description: Path of the authorized_keys template copied into new jails (optional)
    example: "/root/.ssh/authorized_keys"
  jailkit_hardlinks:
    type: string
    enum: [allow, "no", "yes"]
    description: >-
      Hardlink handling inside jails — allow = leave hardlinks in place,
      no = do not use hardlinks (copy), yes = use hardlinks.
    default: allow
    example: allow
