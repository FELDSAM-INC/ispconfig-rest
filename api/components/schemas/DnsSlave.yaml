type: object
x-db-table: dns_slave
description: |
  A secondary (slave) DNS zone transferred from an external master server.
  Maps 1:1 to ISPConfig's `dns_slave` table. The combination of `origin` and
  `server_id` is unique.
required:
  - server_id
  - origin
  - ns
properties:
  # System Fields
  id:
    type: integer
    format: int64
    x-db-field: id
    minimum: 1
    readOnly: true
    description: Unique identifier for the DNS slave zone
    example: 1

  sys_userid:
    type: integer
    format: int32
    minimum: 1
    readOnly: true
    description: ID of the system user who created this slave zone (derived from the API key)
    example: 1

  sys_groupid:
    readOnly: true
    type: integer
    format: int32
    minimum: 1
    description: System group ID that owns this slave zone (defaults to the API user's group when omitted)
    example: 10

  sys_perm_user:
    readOnly: true
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: 'riud'
    description: User permissions (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_group:
    readOnly: true
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: 'riud'
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_other:
    readOnly: true
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    default: ''
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  client_id:
    type: integer
    minimum: 1
    writeOnly: true
    description: >-
      Optional owning client. On create, resolved to the client's sys_group and
      set as the record's owner (sys_groupid) — mirroring the ISPConfig "Client"
      select. Admin keys may assign any client; a client/reseller key only a
      client within its own scope (otherwise 403). Write-only; not returned.
    example: 5

  # DNS Slave Zone Configuration
  server_id:
    type: integer
    format: int32
    minimum: 1
    description: ID of the DNS server that acts as secondary for this zone
    x-db-field: server_id
    example: 1

  origin:
    type: string
    maxLength: 255
    pattern: '^[a-zA-Z0-9./-]{1,255}\.[a-zA-Z0-9-]{2,63}\.?$'
    description: |
      The domain name of the slave zone. Validated with the legacy ISPConfig
      pattern, which allows a trailing dot and `/` (for classless reverse
      zones, e.g. `0/25.2.0.192.in-addr.arpa`).
      Unique per DNS server (`origin` + `server_id`).
    x-db-field: origin
    example: "example.com"

  ns:
    type: string
    maxLength: 255
    description: |
      The master (primary) DNS server to transfer this zone from —
      an IP address or hostname.
    x-db-field: ns
    example: "203.0.113.1"

  active:
    type: boolean
    default: true
    description: Whether the slave zone is active
    x-db-field: active
    x-db-format: "Y/N"
    example: true

  xfer:
    type: string
    nullable: true
    description: |
      Comma-separated list of IP addresses allowed to perform zone transfers
      from this secondary. Leave empty to disable zone transfers.
    x-db-field: xfer
    example: "192.0.2.1,192.0.2.2"
