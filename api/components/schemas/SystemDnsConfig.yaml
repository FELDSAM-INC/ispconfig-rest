# [dns] section of the global system configuration (sys_ini INI blob).
# Field set verified against legacy source_code/interface/web/admin/form/system_config.tform.php
# (matches the legacy key set exactly). Unexposed legacy keys of other sections
# are preserved untouched by PUT (read-merge-write).
type: object
description: DNS-related global system configuration (the `[dns]` section of the `sys_ini` blob)
properties:
  default_dnsserver:
    type: integer
    description: Default DNS server ID
    example: 1
  default_slave_dnsserver:
    type: integer
    description: Default slave DNS server ID
    example: 2
  dns_external_slave_fqdn:
    type: string
    description: FQDN of external slave DNS server
    example: "ns2.example.com"
  dns_show_zoneexport:
    type: string
    enum: [y, n]
    description: Whether to show zone export option
    example: "n"
