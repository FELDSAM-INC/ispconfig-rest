# Server Configuration Schema — the parsed view of the server.config column,
# a single INI-style text blob with [section] headers that legacy ISPConfig
# reads/writes with its own ini_parser class (getconf::get_server_config).
# This schema is a container of the parsed sections; it does NOT mirror a
# table row of its own (previously declared server_name/ip_address/dns1/
# ssh_*/timezone/... properties were invented and have been removed).
#
# Read: GET /servers/{id}/configs returns this object.
# Write: there is NO whole-blob write. Each section is updated individually
#       via PUT /servers/{id}/configs/{section}, which performs a byte-safe
#       read-merge-write: parse the stored blob, replace ONLY the target
#       section, re-serialize, and datalog-update the server row's `config`
#       field (legacy server_config_edit.php::onUpdateSave). All sections
#       and keys not addressed by the request — including [global] and any
#       unknown sections — are preserved byte-for-byte.
type: object
x-db-table: server
x-db-field: config
additionalProperties: true
properties:
  server_id:
    type: integer
    format: int64
    description: ID of the server this configuration belongs to (not part of the blob itself)
    readOnly: true
    example: 1
  global:
    type: object
    readOnly: true
    additionalProperties: true
    description: >-
      The [global] section, written by the installer (webserver/mailserver/
      dnsserver software selection). Not editable in legacy ISPConfig and
      read-only in this API; no section endpoint exists.
    properties:
      webserver:
        type: string
        description: Web server software selected at install time
        example: apache
      mailserver:
        type: string
        description: Mail server software selected at install time
        example: postfix
      dnsserver:
        type: string
        description: DNS server software selected at install time
        example: mydns
  server:
    $ref: './ServerServerConfig.yaml'
  mail:
    $ref: './ServerMailConfig.yaml'
  getmail:
    $ref: './ServerGetmailConfig.yaml'
  web:
    $ref: './ServerWebConfig.yaml'
  dns:
    $ref: './ServerDnsConfig.yaml'
  fastcgi:
    $ref: './ServerFastCgiConfig.yaml'
  xmpp:
    $ref: './ServerXmppConfig.yaml'
  jailkit:
    $ref: './ServerJailkitConfig.yaml'
  vlogger:
    $ref: './ServerVloggerConfig.yaml'
  cron:
    $ref: './ServerCronConfig.yaml'
  rescue:
    $ref: './ServerRescueConfig.yaml'
