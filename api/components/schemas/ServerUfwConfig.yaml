type: object
x_db_table: server
required:
  - ufw_enabled
  - ufw_default_incoming
  - ufw_default_outgoing
  - ufw_default_forwarded
properties:
  ufw_enabled:
    type: string
    enum: [y, n]
    description: Whether UFW (Uncomplicated Firewall) is enabled
    example: "y"
  ufw_default_incoming:
    type: string
    enum: [deny, allow, reject]
    description: Default policy for incoming connections
    example: "deny"
  ufw_default_outgoing:
    type: string
    enum: [deny, allow, reject]
    description: Default policy for outgoing connections
    example: "allow"
  ufw_default_forwarded:
    type: string
    enum: [deny, allow, reject]
    description: Default policy for forwarded connections
    example: "deny"
  ufw_ipv6:
    type: string
    enum: [y, n]
    description: Whether IPv6 is enabled in UFW
    example: "y"
  ufw_logging:
    type: string
    enum: [off, low, medium, high, full]
    description: Logging level for UFW
    example: "low"
  ufw_log_dropped:
    type: string
    enum: [y, n]
    description: Whether to log dropped packets
    example: "y"
  ufw_log_rejected:
    type: string
    enum: [y, n]
    description: Whether to log rejected packets
    example: "y"
