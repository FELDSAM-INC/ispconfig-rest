# Verified against source_code/install/sql/ispconfig3.sql (table spamfilter_users)
# and source_code/interface/web/mail/form/spamfilter_users.tform.php.
type: object
x-db-table: spamfilter_users
required:
  - server_id
  - policy_id
  - email
  - fullname
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the spamfilter user
    example: 1
    x-db-field: id

  server_id:
    type: integer
    format: int64
    description: |
      Server ID where the spamfilter is configured
      - Must reference a mail server (server.mail_server=1, mirror_server_id=0)
      - Cannot be changed after creation
    example: 1
    x-db-field: server_id

  policy_id:
    type: integer
    format: int64
    description: ID of the spamfilter policy to apply (0 = inherit from a lower-priority match)
    example: 1
    x-db-field: policy_id

  priority:
    type: integer
    description: |
      Priority of the mapping (1-10; legacy form default 5).
      Note: the database column default is 7 — the value used by the
      automatic mapping created for every mailbox.
    minimum: 1
    maximum: 10
    default: 5
    example: 5
    x-db-field: priority

  email:
    type: string
    description: |
      Email address the policy applies to
      - Unique (database unique key on email)
      - Lowercased and IDN-encoded on save
      - Cannot be changed after creation
    format: email
    maxLength: 255
    example: "user@example.com"
    x-db-field: email

  fullname:
    type: string
    description: Full name / label for the mapping
    maxLength: 64
    example: "John Doe"
    x-db-field: fullname

  local:
    type: string
    description: Whether this is a local address (stored uppercase, exact casing preserved)
    enum: [Y, N]
    default: "Y"
    x-db-field: local

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1
    x-db-field: sys_userid

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1
    x-db-field: sys_groupid

  sys_perm_user:
    type: string
    readOnly: true
    description: Owner permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"
    x-db-field: sys_perm_user

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"
    x-db-field: sys_perm_group

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""
    x-db-field: sys_perm_other

description: |
  Spamfilter user — maps an email address to a spamfilter policy
  (table `spamfilter_users`).

  ### Notes
  - Creating/updating a mailbox automatically maintains a companion
    spamfilter user for its address (priority 7, local 'Y')
  - `email` is globally unique; duplicates are rejected with 409
