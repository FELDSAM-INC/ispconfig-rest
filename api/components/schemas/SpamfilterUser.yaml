description: |
  Spamfilter user maps an email address to a spamfilter policy.
  
  ### Key Features
  - Assign spamfilter policies to specific email addresses
  - Set priority for rule matching
  - Support for both local and non-local users
  
  ### Access Control
  - Users can only see and manage their own spamfilter settings
  - Admin users can manage all spamfilter users
