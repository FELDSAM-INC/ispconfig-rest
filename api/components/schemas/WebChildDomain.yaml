type: object
x-db-table: web_domain
description: |
  A web child domain — a subdomain or alias domain of an existing website.
  Stored in the `web_domain` table with `type` = `subdomain` or `alias`
  (legacy "web_childdomain" form).

  ### Subdomains
  - Submit only the label in `domain` (e.g. `blog`); the stored domain is
    composed server-side as `{domain}.{parent domain}`
  - Share the parent domain's vhost

  ### Alias Domains
  - Submit the full domain name in `domain`
  - Point to the parent domain's website; `subdomain` controls the automatic
    www/wildcard prefix

  ### Server-derived fields
  `server_id` and `sys_groupid` are always copied from the parent web domain.
  Reparenting re-syncs the group and triggers a vhost-config regeneration for
  the old parent (legacy behavior).
required:
  - parent_domain_id
  - domain
  - type
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the web child domain (database column `domain_id`)
    example: 123
    x-db-field: domain_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID — always derived from the parent web domain
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain (must reference a `vhost` record)
    example: 42

  domain:
    type: string
    maxLength: 255
    description: |
      Domain name.

      ### Validation Rules
      - Subdomains: submit the label only; the full domain is composed
        server-side and must be unique
      - Alias domains: submit the full domain name; must be unique
      - Lower-cased on save; IDN names converted to punycode (legacy
        `TOLOWER` + `IDNTOASCII` filters)
    example: "blog"

  type:
    type: string
    enum: [subdomain, alias]
    default: subdomain
    description: |
      Type of child domain:
      - `subdomain`: a subdomain of the parent domain (e.g. blog.example.com)
      - `alias`: an alias domain pointing to the parent domain
    example: subdomain

  subdomain:
    type: string
    enum: [none, www, "*"]
    default: www
    description: |
      Automatic subdomain prefix (alias domains):
      - `none`: no prefix (aliasdomain.com only)
      - `www`: also serve www.aliasdomain.com
      - `*`: wildcard (only when wildcards are enabled on the server)
    example: www

  redirect_type:
    type: string
    enum: ["", 'no', R, L, "R,L", "R=301,L", last, break, redirect, permanent, proxy]
    default: ""
    description: |
      Redirect flag / type (Apache rewrite flags or nginx directives):
      `""` = no redirect; `no`, `R`, `L`, `R,L`, `R=301,L` (Apache);
      `last`, `break`, `redirect`, `permanent` (nginx); `proxy`.
      `proxy` requires a URL (not a path) in `redirect_path`.
    example: "R=301,L"

  redirect_path:
    type: string
    maxLength: 255
    nullable: true
    description: |
      Redirect target: a URL (`http://`, `https://`, `ftp://`) or an absolute
      path ending in `/` without `..` (legacy redirect regex).
    example: "https://www.example.com/"

  seo_redirect:
    type: string
    enum: ["", non_www_to_www, www_to_non_www, "*_domain_tld_to_domain_tld", "*_domain_tld_to_www_domain_tld", "*_to_domain_tld", "*_to_www_domain_tld"]
    default: ""
    description: |
      SEO canonicalisation redirect:
      - `""`: none
      - `non_www_to_www`: domain.tld => www.domain.tld
      - `www_to_non_www`: www.domain.tld => domain.tld
      - `*_domain_tld_to_domain_tld`: *.domain.tld => domain.tld
      - `*_domain_tld_to_www_domain_tld`: *.domain.tld => www.domain.tld
      - `*_to_domain_tld`: * => domain.tld
      - `*_to_www_domain_tld`: * => www.domain.tld
    example: www_to_non_www

  ssl_letsencrypt_exclude:
    type: boolean
    default: false
    description: Exclude this child domain from the parent's Let's Encrypt certificate
    example: false
    x-db-format: "y/n"

  active:
    type: boolean
    default: true
    description: Whether the web child domain is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID — always synced from the parent web domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the child domain
    example: "web1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
