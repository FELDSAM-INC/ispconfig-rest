type: object
x-db-table: mail_user
required:
  - mailuser_id
  - autoresponder
  - autoresponder_subject
  - autoresponder_text
properties:
  mailuser_id:
    type: integer
    format: int64
    description: ID of the mail user
    example: 1
    x-db-field: mailuser_id
    
  email:
    type: string
    format: email
    description: Email address of the mail user
    example: "user@example.com"
    x-db-field: email
    
  autoresponder:
    type: string
    enum: [y, n]
    default: n
    description: Whether the autoresponder is active
    example: "y"
    x-db-field: autoresponder
    
  autoresponder_start_date:
    type: string
    format: date-time
    nullable: true
    description: Date and time when the autoresponder should become active (leave empty to start immediately)
    example: "2025-06-01T09:00:00+02:00"
    x-db-field: autoresponder_start_date
    
  autoresponder_end_date:
    type: string
    format: date-time
    nullable: true
    description: Date and time when the autoresponder should become inactive (leave empty for no end date)
    example: "2025-06-15T18:00:00+02:00"
    x-db-field: autoresponder_end_date
    
  autoresponder_subject:
    type: string
    maxLength: 255
    default: "Out of office reply"
    description: Subject of the autoresponder email
    example: "Out of office reply"
    x-db-field: autoresponder_subject
    
  autoresponder_text:
    type: string
    nullable: true
    description: Body of the autoresponder email
    example: |
      Thank you for your email. I am currently out of the office and will return on June 15th, 2025.
      For urgent matters, please contact support@example.com.
      
      Best regards,
      John Doe
    x-db-field: autoresponder_text

description: |
  ## Mail user autoresponder configuration

  Autoresponder configuration for a mail user.
  
  ### Features
  - Automatic email responses when the user is away
  - Configurable start and end dates
  - Customizable subject and message
  
  ### Notes
  - When autoresponder is enabled, all incoming emails will receive an automatic response
  - The response is sent only once per sender per day
  - System administrators can manage all autoresponders
  - Regular users can only manage their own autoresponder
  - The end date is optional - if not set, the autoresponder will continue until disabled
