# Sub-resource view of the mail_user table (autoresponder columns only).
# Verified against source_code/install/sql/ispconfig3.sql and
# source_code/interface/web/mail/form/mail_user.tform.php (Autoresponder tab).
type: object
x-db-table: mail_user
required:
  - autoresponder
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: ID of the mail user (taken from the URL path)
    example: 1
    x-db-field: mailuser_id

  email:
    type: string
    format: email
    readOnly: true
    description: Email address of the mail user
    example: "user@example.com"
    x-db-field: email

  autoresponder:
    type: boolean
    default: false
    description: |
      Whether the autoresponder is active.
      Disabling the autoresponder clears both dates (legacy parity).
    example: true
    x-db-field: autoresponder

  autoresponder_start_date:
    type: string
    format: date-time
    nullable: true
    description: Date and time when the autoresponder becomes active (empty = starts immediately)
    example: "2025-06-01T09:00:00+02:00"
    x-db-field: autoresponder_start_date

  autoresponder_end_date:
    type: string
    format: date-time
    nullable: true
    description: |
      Date and time when the autoresponder becomes inactive (empty = no end date).
      Must be later than `autoresponder_start_date` when both are set.
    example: "2025-06-15T18:00:00+02:00"
    x-db-field: autoresponder_end_date

  autoresponder_subject:
    type: string
    maxLength: 255
    default: "Out of office reply"
    description: Subject of the autoresponder email
    example: "Out of office reply"
    x-db-field: autoresponder_subject

  autoresponder_text:
    type: string
    nullable: true
    description: Body of the autoresponder email
    example: |
      Thank you for your email. I am currently out of the office and will return on June 15th, 2025.
      For urgent matters, please contact support@example.com.

      Best regards,
      John Doe
    x-db-field: autoresponder_text

description: |
  ## Mail user autoresponder configuration

  Autoresponder settings of a mailbox. This is a view over the autoresponder
  columns of the `mail_user` row — updates produce a `mail_user` datalog update.

  ### Notes
  - The end date is optional; if not set, the autoresponder runs until disabled
  - Disabling the autoresponder (PUT `autoresponder: false` or DELETE) clears
    both dates, mirroring legacy ISPConfig
