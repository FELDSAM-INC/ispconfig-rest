type: object
x-db-table: cron
description: |
  A scheduled cron job for a website â€” table `cron` (primary key `id`).

  ### Job types
  - `url`: the command is fetched over HTTP(S)
  - `full`: full shell command executed as the site's system user
  - `chrooted`: shell command executed in the site's jail

  `type` is derived server-side: commands starting with `http://`/`https://`
  are always stored as `url`; otherwise the owning client's `limit_cron_type`
  applies (`full` for admin-owned sites).

  ### Time fields (legacy `validate_cron` rules)
  Allowed characters are `0-9`, `,`, `-`, `/` and `*`; the separators `,`,
  `-`, `/` must never be adjacent. Each entry must match
  `((\d+)(-(\d+))?|\*)(/[1-9]\d*)?` and stay within the field range:
  run_min 0-59, run_hour 0-23, run_mday 1-31, run_month 1-12, run_wday 0-7.
  `@reboot` is accepted only in `run_month` (run the job at server startup).

  ### Command rules (legacy `command_format`)
  URL commands must parse with scheme http/https and a valid hostname; the
  `{DOMAIN}` placeholder is substituted with the parent domain before
  validation. Commands containing backslashes, newlines, carriage returns or
  null bytes are rejected.

  ### Server-derived fields
  `server_id` and `sys_groupid` are always copied from the parent web domain.
required:
  - parent_domain_id
  - run_min
  - run_hour
  - run_mday
  - run_month
  - run_wday
  - command
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the cron job (database column `id`)
    example: 123
    x-db-field: id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID â€” always derived from the parent web domain
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain this cron job belongs to
    example: 42

  run_min:
    type: string
    maxLength: 100
    pattern: '^[0-9\-\*\/,]+$'
    description: |
      Minutes (0-59). Standard cron syntax: `*`, `x`, `x,y,z`, `x-y`, `*/x`,
      `x-y/z`. Legacy `run_time_format` validation applies.
    example: "*/5"

  run_hour:
    type: string
    maxLength: 100
    pattern: '^[0-9\-\*\/,]+$'
    description: Hours (0-23). Same syntax and validation as `run_min`.
    example: "2"

  run_mday:
    type: string
    maxLength: 100
    pattern: '^[0-9\-\*\/,]+$'
    description: Days of the month (1-31). Same syntax and validation as `run_min`.
    example: "*"

  run_month:
    type: string
    maxLength: 100
    pattern: '^([0-9\-\*\/,]+|@reboot)$'
    description: |
      Months (1-12). Same syntax and validation as `run_min`, plus the
      special value `@reboot` (run at server startup) â€” legacy
      `run_month_format` validation.
    example: "*"

  run_wday:
    type: string
    maxLength: 100
    pattern: '^[0-9\-\*\/,]+$'
    description: Days of the week (0-7, both 0 and 7 are Sunday). Same syntax and validation as `run_min`.
    example: "*"

  command:
    type: string
    description: |
      Command to execute:
      - a URL starting with `http://` or `https://` (job becomes type `url`)
      - a shell command for `full`/`chrooted` execution
      - may contain the `{DOMAIN}` placeholder (replaced with the parent
        domain)

      Backslashes, CR/LF and null bytes are rejected (legacy
      `command_format` validation).
    example: "https://example.com/cron.php"

  type:
    type: string
    enum: [url, full, chrooted]
    default: url
    readOnly: true
    description: |
      Job type â€” derived server-side: `url` for http(s) commands, otherwise
      the owning client's `limit_cron_type` (`full` for admin-owned sites).
    example: url

  log:
    type: boolean
    default: false
    description: Whether to log the cron job output
    example: false
    x-db-format: "y/n"

  active:
    type: boolean
    default: true
    description: Whether the cron job is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID â€” always synced from the parent web domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server the cron job runs on
    example: "web1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
