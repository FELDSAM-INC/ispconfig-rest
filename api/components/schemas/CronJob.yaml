type: object
x-db-table: web_cron
description: Represents a scheduled cron job
required:
  - server_id
  - parent_domain_id
  - run_min
  - run_hour
  - run_mday
  - run_month
  - run_wday
  - command
  - type
  - active
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the cron job
    example: 123
    x-db-field: id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID where the cron job will run
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain this cron job is associated with
    example: 42

  run_min:
    type: string
    description: |
      Minutes when the cron job should run (0-59)
      
      Format examples:
      - "*" - every minute
      - "5" - at minute 5
      - "5,15,25" - at minutes 5, 15, and 25
      - "5-10" - minutes 5 through 10
      - "*/5" - every 5 minutes
      - "5-10/2" - every 2 minutes between minutes 5 and 10
    pattern: '^[0-9\-\*\/,]+$'
    example: "0"

  run_hour:
    type: string
    description: |
      Hours when the cron job should run (0-23)
      
      Same format as run_min
    pattern: '^[0-9\-\*\/,]+$'
    example: "2"

  run_mday:
    type: string
    description: |
      Days of the month when the cron job should run (1-31)
      
      Same format as run_min
    pattern: '^[0-9\-\*\/,]+$'
    example: "*"

  run_month:
    type: string
    description: |
      Months when the cron job should run (1-12)
      
      Same format as run_min or use "@reboot" to run at server startup
    pattern: '^([0-9\-\*\/,]+|@reboot)$'
    example: "*"

  run_wday:
    type: string
    description: |
      Days of the week when the cron job should run (0-7, where both 0 and 7 are Sunday)
      
      Same format as run_min
    pattern: '^[0-9\-\*\/,]+$'
    example: "*"

  command:
    type: string
    description: |
      Command to execute. Can be:
      - A URL starting with http:// or https:// for web requests
      - A shell command for full or chrooted execution
      - May contain {DOMAIN} placeholder which will be replaced with the parent domain
    maxLength: 255
    example: "/usr/bin/php /var/www/example.com/web/cron.php"

  type:
    type: string
    description: |
      Type of cron job:
      - `url`: For web requests (http/https)
      - `full`: Full shell command execution
      - `chrooted`: Chrooted shell command execution (limited to website's document root)
    enum: [url, full, chrooted]
    default: "url"

  log:
    type: string
    description: Whether to log the cron job output
    enum: [y, n]
    default: "n"

  active:
    type: string
    description: Whether the cron job is active
    enum: [y, n]
    default: "y"

  # System fields (readonly)
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID who created the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID for the record
    example: 1

  sys_perm:
    type: string
    readOnly: true
    description: Permissions for the record (r=read, i=insert, u=update, d=delete)
    example: "riud"

  sys_perm_group:
    type: string
    readOnly: true
    description: Group permissions for the record
    example: "riud"

  sys_perm_other:
    type: string
    readOnly: true
    description: Other permissions for the record
    example: ""

  created_at:
    type: string
    format: date-time
    readOnly: true
    description: Creation timestamp
    example: "2023-01-01T12:00:00Z"

  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: Last update timestamp
    example: "2023-01-01T12:00:00Z"

  # Response only fields (not for input)
  server_name:
    type: string
    readOnly: true
    description: Name of the server where the cron job will run
    example: "server1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"

description: |
  A cron job allows scheduling commands to run periodically at fixed times, dates, or intervals.
  
  ### Cron Job Types
  - **url**: For web requests (http/https)
  - **full**: Full shell command execution with full system access
  - **chrooted**: Chrooted shell command execution (limited to website's document root)
  
  ### Time Format
  The time fields (run_min, run_hour, etc.) use standard cron format with the following rules:
  - `*` - Match all values
  - `x-y` - Range of values (inclusive)
  - `x,y,z` - List of values
  - `*/x` - Step values (every x units)
  - `@reboot` - Special value to run at server startup (only for run_month)
  
  ### Command Execution
  - For `url` type, the command must be a valid URL starting with http:// or https://
  - For `full` and `chrooted` types, the command will be executed in a shell
  - The `{DOMAIN}` placeholder in commands will be replaced with the parent domain name
  
  ### Security
  - Cron jobs run with the permissions of the system user associated with the parent domain
  - Chrooted jobs are limited to the website's document root
  - URL-based jobs are subject to web server security restrictions
