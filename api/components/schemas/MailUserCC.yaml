# Sub-resource view of the mail_user table (cc / forward_in_lda columns only).
# Verified against source_code/install/sql/ispconfig3.sql and
# source_code/interface/web/mail/form/mail_user.tform.php.
type: object
x-db-table: mail_user
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: ID of the mail user (taken from the URL path)
    example: 1
    x-db-field: mailuser_id

  cc:
    type: string
    description: |
      Comma-separated list of email addresses to send a copy of all incoming
      mail to. May be empty to disable copies. Each address must be a valid
      email; addresses are lowercased and IDN-encoded on save.
    example: "user1@example.com,user2@example.com"
    x-db-field: cc

  forward_in_lda:
    type: boolean
    default: false
    description: Whether the copy to the `cc` addresses is delivered by the LDA (Local Delivery Agent)
    example: true
    x-db-field: forward_in_lda

description: |
  ## Mail user CC and forward settings

  Incoming-copy settings of a mailbox. This is a view over the `cc` and
  `forward_in_lda` columns of the `mail_user` row — updates produce a
  `mail_user` datalog update.
