# Server Vlogger Configuration Schema — the [vlogger] section of the
# server.config INI blob (server table, `config` column). Field inventory
# mirrors the legacy `vlogger` tab of server_config.tform.php (a single
# field; previously declared vlogger_* properties were invented and have
# been removed).
# All properties are optional on PUT: omitted keys keep their current value.
# Keys present in the stored blob but unknown to this schema are preserved
# untouched.
type: object
x-db-table: server
x-db-field: config
x-ini-section: vlogger
additionalProperties: true
properties:
  config_dir:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of the directory containing vlogger-dbi.conf (legacy NOTEMPTY + path regex)
    example: "/etc"
