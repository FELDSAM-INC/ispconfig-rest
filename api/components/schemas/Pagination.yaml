type: object
properties:
  total:
    type: integer
    description: Total number of items
    example: 100
  per_page:
    type: integer
    description: Number of items per page
    example: 20
  current_page:
    type: integer
    description: Current page number
    example: 1
  last_page:
    type: integer
    description: Last page number
    example: 5
  from:
    type: integer
    description: Starting index of the current page
    example: 1
  to:
    type: integer
    description: Ending index of the current page
    example: 20
  path:
    type: string
    description: Base URL for pagination links
    example: "/api/v1/endpoint"
  first_page_url:
    type: string
    description: URL for the first page
    example: "/api/v1/endpoint?page=1"
  last_page_url:
    type: string
    description: URL for the last page
    example: "/api/v1/endpoint?page=5"
  next_page_url:
    type: string
    nullable: true
    description: URL for the next page (null if on last page)
    example: "/api/v1/endpoint?page=2"
  prev_page_url:
    type: string
    nullable: true
    description: URL for the previous page (null if on first page)
    example: null
required:
  - total
  - per_page
  - current_page
  - last_page
  - from
  - to
  - path
  - first_page_url
  - last_page_url
  - next_page_url
  - prev_page_url
