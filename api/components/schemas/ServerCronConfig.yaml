# Server Cron Configuration Schema — the [cron] section of the server.config
# INI blob (server table, `config` column). Field inventory mirrors the
# legacy `cron` tab of server_config.tform.php (previously declared cron_*
# properties were invented and have been removed).
# All properties are optional on PUT: omitted keys keep their current value.
# Keys present in the stored blob but unknown to this schema are preserved
# untouched.
type: object
x-db-table: server
x-db-field: config
x-ini-section: cron
additionalProperties: true
properties:
  init_script:
    type: string
    maxLength: 255
    pattern: '^[a-zA-Z0-9\-\_]{1,30}$'
    description: Name of the cron daemon init script / service (legacy NOTEMPTY + regex /^[a-zA-Z0-9\-\_]{1,30}$/)
    example: "cron"
  crontab_dir:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of the crontab drop-in directory (legacy NOTEMPTY + path regex)
    example: "/etc/cron.d"
  wget:
    type: string
    maxLength: 255
    pattern: '^\/[a-zA-Z0-9\.\-\_\/]{1,128}$'
    description: Absolute path of the wget binary used for URL cron jobs (legacy NOTEMPTY + path regex)
    example: "/usr/bin/wget"
