type: object
x_db_table: server
required:
  - cron_enabled
  - cron_mailto
  - cron_path
  - cron_shell
properties:
  cron_enabled:
    type: string
    enum: [y, n]
    description: Whether cron is enabled
    example: "y"
  cron_mailto:
    type: string
    format: email
    description: Email address for cron output
    example: "admin@example.com"
  cron_path:
    type: string
    description: Default PATH for cron jobs
    example: "/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin"
  cron_shell:
    type: string
    description: Default shell for cron jobs
    example: "/bin/sh"
  cron_home:
    type: string
    description: Default HOME directory for cron jobs
    example: "/var/www"
  cron_rand_delay:
    type: integer
    description: Maximum random delay in seconds
    example: 60
  cron_umask:
    type: string
    description: Default umask for cron jobs
    example: "0022"
