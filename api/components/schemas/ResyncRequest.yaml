# Resync Request — action DTO for POST /system/resync (no backing table;
# mirrors legacy source_code/interface/web/tools/resync.php).
#
# Behavior (per flag): for every matching record of the selected service the
# API inserts a *forced* full-record update entry into `sys_datalog`
# (an entry is emitted even though no column changed), so the ISPConfig server
# daemons re-apply the configuration. Exception — DNS: `resync_dns` does not
# re-emit records; it increases the serial of every active `dns_rr` per
# matching active zone and then increases and datalogs the zone's
# `dns_soa.serial` (legacy order preserved).
#
# `*_server_id = 0` means "all active servers of that type"
# (`active = 1 AND mirror_server_id = 0`); unknown server IDs are rejected
# with 400. `resync_all=1` enables every service flag and propagates
# `all_server_id` to every per-service server ID.
type: object
properties:
  resync_all:
    type: integer
    enum: [0, 1]
    description: >
      Resync all services (1). Enables every other resync_* flag and
      propagates all_server_id to every per-service server ID.
    example: 0
  all_server_id:
    type: integer
    description: Server ID applied to all services when resync_all=1 (0 = all active servers)
    example: 0

  # Web related
  resync_sites:
    type: integer
    enum: [0, 1]
    description: Resync websites — forced re-emission of active `web_domain` records
    example: 0
  web_server_id:
    type: integer
    description: Server ID for resyncing websites (0 = all active web servers)
    example: 1

  # FTP related
  resync_ftp:
    type: integer
    enum: [0, 1]
    description: Resync FTP users — forced re-emission of active `ftp_user` records
    example: 0
  ftp_server_id:
    type: integer
    description: Server ID for resyncing FTP users (0 = all active web servers)
    example: 1

  # WebDAV related
  resync_webdav:
    type: integer
    enum: [0, 1]
    description: Resync WebDAV users — forced re-emission of active `webdav_user` records
    example: 0
  webdav_server_id:
    type: integer
    description: Server ID for resyncing WebDAV users (0 = all active file servers)
    example: 1

  # Shell related
  resync_shell:
    type: integer
    enum: [0, 1]
    description: Resync shell users — forced re-emission of active `shell_user` records
    example: 0
  shell_server_id:
    type: integer
    description: Server ID for resyncing shell users (0 = all active web servers)
    example: 1

  # Cron related
  resync_cron:
    type: integer
    enum: [0, 1]
    description: Resync cron jobs — forced re-emission of active `cron` records
    example: 0
  cron_server_id:
    type: integer
    description: Server ID for resyncing cron jobs (0 = all active web servers)
    example: 1

  # Database related
  resync_db:
    type: integer
    enum: [0, 1]
    description: >
      Resync databases and database users — forced re-emission of all
      `web_database_user` records (including inactive) followed by active
      `web_database` records (legacy order).
    example: 0
  db_server_id:
    type: integer
    description: Server ID for resyncing databases (0 = all active database servers)
    example: 1

  # Mail related
  resync_mail:
    type: integer
    enum: [0, 1]
    description: >
      Resync mail domains — forced re-emission of active `mail_domain`
      records followed by all `spamfilter_policy` records.
    example: 0
  mail_server_id:
    type: integer
    description: >
      Server ID for resyncing mail domains (0 = all active mail servers).
      Also used by resync_mailget, resync_mailinglist, resync_mailtransport
      and resync_mailrelay (legacy behavior).
    example: 1

  # Mail fetcher related
  resync_mailget:
    type: integer
    enum: [0, 1]
    description: >
      Resync mail fetcher (getmail) accounts — forced re-emission of active
      `mail_get` records. Uses mail_server_id (legacy behavior).
    example: 0

  # Mailbox related
  resync_mailbox:
    type: integer
    enum: [0, 1]
    description: >
      Resync mailboxes and mail aliases — forced re-emission of all
      `mail_user` records followed by active `mail_forwarding` records.
    example: 0
  mailbox_server_id:
    type: integer
    description: >
      Server ID for resyncing mailboxes (0 = all active mail servers).
      Also used by resync_mailfilter (legacy behavior).
    example: 1

  # Mail filter related
  resync_mailfilter:
    type: integer
    enum: [0, 1]
    description: >
      Resync mail filters — forced re-emission of `mail_access` (active),
      `mail_content_filter` (active), `mail_user_filter` (all),
      `spamfilter_users` (all) and `spamfilter_wblist` (active) records,
      in legacy order. Uses mailbox_server_id.
    example: 0

  # Mailing list related
  resync_mailinglist:
    type: integer
    enum: [0, 1]
    description: >
      Resync mailing lists — forced re-emission of all `mail_mailinglist`
      records. Uses mail_server_id.
    example: 0

  # Mail transport related
  resync_mailtransport:
    type: integer
    enum: [0, 1]
    description: >
      Resync mail transports — forced re-emission of all `mail_transport`
      records. Uses mail_server_id.
    example: 0

  # Mail relay related
  resync_mailrelay:
    type: integer
    enum: [0, 1]
    description: >
      Resync mail relay recipients — forced re-emission of all
      `mail_relay_recipient` records. Uses mail_server_id.
    example: 0

  # DNS related
  resync_dns:
    type: integer
    enum: [0, 1]
    description: >
      Resync DNS — instead of re-emitting full records, increases and
      datalogs the serial of every active `dns_rr` per matching active zone,
      then increases and datalogs the zone's `dns_soa.serial` (legacy order).
    example: 0
  dns_server_id:
    type: integer
    description: Server ID for resyncing DNS (0 = all active DNS servers)
    example: 1

  # Client related
  resync_client:
    type: integer
    enum: [0, 1]
    description: >
      Resync client data — forced re-emission of all `client` records.
      Documented deviation from legacy: the legacy interface additionally
      raises the `client:client:on_after_update` interface-plugin event for
      each client, which this API cannot replicate; only the datalog
      re-emission is performed.
    example: 0

  # VServer related
  resync_vserver:
    type: integer
    enum: [0, 1]
    description: Resync virtual servers — forced re-emission of active `openvz_vm` records
    example: 0
  vserver_server_id:
    type: integer
    description: Server ID for resyncing virtual servers (0 = all active vserver servers)
    example: 1
