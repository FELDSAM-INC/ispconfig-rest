type: object
x-db-table: ftp_user
required:
  - parent_domain_id
  - username
  - password
  - quota_size
properties:
  ftp_user_id:
    type: integer
    readOnly: true
    description: Unique identifier for the FTP user
    example: 42
    x-db-field: ftp_user_id
  
  server_id:
    type: integer
    readOnly: true
    description: ID of the server where the FTP user is hosted
    example: 1
  
  sys_groupid:
    type: integer
    description: System group ID that owns this FTP user
    example: 10
  
  parent_domain_id:
    type: integer
    description: ID of the parent web domain this FTP user belongs to
    example: 123
  
  username:
    type: string
    description: FTP username (without prefix)
    minLength: 1
    maxLength: 64
    pattern: '^[\w\.\-@\+]+$'
    example: "john_doe"
  
  username_prefix:
    type: string
    readOnly: true
    description: Prefix for the FTP username (auto-generated by ISPConfig)
    maxLength: 25
    example: "web123_"
  
  username_full:
    type: string
    readOnly: true
    description: Full FTP username including prefix
    maxLength: 255
    example: "web123_john_doe"
  
  password:
    type: string
    description: FTP user password
    minLength: 8
    maxLength: 255
    writeOnly: true
    example: "YourSecurePassword123!"
  
  quota_size:
    type: integer
    description: |
      Disk quota in MB for the FTP user
      -1 means unlimited (default)
      0 means disabled
      Any positive number sets the quota in MB
    default: -1
    example: 1024
  
  dir:
    type: string
    readOnly: true
    description: Home directory for the FTP user (automatically set to web domain's document root)
    example: "/var/www/clients/client1/web1/web"
  
  uid:
    type: string
    description: System user ID (automatically set to web domain's system user)
    readOnly: true
    example: "5000"
  
  gid:
    type: string
    description: System group ID (automatically set to web domain's system group)
    readOnly: true
    example: "5000"
  
  active:
    type: string
    enum: [y, n]
    description: Whether the FTP user is active
    default: "y"
    example: "y"
  
  created_at:
    type: string
    format: date-time
    readOnly: true
    description: Timestamp when the FTP user was created
    example: "2023-01-01T12:00:00Z"

  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: Timestamp when the FTP user was last updated
    example: "2023-01-01T12:00:00Z"
