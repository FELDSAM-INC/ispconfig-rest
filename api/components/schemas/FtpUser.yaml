type: object
x-db-table: ftp_user
description: |
  An FTP account bound to a web domain — table `ftp_user`.

  ### Server-derived fields
  `server_id`, `dir` (the domain's document root), `uid`/`gid` (the domain's
  system user/group) and `sys_groupid` are always derived from the parent web
  domain — on create and again whenever `parent_domain_id` changes.

  ### Username prefixing
  The submitted `username` is prepended with the resolved ISPConfig
  `ftpuser_prefix` (e.g. `web42_`); the applied prefix is stored in
  `username_prefix`. The full username must be unique across all FTP users.

  ### Password storage
  `password` is write-only and stored as a SHA-512 crypt hash (legacy
  `CRYPT` encryption). Plaintext is never stored or returned.
required:
  - parent_domain_id
  - username
  - password
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    description: Unique identifier for the FTP user (database column `ftp_user_id`)
    example: 42
    x-db-field: ftp_user_id

  server_id:
    type: integer
    format: int64
    readOnly: true
    description: Server ID — always derived from the parent web domain
    example: 1

  parent_domain_id:
    type: integer
    format: int64
    description: ID of the parent web domain this FTP user belongs to
    example: 123

  username:
    type: string
    minLength: 1
    maxLength: 64
    pattern: '^[\w\.\-@\+]{1,64}$'
    description: |
      FTP username (without prefix). Legacy regex `/^[\w\.\-@\+]{0,64}$/`.
      The full (prefixed) username must be unique across all FTP users.
    example: "john"

  username_prefix:
    type: string
    readOnly: true
    maxLength: 50
    description: Prefix applied to the username (resolved from the ISPConfig `ftpuser_prefix` setting)
    example: "web123_"

  username_full:
    type: string
    readOnly: true
    description: Full FTP username including prefix
    example: "web123_john"

  password:
    type: string
    format: password
    writeOnly: true
    maxLength: 255
    description: |
      FTP password. Write-only — never returned in responses.
      Stored as a SHA-512 crypt hash (legacy `CRYPT` encryption).
    example: "YourSecurePassword123!"

  quota_size:
    type: integer
    format: int64
    minimum: -1
    default: -1
    description: |
      Disk quota in MB. `-1` = unlimited, otherwise a positive integer
      (legacy regex `/^(\-1|[0-9]{1,10})$/`).
    example: 1024

  dir:
    type: string
    readOnly: true
    maxLength: 255
    description: |
      Home directory — always set to the parent web domain's document root.
      Paths containing `..` or `./` are rejected server-side.
    example: "/var/www/clients/client1/web123"

  uid:
    type: string
    readOnly: true
    maxLength: 64
    description: System user — always set to the parent web domain's `system_user` (never `root`)
    example: "web123"

  gid:
    type: string
    readOnly: true
    maxLength: 64
    description: System group — always set to the parent web domain's `system_group` (never `root`)
    example: "client1"

  expires:
    type: string
    format: date-time
    nullable: true
    description: Expiration date of the FTP account (null = never expires)
    example: "2027-01-01T00:00:00Z"

  active:
    type: boolean
    default: true
    description: Whether the FTP user is active
    example: true
    x-db-format: "y/n"

  # System fields
  sys_userid:
    type: integer
    readOnly: true
    description: System user ID that owns the record
    example: 1

  sys_groupid:
    type: integer
    readOnly: true
    description: System group ID — always synced from the parent web domain
    example: 10

  sys_perm_user:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Owner permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_group:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: riud
    description: Group permissions (r=read, i=insert, u=update, d=delete)
    example: riud

  sys_perm_other:
    type: string
    maxLength: 5
    pattern: '^[riud]*$'
    readOnly: true
    default: ""
    description: Other permissions (r=read, i=insert, u=update, d=delete)
    example: ""

  # Response-only convenience fields
  server_name:
    type: string
    readOnly: true
    description: Name of the server hosting the FTP user
    example: "web1.example.com"

  parent_domain:
    type: string
    readOnly: true
    description: Name of the parent domain
    example: "example.com"
